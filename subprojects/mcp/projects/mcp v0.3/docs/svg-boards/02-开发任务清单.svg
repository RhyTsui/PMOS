  <rect width="1440" height="1080" fill="url(#bg)"/>
  <text x="72" y="56" class="title">广告聚合 MCP v3.14.16 开发任务清单</text>
  <text x="72" y="86" class="subtitle">Markdown 文档板：按章节提炼核心内容，供快速评审和沟通</text>
  <rect x="72" y="118" width="1296" height="118" rx="28" fill="url(#hero)" filter="url(#shadow)"/>
  <text x="100" y="158" class="hero-title">02-开发任务清单.md</text>
  <text x="100" y="188" class="hero-body">源文件：docs/02-开发任务清单.md</text>
  <text x="100" y="212" class="hero-body">更新时间：2026-04-20 07:08</text>
  <text x="100" y="238" class="hero-body">该文档主体以结构化章节为主，以下卡片展示各章节的提炼内容。</text>
  <rect x="72" y="276" width="400" height="374" rx="24" fill="#FFFFFF" stroke="#D7E3F7" filter="url(#shadow)"/>
  <text x="96" y="310" class="card-title">执行说明</text>
  <text x="96" y="340" class="body">• 本清单与 `prd.md` 保持一致，按以下口径推进：</text>
  <text x="96" y="362" class="body">• **待排期**: 已确认纳入本版，可直接进入开发排期</text>
  <text x="96" y="384" class="body">• **待评估**:</text>
  <text x="96" y="406" class="body">  需求有效，但工期、依赖或实现边界待开发评估</text>
  <text x="96" y="428" class="body">• **待原型**: 需求有效，但需先补原型再进入开发</text>
  <text x="96" y="450" class="body">• 补充说明：</text>
  <rect x="496" y="276" width="400" height="374" rx="24" fill="#FFFFFF" stroke="#D7E3F7" filter="url(#shadow)"/>
  <text x="520" y="310" class="card-title">一、直接进入开发</text>
  <text x="520" y="340" class="body">• 任务编号 · 对应需求 · 任务内容 · 前置条件</text>
  <text x="520" y="362" class="body">• T1 · R1 ·</text>
  <text x="520" y="384" class="body">  整理广告标签体系、标签字典与基础维度说明 ·</text>
  <text x="520" y="406" class="body">  分析文档口径确认</text>
  <text x="520" y="428" class="body">• T2 · R2 · 实现 `list_team` /</text>
  <text x="520" y="450" class="body">  `list_apps` / `list_media`</text>
  <text x="520" y="472" class="body">  基础查询能力 · 实体口径确认</text>
  <text x="520" y="494" class="body">• T3 · R3 · 实现</text>
  <text x="520" y="516" class="body">  `get_ad_hour_report` 报表能力 ·</text>
  <text x="520" y="538" class="body">  数据源字段确认</text>
  <text x="520" y="560" class="body">• T4 · R4 · 实现</text>
  <text x="520" y="582" class="body">  `get_ad_day_report` 报表能力 ·</text>
  <text x="520" y="604" class="body">  时间粒度与指标口径确认</text>
  <rect x="920" y="276" width="400" height="374" rx="24" fill="#FFFFFF" stroke="#D7E3F7" filter="url(#shadow)"/>
  <text x="944" y="310" class="card-title">二、待开发评估</text>
  <text x="944" y="340" class="body">• 任务编号 · 对应需求 · 任务内容 · 前置条件</text>
  <text x="944" y="362" class="body">• E1 · E1 ·</text>
  <text x="944" y="384" class="body">  评估多维分析能力方案，承接时间、团队、优化师等维度分析</text>
  <text x="944" y="406" class="body">  · 需求边界与使用场景确认</text>
  <text x="944" y="428" class="body">• E2 · E2 · 评估宽表或多表的数据结构方案 ·</text>
  <text x="944" y="450" class="body">  标签与报表字段盘点完成</text>
  <text x="944" y="472" class="body">• E3 · E3 · 评估数据推送到 Hive</text>
  <text x="944" y="494" class="body">  或下游系统的实现方式 · 目标表与消费方确认</text>
  <text x="944" y="516" class="body">• E4 · E4 · 评估报表能力接入生产环境的落地方式</text>
  <text x="944" y="538" class="body">  · 生产环境接入边界确认</text>
  <rect x="72" y="674" width="400" height="286" rx="24" fill="#FFFFFF" stroke="#D7E3F7" filter="url(#shadow)"/>
  <text x="96" y="708" class="card-title">三、待原型后进入开发</text>
  <text x="96" y="738" class="body">• 任务编号 · 对应需求 · 任务内容 · 前置条件</text>
  <text x="96" y="760" class="body">• P1 · P1 · 输出复杂问数交互引导原型 ·</text>
  <text x="96" y="782" class="body">  关键问数场景确认</text>
  <text x="96" y="804" class="body">• P2 · P2 · 输出报表结果展示与解释原型 ·</text>
  <text x="96" y="826" class="body">  核心指标展示需求确认</text>
  <text x="96" y="848" class="body">• P3 · P3 · 输出广州二部专项流程型需求原型 ·</text>
  <text x="96" y="870" class="body">  广州二部流程场景确认</text>
  <text x="96" y="892" class="body">• P4 · P4 · 输出需求池中流程型新增需求原型 ·</text>
  <text x="96" y="914" class="body">  需求池流程项拆解完成</text>
  <rect x="496" y="674" width="400" height="286" rx="24" fill="#FFFFFF" stroke="#D7E3F7" filter="url(#shadow)"/>
  <text x="520" y="708" class="card-title">四、需求到任务映射规则</text>
  <text x="520" y="738" class="body">• 需求状态 · 处理方式</text>
  <text x="520" y="760" class="body">• 本版支持 · 直接映射到 `T*` 任务，进入排期</text>
  <text x="520" y="782" class="body">• 待开发评估工期 · 映射到 `E*`</text>
  <text x="520" y="804" class="body">  任务，待开发给出工期与方案</text>
  <text x="520" y="826" class="body">• 需补原型 · 映射到 `P*`</text>
  <text x="520" y="848" class="body">  任务，原型完成后再转开发任务</text>
  <rect x="920" y="674" width="400" height="286" rx="24" fill="#FFFFFF" stroke="#D7E3F7" filter="url(#shadow)"/>
  <text x="944" y="708" class="card-title">五、当前跟进重点</text>
  <text x="944" y="738" class="body">• 优先推进标签、基础查询与核心报表能力，保证本版可交付主链路。</text>
  <text x="944" y="760" class="body">• 当前新增里优先级最高的是 `7日付费相关指标` 与</text>
  <text x="944" y="782" class="body">  `素材报表筛选项`。</text>
  <text x="944" y="804" class="body">• `有效用户相关指标`</text>
  <text x="944" y="826" class="body">  保留在版本内，但不作为这轮主收口项。</text>
  <text x="944" y="848" class="body">• 多维分析相关需求统一收口到开发评估，不再以聚合分析引擎</text>
  <text x="944" y="870" class="body">  MCP 形式拆任务。</text>
  <text x="944" y="892" class="body">• 广州二部需求与需求池新增需求均视为本版范围，不能挂起到后续版本。</text>
  <a href="../02-开发任务清单.md">
    <text x="72" y="1046" class="link">打开原 Markdown</text>
