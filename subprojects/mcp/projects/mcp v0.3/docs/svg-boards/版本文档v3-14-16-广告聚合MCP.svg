  <text x="72" y="56" class="title">版本文档v3.14.16-广告聚合MCP</text>
  <text x="72" y="86" class="subtitle">Markdown 文档板：按章节提炼核心内容，供快速评审和沟通</text>
  <rect x="72" y="118" width="1296" height="118" rx="28" fill="url(#hero)" filter="url(#shadow)"/>
  <text x="100" y="158" class="hero-title">版本文档v3.14.16-广告聚合MCP.md</text>
  <text x="100" y="188" class="hero-body">源文件：docs/版本文档v3.14.16-广告聚合MCP.md</text>
  <text x="100" y="212" class="hero-body">更新时间：2026-04-20 11:06</text>
  <text x="100" y="238" class="hero-body">该文档主体以结构化章节为主，以下卡片展示各章节的提炼内容。</text>
  <rect x="72" y="276" width="400" height="330" rx="24" fill="#FFFFFF" stroke="#D7E3F7" filter="url(#shadow)"/>
  <text x="96" y="310" class="card-title">文档记录</text>
  <text x="96" y="340" class="body">• 产品版本号 · 修订内容 · 修订时间 · 修订人</text>
  <text x="96" y="362" class="body">• v3.14.16 · 按</text>
  <text x="96" y="384" class="body">  `需求文档模板v2.0.docx`</text>
  <text x="96" y="406" class="body">  重排版本文档，收敛本版需求、功能、开发说明与变更影响 ·</text>
  <text x="96" y="428" class="body">  2026-04-20 · Codex</text>
  <rect x="496" y="276" width="400" height="330" rx="24" fill="#FFFFFF" stroke="#D7E3F7" filter="url(#shadow)"/>
  <text x="520" y="310" class="card-title">需求变更记录</text>
  <text x="520" y="340" class="body">• 优先级 · 变更维度 · 变更前 · 变更后</text>
  <text x="520" y="362" class="body">• P0 · 需求范围 · 聚合分析引擎 MCP 独立建设</text>
  <text x="520" y="384" class="body">  · 删除独立需求，改由多维分析能力承接</text>
  <text x="520" y="406" class="body">• P0 · 工具定义 · 新增报表工具参数和返回规则不完整</text>
  <text x="520" y="428" class="body">  ·</text>
  <text x="520" y="450" class="body">  广告、素材、账户、LTV、活动、包体、回流、直播、关键词等工具统一补齐版本说明</text>
  <text x="520" y="472" class="body">• P0 · 筛选规则 · 各报表筛选能力不一致 ·</text>
  <text x="520" y="494" class="body">  增加全局优化师筛选；实时、回流数据、回流LTV、回流ROI不支持</text>
  <text x="520" y="516" class="body">• P1 · 页面交互 ·</text>
  <text x="520" y="538" class="body">  广告素材页账户单选，素材筛选项不全 ·</text>
  <text x="520" y="560" class="body">  广告素材页账户改多选；素材页新增旧智投筛选项、制作方筛选、素材扩展字段</text>
  <rect x="920" y="276" width="400" height="330" rx="24" fill="#FFFFFF" stroke="#D7E3F7" filter="url(#shadow)"/>
  <text x="944" y="310" class="card-title">1.1 业务背景</text>
  <text x="944" y="340" class="body">• 广告聚合 MCP</text>
  <text x="944" y="362" class="body">  已在运行，本次迭代基于以下正式输入合并收口：</text>
  <text x="944" y="384" class="body">• `3.14.16-广告聚合MCP</text>
  <text x="944" y="406" class="body">  产品需求文档（PRD）.md`</text>
  <text x="944" y="428" class="body">• `需求分析文档v1.0-广告业务.md`</text>
  <text x="944" y="450" class="body">• `需求分析文档v1.1-广告业务.md`</text>
  <text x="944" y="472" class="body">• `需求Q2-广州二部.xlsx`</text>
  <rect x="72" y="630" width="400" height="374" rx="24" fill="#FFFFFF" stroke="#D7E3F7" filter="url(#shadow)"/>
  <text x="96" y="664" class="card-title">1.2 现存问题</text>
  <text x="96" y="694" class="body">• 问题 · 具体表现 · 影响</text>
  <text x="96" y="716" class="body">• 版本输入分散 · 原</text>
  <text x="96" y="738" class="body">  PRD、分析文档、会议纪要、原型截图、映射说明分散 ·</text>
  <text x="96" y="760" class="body">  同一需求存在多套说法</text>
  <text x="96" y="782" class="body">• 筛选逻辑不统一 ·</text>
  <text x="96" y="804" class="body">  优化师、账户多选、未知值、旧智投筛选项没有统一口径 ·</text>
  <text x="96" y="826" class="body">  页面实现和工具参数难对齐</text>
  <text x="96" y="848" class="body">• 工具边界不清 ·</text>
  <text x="96" y="870" class="body">  新增报表页和智投工具只写了方向，没有标准版本说明 ·</text>
  <text x="96" y="892" class="body">  难以评估开发工作量</text>
  <text x="96" y="914" class="body">• 新增指标缺少公式 ·</text>
  <text x="96" y="936" class="body">  ROI、素材、活动中的新指标只有名字，没有计算说明 ·</text>
  <text x="96" y="958" class="body">  后端实现和验收风险高</text>
  <rect x="496" y="630" width="400" height="374" rx="24" fill="#FFFFFF" stroke="#D7E3F7" filter="url(#shadow)"/>
  <text x="520" y="664" class="card-title">1.3 本版方案</text>
  <text x="520" y="694" class="body">• 本版按模板输出统一版本文档，固定以下口径：</text>
  <text x="520" y="716" class="body">• 有效需求默认纳入本版。</text>
  <text x="520" y="738" class="body">• 工期不清的放入“待开发评估工期”。</text>
  <text x="520" y="760" class="body">• 交互未收敛的放入“需补原型”。</text>
  <text x="520" y="782" class="body">• 页面、工具、筛选、指标、返回约束以本版文档为统一说明。</text>
  <rect x="920" y="630" width="400" height="374" rx="24" fill="#FFFFFF" stroke="#D7E3F7" filter="url(#shadow)"/>
  <text x="944" y="664" class="card-title">二、版本目标</text>
  <text x="944" y="694" class="body">• 序号 · 产品/业务目标 · 价值收益 · 衡量标准</text>
  <text x="944" y="716" class="body">• 1 · 输出标准版本文档 ·</text>
  <text x="944" y="738" class="body">  让产品、研发、评审基于同一份输入协作 ·</text>
  <text x="944" y="760" class="body">  结构符合模板，需求/功能/开发说明齐全</text>
  <text x="944" y="782" class="body">• 2 · 统一报表与 MCP 工具口径 ·</text>
  <text x="944" y="804" class="body">  降低前后端实现偏差和返工 ·</text>
  <text x="944" y="826" class="body">  页面、原型、工具、任务清单表述一致</text>
  <text x="944" y="848" class="body">• 3 · 收敛本版高频筛选与返回规则 ·</text>
  <text x="944" y="870" class="body">  让多选、汇总、TopN、分页限制可直接落地 ·</text>
  <text x="944" y="892" class="body">  所有相关报表共享一致规则</text>
  <text x="944" y="914" class="body">• 4 · 为新增报表页和智投工具提供可执行说明 ·</text>
  <text x="944" y="936" class="body">  让开发可直接评估范围和实现边界 ·</text>
  <text x="944" y="958" class="body">  每个新增页都有工具、参数和约束说明</text>
  <rect x="72" y="1028" width="400" height="286" rx="24" fill="#FFFFFF" stroke="#D7E3F7" filter="url(#shadow)"/>
  <text x="96" y="1062" class="card-title">3.1 本版支持</text>
  <text x="96" y="1092" class="body">• 编号 · 需求名称 · 来源 · 业务目标</text>
  <text x="96" y="1114" class="body">• R-01 · 删除聚合分析引擎 MCP 独立需求 ·</text>
  <text x="96" y="1136" class="body">  会议纪要 · 避免重复建设，将聚合分析并入多维分析</text>
  <text x="96" y="1158" class="body">• R-02 · 新增智投 MCP 工具 6-9 张 ·</text>
  <text x="96" y="1180" class="body">  用户补充需求 · 承接新增报表页与智投能力入口</text>
  <text x="96" y="1202" class="body">• R-03 · 部分页面支持日期汇总 · 用户补充需求 +</text>
  <text x="96" y="1224" class="body">  原型迭代 · 满足按汇总、日、周、月等聚合查看场景</text>
  <text x="96" y="1246" class="body">• R-04 · 全局增加优化师筛选 · 用户补充需求 ·</text>
  <text x="96" y="1268" class="body">  统一核心报表的人员维度筛选能力</text>
  <rect x="496" y="1028" width="400" height="286" rx="24" fill="#FFFFFF" stroke="#D7E3F7" filter="url(#shadow)"/>
  <text x="520" y="1062" class="card-title">3.2 待开发评估工期</text>
  <text x="520" y="1092" class="body">• 编号 · 需求名称 · 来源 · 业务目标</text>
  <text x="520" y="1114" class="body">• E-01 · 优化师筛选后端透传与枚举来源 ·</text>
  <text x="520" y="1136" class="body">  本轮版本补充 · 确保 `optimizerIds`</text>
  <text x="520" y="1158" class="body">  在各报表工具中稳定可用</text>
  <text x="520" y="1180" class="body">• E-02 · 新增智投工具正式实现 · 本轮版本补充 ·</text>
  <text x="520" y="1202" class="body">  将新增页从原型入口升级为可执行工具能力</text>
  <text x="520" y="1224" class="body">• E-03 · 回流系列、直播、关键词数据接入 ·</text>
  <text x="520" y="1246" class="body">  本轮版本补充 · 完成新增报表工具的数据闭环</text>
  <rect x="920" y="1028" width="400" height="286" rx="24" fill="#FFFFFF" stroke="#D7E3F7" filter="url(#shadow)"/>
  <text x="944" y="1062" class="card-title">3.3 需补原型</text>
  <text x="944" y="1092" class="body">• 编号 · 需求名称 · 来源 · 业务目标</text>
  <text x="944" y="1114" class="body">• P-01 · 新增报表页高保真列表态 · 原型迭代 ·</text>
  <text x="944" y="1136" class="body">  让活动、包体、直播、关键词、回流系列具备完整报表态</text>
  <text x="944" y="1158" class="body">• P-02 · 多选筛选交互统一 · 原型迭代 ·</text>
  <text x="944" y="1180" class="body">  统一账户、广告组、广告、活动、分包的多选体验</text>
  <rect x="72" y="1338" width="400" height="330" rx="24" fill="#FFFFFF" stroke="#D7E3F7" filter="url(#shadow)"/>
  <text x="96" y="1372" class="card-title">四、功能列表</text>
  <text x="96" y="1402" class="body">• 功能模块 · 页面/能力 · 当前承接工具 · 当前状态</text>
  <text x="96" y="1424" class="body">• 核心报表 · 概览 · 广告报表工具 + KPI</text>
  <text x="96" y="1446" class="body">  汇总逻辑 · 可直接承接</text>
  <text x="96" y="1468" class="body">• 核心报表 · 实时数据 ·</text>
  <text x="96" y="1490" class="body">  `get_ad_hour_report` /</text>
  <text x="96" y="1512" class="body">  广告报表工具 · 可直接承接</text>
  <text x="96" y="1534" class="body">• 核心报表 · 日周月报 ·</text>
  <text x="96" y="1556" class="body">  `get_ad_day_report` / 广告报表工具</text>
  <text x="96" y="1578" class="body">  · 可直接承接</text>
  <text x="96" y="1600" class="body">• 分析报表 · ROI 分析 ·</text>
  <text x="96" y="1622" class="body">  `get_ad_roi_report` · 可直接承接</text>
  <rect x="496" y="1338" width="400" height="330" rx="24" fill="#FFFFFF" stroke="#D7E3F7" filter="url(#shadow)"/>
  <text x="520" y="1372" class="card-title">5.1 通用参数定义</text>
  <text x="520" y="1402" class="body">• 参数名 · 类型 · 必填 · 说明</text>
  <text x="520" y="1424" class="body">• `startDate` · `string` · 是 ·</text>
  <text x="520" y="1446" class="body">  查询开始日期，格式 `YYYY-MM-DD`</text>
  <text x="520" y="1468" class="body">• `endDate` · `string` · 是 ·</text>
  <text x="520" y="1490" class="body">  查询结束日期，格式 `YYYY-MM-DD`</text>
  <text x="520" y="1512" class="body">• `media` · `string[]` · 否 ·</text>
  <text x="520" y="1534" class="body">  媒体，可多选</text>
  <text x="520" y="1556" class="body">• `appType` · `string[]` · 否 ·</text>
  <text x="520" y="1578" class="body">  应用类型，可多选</text>
  <rect x="920" y="1338" width="400" height="330" rx="24" fill="#FFFFFF" stroke="#D7E3F7" filter="url(#shadow)"/>
  <text x="944" y="1372" class="card-title">5.2 通用约束</text>
  <text x="944" y="1402" class="body">• 账户、广告组、广告、活动、包体等多选项最多支持选择 10</text>
  <text x="944" y="1424" class="body">  个。</text>
  <text x="944" y="1446" class="body">• 账户/广告/素材等明细报表最多返回 10 条。</text>
  <text x="944" y="1468" class="body">• 细分结果最多返回 10 条。</text>
  <text x="944" y="1490" class="body">• 支持返回汇总行。</text>
  <text x="944" y="1512" class="body">• 支持指标 TopN 筛选，且 `topN &lt; 10`。</text>
