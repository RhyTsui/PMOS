<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980" fill="none">
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="1320" y2="940" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FCF7F0"/>
      <stop offset="1" stop-color="#F6F0FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#CDBBA7" flood-opacity="0.22"/>
    </filter>
    <style>
      text { font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .title { font-size: 34px; font-weight: 700; fill: #2F2440; }
      .subtitle { font-size: 16px; font-weight: 500; fill: #72657F; }
      .cardTitle { font-size: 22px; font-weight: 700; fill: #2E2540; }
      .body { font-size: 14px; font-weight: 500; fill: #5F566F; }
      .tag { font-size: 12px; font-weight: 700; fill: #8A4B21; }
      .foot { font-size: 13px; font-weight: 600; fill: #786D86; }
    </style>
  </defs>
  <rect width="1400" height="980" fill="url(#bg)"/>

  <text x="88" y="68" class="title">07 版本评审准备板</text>
  <text x="88" y="98" class="subtitle">面向当前首版评审，把目标、范围、风险、真源状态和待拍板问题收成一张总览图。</text>

  <rect x="88" y="146" width="588" height="180" rx="26" fill="#FFFFFF" stroke="#E9D9C9" filter="url(#shadow)"/>
  <text x="122" y="192" class="cardTitle">版本目标</text>
  <text x="122" y="228" class="body">ChoKoNu 首版要完成 AI 应用测试与评测的最小闭环，而不是继续扩成泛化 AI 平台。</text>
  <text x="122" y="256" class="body">固定主链：标准 -&gt; 样本 -&gt; 评测集 -&gt; 执行 -&gt; 评估 -&gt; Trace -&gt; 报告 -&gt; 回归 -&gt; 版本判断。</text>
  <text x="122" y="286" class="tag">评审目标</text>

  <rect x="724" y="146" width="588" height="180" rx="26" fill="#FFFFFF" stroke="#E9D9C9" filter="url(#shadow)"/>
  <text x="758" y="192" class="cardTitle">本轮评审范围</text>
  <text x="758" y="228" class="body">1. 测试标准定义入口。</text>
  <text x="758" y="256" class="body">2. 样本沉淀与评测集组织。</text>
  <text x="758" y="284" class="body">3. 执行任务配置与评估器运行。</text>
  <text x="758" y="312" class="body">4. Trace 归集、报告生成、失败样本回归。</text>
  <text x="758" y="340" class="tag">范围</text>

  <rect x="88" y="366" width="392" height="246" rx="26" fill="#FFFFFF" stroke="#E9D9C9" filter="url(#shadow)"/>
  <text x="122" y="412" class="cardTitle">主要风险</text>
  <text x="122" y="448" class="body">1. 首版边界仍可能继续膨胀。</text>
  <text x="122" y="480" class="body">2. legacy 方法稿可能继续干扰当前产品定义。</text>
  <text x="122" y="512" class="body">3. 过程文档与交付文档可能再次混层。</text>
  <text x="122" y="544" class="body">4. 如果不做正式评审，当前规划无法成为版本 gate。</text>
  <text x="122" y="576" class="tag">风险</text>

  <rect x="504" y="366" width="392" height="246" rx="26" fill="#FFFFFF" stroke="#E9D9C9" filter="url(#shadow)"/>
  <text x="538" y="412" class="cardTitle">当前真源</text>
  <text x="538" y="448" class="body">当前已验收为真源的文档包括：</text>
  <text x="538" y="480" class="body">README、subproject.json、project-memory。</text>
  <text x="538" y="512" class="body">执行工作流、PM 任务单、首版总规划。</text>
  <text x="538" y="544" class="body">需求清单、人读版、版本评审输入稿。</text>
  <text x="538" y="576" class="tag">真源状态</text>

  <rect x="920" y="366" width="392" height="246" rx="26" fill="#FFFFFF" stroke="#E9D9C9" filter="url(#shadow)"/>
  <text x="954" y="412" class="cardTitle">辅助判断材料</text>
  <text x="954" y="448" class="body">产品架构与导航方案。</text>
  <text x="954" y="480" class="body">产品结构草图与工作台关系图。</text>
  <text x="954" y="512" class="body">竞品研究、问题优先级、会议结论。</text>
  <text x="954" y="544" class="body">这些能支持判断，但还不是最终版本真源。</text>
  <text x="954" y="576" class="tag">辅助输入</text>

  <rect x="88" y="652" width="588" height="210" rx="26" fill="#FFFFFF" stroke="#E9D9C9" filter="url(#shadow)"/>
  <text x="122" y="698" class="cardTitle">待拍板问题</text>
  <text x="122" y="734" class="body">1. 首版是否明确把版本评审输入列为必做链路。</text>
  <text x="122" y="766" class="body">2. 哪些 legacy 方法稿需要升级为活跃真源。</text>
  <text x="122" y="798" class="body">3. 产品表达是否已经收敛到 AI Testing Studio。</text>
  <text x="122" y="830" class="tag">待决策项</text>

  <rect x="724" y="652" width="588" height="210" rx="26" fill="#FFFFFF" stroke="#E9D9C9" filter="url(#shadow)"/>
  <text x="758" y="698" class="cardTitle">建议评审输出</text>
  <text x="758" y="734" class="body">先明确评审结论：继续、通过、打回。</text>
  <text x="758" y="766" class="body">如果继续，要写清删减项、补齐项和下一轮 gate 条件。</text>
  <text x="758" y="798" class="body">如果通过，就进入可执行的能力切片，而不是回到发散式补文档。</text>
  <text x="758" y="830" class="tag">输出建议</text>

  <text x="88" y="920" class="foot">关联文档：版本评审输入稿、文档验收状态清单、首版总规划。</text>
</svg>
