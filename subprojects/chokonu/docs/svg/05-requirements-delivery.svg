<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980" fill="none">
  <defs>
    <linearGradient id="bg5" x1="80" y1="40" x2="1320" y2="940" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBFCFF"/>
      <stop offset="1" stop-color="#F0F5FF"/>
    </linearGradient>
    <filter id="s5" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#BFCCE3" flood-opacity="0.25"/>
    </filter>
    <style>
      text { font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .t { font-size: 34px; font-weight: 700; fill: #1F2A44; }
      .st { font-size: 16px; font-weight: 500; fill: #60708F; }
      .h { font-size: 22px; font-weight: 700; fill: #21314B; }
      .b { font-size: 14px; font-weight: 500; fill: #5C6D8A; }
    </style>
  </defs>
  <rect width="1400" height="980" fill="url(#bg5)"/>
  <text x="88" y="68" class="t">05 需求与交付结构</text>
  <text x="88" y="98" class="st">把需求池、首版需求清单、人读版和版本评审输入稿压成一套清晰的交付结构。</text>

  <rect x="88" y="142" width="1224" height="140" rx="28" fill="#FFFFFF" stroke="#D8E3F8" filter="url(#s5)"/>
  <text x="122" y="188" class="h">首版最短需求句</text>
  <text x="122" y="224" class="b">ChoKoNu 首版先把 AI 应用测试与评测的核心闭环跑通：标准 -> 样本 -> 评测集 -> 执行 -> 评估 -> Trace -> 报告 -> 回归。</text>
  <text x="122" y="252" class="b">不要再把需求写成大段背景描述，而是回到“动作 + 对象 + 结果”的表达。</text>

  <rect x="88" y="326" width="586" height="272" rx="28" fill="#FFFFFF" stroke="#D8E3F8" filter="url(#s5)"/>
  <text x="122" y="370" class="h">本轮必须做</text>
  <text x="122" y="406" class="b">1. 提供测试标准定义能力</text>
  <text x="122" y="434" class="b">2. 提供测试样本沉淀能力</text>
  <text x="122" y="462" class="b">3. 提供评测集组织能力</text>
  <text x="122" y="490" class="b">4. 提供执行任务配置能力</text>
  <text x="122" y="518" class="b">5. 提供评估器执行能力</text>
  <text x="122" y="546" class="b">6. 提供 Trace 归集能力</text>
  <text x="122" y="574" class="b">7. 提供测试报告生成能力</text>

  <rect x="726" y="326" width="586" height="272" rx="28" fill="#FFFFFF" stroke="#D8E3F8" filter="url(#s5)"/>
  <text x="760" y="370" class="h">本轮建议做 / 暂不做</text>
  <text x="760" y="406" class="b">建议做：结果对比、对象筛选、报告回挂需求与版本。</text>
  <text x="760" y="448" class="b">暂不做：通用 AI Agent 开发平台、大而全资源门户、复杂实时治理闭环。</text>
  <text x="760" y="496" class="b">原则：首版只承诺能让“版本可测、可比、可评审”，不承诺全能平台。</text>

  <rect x="88" y="642" width="1224" height="238" rx="28" fill="#FFFFFF" stroke="#D8E3F8" filter="url(#s5)"/>
  <text x="122" y="686" class="h">交付分层</text>
  <text x="122" y="724" class="b">内部详细层：ChoKoNu首版总规划、需求池明细版、版本评审输入稿。用于研究、推理、边界收口和内部评审。</text>
  <text x="122" y="756" class="b">对外交付层：首版需求清单、人读版需求清单。用于开发对接、老板沟通、下游交付。</text>
  <text x="122" y="788" class="b">版本默认双产物：MD 详细版 + DOCX 人读版源文档。</text>
  <text x="122" y="820" class="b">需求表达规范：一条需求一句话，先动作后对象，不把长背景塞进需求句。</text>
</svg>
