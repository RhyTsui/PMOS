<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980" fill="none">
  <defs>
    <linearGradient id="bg1" x1="70" y1="40" x2="1320" y2="940" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAFCFF"/>
      <stop offset="1" stop-color="#EFF4FF"/>
    </linearGradient>
    <filter id="s1" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#BECBE3" flood-opacity="0.26"/>
    </filter>
    <style>
      text { font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .t { font-size: 34px; font-weight: 700; fill: #1F2A44; }
      .st { font-size: 16px; font-weight: 500; fill: #60708F; }
      .h { font-size: 22px; font-weight: 700; fill: #21314B; }
      .b { font-size: 14px; font-weight: 500; fill: #5C6D8A; }
      .k { font-size: 13px; font-weight: 700; fill: #4D6FA8; }
    </style>
  </defs>
  <rect width="1400" height="980" fill="url(#bg1)"/>
  <text x="88" y="68" class="t">01 项目定位与背景</text>
  <text x="88" y="98" class="st">当前项目已经从历史的埋点验收语义，收束为面向 AI 应用研发迭代的测试与质量治理工作台。</text>

  <rect x="88" y="142" width="1224" height="116" rx="28" fill="#1A73E8" filter="url(#s1)"/>
  <text x="122" y="188" font-size="28" font-weight="700" fill="#FFFFFF">连弩 / ChoKoNu = AI Testing Studio</text>
  <text x="122" y="221" font-size="15" font-weight="500" fill="#DDEBFF">不是通用 Agent 开发平台，不是传统测试后台，而是面向 AI 应用研发迭代的 AI 自动化测试与质量治理工作台。</text>

  <rect x="88" y="300" width="586" height="252" rx="28" fill="#FFFFFF" stroke="#D8E3F8" filter="url(#s1)"/>
  <text x="122" y="344" class="h">为什么现在要做</text>
  <text x="122" y="380" class="b">1. 现有验收工作高度依赖人工协同，责任边界、流程、规则和查询方式都不稳定。</text>
  <text x="122" y="408" class="b">2. 团队大量时间消耗在文档整理、反复确认、人工验收、问题解释等低价值重复劳动上。</text>
  <text x="122" y="436" class="b">3. AI 应用研发进入提示词、知识、工具、工作流持续迭代阶段，旧的“接口通不通”标准已经不够。</text>
  <text x="122" y="464" class="b">4. 需要一个把标准、样本、执行、Trace、报告和版本判断串起来的系统，而不是继续靠零散文档推进。</text>
  <text x="122" y="500" class="k">来源：项目背景与立项说明 / PRD前言 / project-memory</text>

  <rect x="726" y="300" width="586" height="252" rx="28" fill="#FFFFFF" stroke="#D8E3F8" filter="url(#s1)"/>
  <text x="760" y="344" class="h">它现在到底是什么</text>
  <text x="760" y="380" class="b">1. 面向 MCP、Chat、Agent、知识检索、Skill、Workflow 等 AI 应用对象。</text>
  <text x="760" y="408" class="b">2. 通过评测、自动化执行、Trace、报告、对比和门禁来判断版本是否变好。</text>
  <text x="760" y="436" class="b">3. 目标不是只做一次性验收，而是服务 AI 应用的回归、实验和持续迭代。</text>
  <text x="760" y="464" class="b">4. 重点是质量治理，不是应用搭建。</text>
  <text x="760" y="500" class="k">一句话：企业内部 AI 应用测试与质量治理平台</text>

  <rect x="88" y="594" width="1224" height="286" rx="28" fill="#FFFFFF" stroke="#D8E3F8" filter="url(#s1)"/>
  <text x="122" y="638" class="h">一期范围和非范围</text>

  <rect x="122" y="670" width="550" height="174" rx="22" fill="#F6FAFF" stroke="#D8E3F8"/>
  <text x="152" y="706" class="h">一期要做</text>
  <text x="152" y="738" class="b">1. 测试标准与规则沉淀</text>
  <text x="152" y="764" class="b">2. 样本与评测集资产化</text>
  <text x="152" y="790" class="b">3. 自动化执行、Trace、报告、回归闭环</text>
  <text x="152" y="816" class="b">4. 版本比较、放行建议、评审输入</text>

  <rect x="728" y="670" width="550" height="174" rx="22" fill="#FFF8F1" stroke="#F1DEC7"/>
  <text x="758" y="706" class="h">一期不做</text>
  <text x="758" y="738" class="b">1. 通用 AI Agent 开发平台</text>
  <text x="758" y="764" class="b">2. 大而全资源门户</text>
  <text x="758" y="790" class="b">3. 复杂跨系统实时治理中台</text>
  <text x="758" y="816" class="b">4. 全量 observability 平台能力</text>
</svg>
