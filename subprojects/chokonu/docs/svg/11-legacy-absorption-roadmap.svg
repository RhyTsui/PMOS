<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="1080" viewBox="0 0 1480 1080" fill="none">
  <defs>
    <linearGradient id="bg" x1="60" y1="40" x2="1420" y2="1040" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFDF7"/>
      <stop offset="1" stop-color="#F6F8FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#D9C89A" flood-opacity="0.22"/>
    </filter>
    <style>
      text { font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .title { font-size: 34px; font-weight: 700; fill: #42361E; }
      .subtitle { font-size: 16px; font-weight: 500; fill: #7E7055; }
      .cardTitle { font-size: 22px; font-weight: 700; fill: #473A21; }
      .body { font-size: 14px; font-weight: 500; fill: #6A604F; }
      .tag { font-size: 12px; font-weight: 700; fill: #A56B16; }
      .foot { font-size: 13px; font-weight: 600; fill: #7C735E; }
    </style>
  </defs>
  <rect width="1480" height="1080" fill="url(#bg)"/>
  <text x="76" y="70" class="title">11 Legacy 吸收路线图</text>
  <text x="76" y="102" class="subtitle">说明 legacy 资料中哪些内容已经进入当前真源，哪些还需要提升为 active docs，哪些只保留背景价值。</text>

  <rect x="76" y="156" width="420" height="280" rx="28" fill="#FFFFFF" stroke="#EEE0B9" filter="url(#shadow)"/>
  <text x="108" y="204" class="cardTitle">已经吸收到当前真源</text>
  <text x="108" y="242" class="body">1. 首版核心主链已经进入当前总规划。</text>
  <text x="108" y="272" class="body">2. 工作台、产品结构、问题边界和版本评审输入已进入 active docs。</text>
  <text x="108" y="302" class="body">3. SVG-first 产物规则已经建立。</text>
  <text x="108" y="332" class="body">4. “Trace 不是附属日志”这一判断已进入当前文档语言。</text>
  <text x="108" y="366" class="tag">已吸收</text>

  <rect x="530" y="156" width="420" height="280" rx="28" fill="#FFFFFF" stroke="#EEE0B9" filter="url(#shadow)"/>
  <text x="562" y="204" class="cardTitle">下一批必须提升为真源</text>
  <text x="562" y="242" class="body">1. 六类专项测试对象与优先进入首版的对象范围。</text>
  <text x="562" y="272" class="body">2. case / suite / evaluator / run / Trace / report / regression 的对象结构。</text>
  <text x="562" y="302" class="body">3. 规则评估器、契约评估器、语义评估器、人工复核评估器的接口口径。</text>
  <text x="562" y="332" class="body">4. 首版约束：字段契约、行为规则、样本资产、正式报告、异常 Trace。</text>
  <text x="562" y="366" class="tag">待升级为真源</text>

  <rect x="984" y="156" width="420" height="280" rx="28" fill="#FFFFFF" stroke="#EEE0B9" filter="url(#shadow)"/>
  <text x="1016" y="204" class="cardTitle">保留为背景附录</text>
  <text x="1016" y="242" class="body">1. 细粒度页面组件拆解和早期页面原型框架。</text>
  <text x="1016" y="272" class="body">2. 旧埋点验收背景说明中不再适合作为平台定义的部分。</text>
  <text x="1016" y="302" class="body">3. 某些过早展开的 UI 说明，可在对象结构稳定后重新生成。</text>
  <text x="1016" y="332" class="body">4. 这些材料仍能提供业务细节，但不再主导平台边界。</text>
  <text x="1016" y="366" class="tag">背景层</text>

  <rect x="76" y="476" width="620" height="246" rx="28" fill="#FFFFFF" stroke="#EEE0B9" filter="url(#shadow)"/>
  <text x="108" y="524" class="cardTitle">为什么要这样吸收</text>
  <text x="108" y="562" class="body">1. 当前项目缺的不是再写一轮抽象定位，而是把已有方法学变成首版可执行的对象、规则和报告结构。</text>
  <text x="108" y="592" class="body">2. 如果不升级这些方法稿，产品规划会一直停在“应该有评测集、评估器、Trace、报告”的口号层。</text>
  <text x="108" y="622" class="body">3. 反过来，如果直接把旧页面草图当真源，又会把项目重新带回页面先行和埋点工具心智。</text>
  <text x="108" y="656" class="tag">吸收原则</text>

  <rect x="730" y="476" width="674" height="246" rx="28" fill="#FFFFFF" stroke="#EEE0B9" filter="url(#shadow)"/>
  <text x="762" y="524" class="cardTitle">建议的 active docs 补齐顺序</text>
  <text x="762" y="562" class="body">1. 首批专项测试对象范围说明。</text>
  <text x="762" y="592" class="body">2. 对象模型文档：case / suite / evaluator / run / Trace / report / regression。</text>
  <text x="762" y="622" class="body">3. 首版门禁口径与报告结构说明。</text>
  <text x="762" y="652" class="body">4. 再回过头补页面与工作台，让页面去承接对象和动作，而不是反过来。</text>
  <text x="762" y="686" class="tag">下一轮文档序列</text>

  <rect x="76" y="762" width="1328" height="250" rx="28" fill="#FFFFFF" stroke="#EEE0B9" filter="url(#shadow)"/>
  <text x="108" y="810" class="cardTitle">一句话落地判断</text>
  <text x="108" y="848" class="body">legacy 最有价值的部分不是“旧页面草图”，而是已经写出来的一整套 AI 应用测试方法、资产组织方式、评估器分层、报告结构和门禁思路。</text>
  <text x="108" y="878" class="body">ChoKoNu 下一轮真正该做的，是把这组内容正式抬升到 active docs 和当前 SVG 真源层，再去推动架构、页面和执行落地。</text>
  <text x="108" y="912" class="tag">结论</text>

  <text x="76" y="1046" class="foot">和 08、09、10 一起使用时，这张图回答的是：过去研究里哪些东西现在必须真的用起来。</text>
</svg>
