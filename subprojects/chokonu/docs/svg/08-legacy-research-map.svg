<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="1080" viewBox="0 0 1480 1080" fill="none">
  <defs>
    <linearGradient id="bg" x1="60" y1="40" x2="1420" y2="1040" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FBF8"/>
      <stop offset="1" stop-color="#EEF7FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#A8C6BE" flood-opacity="0.22"/>
    </filter>
    <style>
      text { font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .title { font-size: 34px; font-weight: 700; fill: #173B37; }
      .subtitle { font-size: 16px; font-weight: 500; fill: #58706B; }
      .cardTitle { font-size: 22px; font-weight: 700; fill: #21453F; }
      .body { font-size: 14px; font-weight: 500; fill: #566B67; }
      .tag { font-size: 12px; font-weight: 700; fill: #1A7F6A; }
      .foot { font-size: 13px; font-weight: 600; fill: #5A716F; }
    </style>
  </defs>
  <rect width="1480" height="1080" fill="url(#bg)"/>
  <text x="76" y="70" class="title">08 Legacy 研究内容总览</text>
  <text x="76" y="102" class="subtitle">把 2026-04-20 pre-reset 阶段留下的研究、竞品和方法稿重新整理，避免后续规划继续只停在抽象层。</text>

  <rect x="76" y="146" width="420" height="260" rx="28" fill="#FFFFFF" stroke="#D4E8E1" filter="url(#shadow)"/>
  <text x="108" y="194" class="cardTitle">一层：竞品与行业研究</text>
  <text x="108" y="232" class="body">1. Coze / Coze Studio / Coze Loop</text>
  <text x="108" y="262" class="body">2. LangSmith / Braintrust</text>
  <text x="108" y="292" class="body">3. 三七互娱、网易、优酷、京东的测试实践</text>
  <text x="108" y="322" class="body">结论不是“做更大平台”，而是先做质量控制面、样本资产、Trace 和门禁闭环。</text>
  <text x="108" y="356" class="tag">外部参照</text>

  <rect x="530" y="146" width="420" height="260" rx="28" fill="#FFFFFF" stroke="#D4E8E1" filter="url(#shadow)"/>
  <text x="562" y="194" class="cardTitle">二层：首版主链方法稿</text>
  <text x="562" y="232" class="body">1. 评测集设计草案</text>
  <text x="562" y="262" class="body">2. 评估器分类与执行草案</text>
  <text x="562" y="292" class="body">3. 自动化测试与评测报告主链路草案</text>
  <text x="562" y="322" class="body">4. demo 系统规划设计提炼、范围说明、最佳实践约束清单</text>
  <text x="562" y="356" class="tag">执行方法</text>

  <rect x="984" y="146" width="420" height="260" rx="28" fill="#FFFFFF" stroke="#D4E8E1" filter="url(#shadow)"/>
  <text x="1016" y="194" class="cardTitle">三层：专项测试方法稿</text>
  <text x="1016" y="232" class="body">六类对象：MCP、Chat、Skill、Agent、知识检索、Workflow。</text>
  <text x="1016" y="262" class="body">每类都不是“写点 case”，而是有对象边界、风险、方法、指标、门禁和待决策项。</text>
  <text x="1016" y="296" class="body">这部分是过去项目里最落地、最容易被忽略的一组研究资产。</text>
  <text x="1016" y="356" class="tag">专项方法学</text>

  <rect x="76" y="446" width="620" height="248" rx="28" fill="#FFFFFF" stroke="#D4E8E1" filter="url(#shadow)"/>
  <text x="108" y="494" class="cardTitle">Legacy 真正沉淀了什么</text>
  <text x="108" y="532" class="body">1. 产品边界：不要做第二个开发平台，要做企业内部 AI 质量控制面。</text>
  <text x="108" y="562" class="body">2. 对象结构：case、suite、baseline、regression、evaluator、run、Trace、report。</text>
  <text x="108" y="592" class="body">3. 质量语言：正确率、覆盖率、幻觉率、工具路径命中率、关键路径成功率、回归率、红线违规率。</text>
  <text x="108" y="622" class="body">4. 治理要求：不是只做调优，而是接到 requirement、version、review、release、gate。</text>
  <text x="108" y="656" class="tag">沉淀结果</text>

  <rect x="730" y="446" width="674" height="248" rx="28" fill="#FFFFFF" stroke="#D4E8E1" filter="url(#shadow)"/>
  <text x="762" y="494" class="cardTitle">过去遗漏的原因</text>
  <text x="762" y="532" class="body">1. 当前 active docs 更多在收敛首版轮廓，尚未把专项方法稿重新纳入真源。</text>
  <text x="762" y="562" class="body">2. 旧埋点验收历史过强，容易让讨论退回“字段检查工具”而不是 AI 测试平台。</text>
  <text x="762" y="592" class="body">3. 竞品研究和方法稿在 legacy 目录中分散，缺少一个 chief-facing 视觉入口。</text>
  <text x="762" y="622" class="body">4. 于是现有 SVG 先覆盖了总规划和结构，却没有把更具体的研究资产展开。</text>
  <text x="762" y="656" class="tag">缺口来源</text>

  <rect x="76" y="734" width="1328" height="272" rx="28" fill="#FFFFFF" stroke="#D4E8E1" filter="url(#shadow)"/>
  <text x="108" y="782" class="cardTitle">这批研究现在应该怎样被吸收</text>
  <text x="108" y="820" class="body">1. 竞品研究进入“平台边界说明”：ChoKoNu 不是开发平台，而是质量控制面。</text>
  <text x="108" y="850" class="body">2. 行业最佳实践进入“首版约束”：字段契约、行为规则、样本资产、自动执行、正式报告、异常 Trace。</text>
  <text x="108" y="880" class="body">3. 主链方法稿进入“执行设计”：case / suite / evaluator / run / Trace / report / regression 的对象关系。</text>
  <text x="108" y="910" class="body">4. 六类专项方法稿进入“首批测试对象选择”：优先收 MCP + Chat/Agent + 知识检索 + Workflow。</text>
  <text x="108" y="940" class="body">5. 页面和工作台设计要反推这些对象与方法，而不是先画页面再想测试学。</text>
  <text x="108" y="974" class="tag">吸收方向</text>

  <text x="76" y="1046" class="foot">建议搭配阅读：09 六类专项测试方法、10 资产到报告执行主链、11 legacy 吸收路线图。</text>
</svg>
