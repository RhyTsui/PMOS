<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="1100" viewBox="0 0 1480 1100" fill="none">
  <defs>
    <linearGradient id="bg" x1="60" y1="40" x2="1420" y2="1060" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5FBFF"/>
      <stop offset="1" stop-color="#F9F7FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#B9C8E1" flood-opacity="0.24"/>
    </filter>
    <style>
      text { font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .title { font-size: 34px; font-weight: 700; fill: #25365D; }
      .subtitle { font-size: 16px; font-weight: 500; fill: #687A9F; }
      .cardTitle { font-size: 22px; font-weight: 700; fill: #2B3F67; }
      .body { font-size: 14px; font-weight: 500; fill: #5D6E91; }
      .tag { font-size: 12px; font-weight: 700; fill: #4D66CC; }
      .foot { font-size: 13px; font-weight: 600; fill: #7081A0; }
    </style>
  </defs>
  <rect width="1480" height="1100" fill="url(#bg)"/>
  <text x="76" y="70" class="title">16 首版页面架构图</text>
  <text x="76" y="102" class="subtitle">从页面层看 ChoKoNu：不是传统后台菜单，而是一条从规则定义到版本门禁的工作台主链。</text>

  <rect x="76" y="156" width="1328" height="96" rx="26" fill="#FFFFFF" stroke="#D9E1F5" filter="url(#shadow)"/>
  <text x="108" y="198" class="cardTitle">顶层结构</text>
  <text x="108" y="228" class="body">左侧是工作台导航，中间是当前对象工作区，右侧是上下文面板与当前版本判断。首屏先看“方案总览”，再切具体工作台。</text>

  <rect x="76" y="304" width="260" height="600" rx="28" fill="#FFFFFF" stroke="#D9E1F5" filter="url(#shadow)"/>
  <text x="108" y="350" class="cardTitle">左侧工作台导航</text>
  <text x="108" y="390" class="body">1. 方案总览</text>
  <text x="108" y="420" class="body">2. 规则中心</text>
  <text x="108" y="450" class="body">3. 样本中心</text>
  <text x="108" y="480" class="body">4. 评测集中心</text>
  <text x="108" y="510" class="body">5. 执行中心</text>
  <text x="108" y="540" class="body">6. 评估中心</text>
  <text x="108" y="570" class="body">7. Trace与结果</text>
  <text x="108" y="600" class="body">8. 报告与门禁</text>
  <text x="108" y="638" class="tag">导航不是模块堆砌，是动作链顺序</text>

  <rect x="372" y="304" width="694" height="600" rx="28" fill="#FFFFFF" stroke="#D9E1F5" filter="url(#shadow)"/>
  <text x="404" y="350" class="cardTitle">中间主工作区</text>
  <text x="404" y="392" class="body">方案总览页：</text>
  <text x="404" y="422" class="body">- 首批对象、核心工作台、P0 能力、当前版本结论</text>
  <text x="404" y="452" class="body">- 页面骨架带、工作台说明、方案判断</text>
  <text x="404" y="492" class="body">具体工作台页：</text>
  <text x="404" y="522" class="body">- 规则中心：红线、主指标、版本回归项</text>
  <text x="404" y="552" class="body">- 样本中心：case 模板、来源、预期、风险</text>
  <text x="404" y="582" class="body">- 评测集中心：baseline / scenario / regression</text>
  <text x="404" y="612" class="body">- 执行中心：run 配置、环境、重试、复跑</text>
  <text x="404" y="642" class="body">- 评估中心：规则 / 契约 / 语义 / 人工复核</text>
  <text x="404" y="672" class="body">- Trace与结果：失败阶段、Trace 入口、case-result-trace 关联</text>
  <text x="404" y="702" class="body">- 报告与门禁：版本对比、风险分布、release 判断</text>
  <text x="404" y="740" class="tag">所有页面都围绕对象和结果，不围绕“运营报表感”</text>

  <rect x="1102" y="304" width="302" height="600" rx="28" fill="#FFFFFF" stroke="#D9E1F5" filter="url(#shadow)"/>
  <text x="1134" y="350" class="cardTitle">右侧上下文区</text>
  <text x="1134" y="390" class="body">1. 当前焦点</text>
  <text x="1134" y="420" class="body">2. 首批对象</text>
  <text x="1134" y="450" class="body">3. 当前版本判断</text>
  <text x="1134" y="480" class="body">4. 当前 gate 状态</text>
  <text x="1134" y="510" class="body">5. chief-facing 快速入口</text>
  <text x="1134" y="548" class="tag">右侧不放装饰，放版本上下文</text>

  <rect x="76" y="950" width="1328" height="106" rx="26" fill="#FFFFFF" stroke="#D9E1F5" filter="url(#shadow)"/>
  <text x="108" y="992" class="cardTitle">页面架构判断</text>
  <text x="108" y="1024" class="body">先有这套页面架构，再去细化视觉、交互和单页信息密度；否则页面会重新回到“看起来很多，但支撑不了测试平台主链”的状态。</text>
</svg>
