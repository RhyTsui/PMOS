<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="1120" viewBox="0 0 1480 1120" fill="none">
  <defs>
    <linearGradient id="bg" x1="60" y1="40" x2="1420" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FCFF"/>
      <stop offset="1" stop-color="#FDF8F2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#B9C7D8" flood-opacity="0.22"/>
    </filter>
    <style>
      text { font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .title { font-size: 34px; font-weight: 700; fill: #23364A; }
      .subtitle { font-size: 16px; font-weight: 500; fill: #667B8E; }
      .cardTitle { font-size: 22px; font-weight: 700; fill: #244055; }
      .body { font-size: 14px; font-weight: 500; fill: #596D7E; }
      .tag { font-size: 12px; font-weight: 700; fill: #2F6DB0; }
      .foot { font-size: 13px; font-weight: 600; fill: #6D7E8B; }
    </style>
  </defs>
  <rect width="1480" height="1120" fill="url(#bg)"/>
  <text x="76" y="70" class="title">12 首批方案范围图</text>
  <text x="76" y="102" class="subtitle">这张图回答一个具体问题：ChoKoNu 首版到底先做哪些对象、哪些能力、哪些不做。</text>

  <rect x="76" y="150" width="420" height="264" rx="28" fill="#FFFFFF" stroke="#D9E5F2" filter="url(#shadow)"/>
  <text x="108" y="198" class="cardTitle">首批必须进入首版的对象</text>
  <text x="108" y="236" class="body">1. MCP</text>
  <text x="108" y="266" class="body">2. Chat / Agent</text>
  <text x="108" y="296" class="body">3. 知识检索</text>
  <text x="108" y="326" class="body">4. Workflow 关键路径</text>
  <text x="108" y="356" class="body">理由：这四类对象最能直接形成质量控制面，且已在 legacy 研究中被反复验证。</text>
  <text x="108" y="390" class="tag">P0 对象</text>

  <rect x="530" y="150" width="420" height="264" rx="28" fill="#FFFFFF" stroke="#D9E5F2" filter="url(#shadow)"/>
  <text x="562" y="198" class="cardTitle">首批必须做的能力</text>
  <text x="562" y="236" class="body">1. 字段契约样本 + 行为规则样本</text>
  <text x="562" y="266" class="body">2. baseline / regression / scenario 三类 suite</text>
  <text x="562" y="296" class="body">3. 规则 / 契约 / 语义 / 人工复核四层 evaluator</text>
  <text x="562" y="326" class="body">4. run、Trace、report、regression 的闭环</text>
  <text x="562" y="356" class="body">5. 版本 gate 所需的最小判断结构</text>
  <text x="562" y="390" class="tag">P0 能力</text>

  <rect x="984" y="150" width="420" height="264" rx="28" fill="#FFFFFF" stroke="#D9E5F2" filter="url(#shadow)"/>
  <text x="1016" y="198" class="cardTitle">首版明确不优先做</text>
  <text x="1016" y="236" class="body">1. 大而全开发平台</text>
  <text x="1016" y="266" class="body">2. 完整线上 observability 云平台</text>
  <text x="1016" y="296" class="body">3. 全量 AI 语义自动评分体系</text>
  <text x="1016" y="326" class="body">4. 全对象、全分支、全自动覆盖</text>
  <text x="1016" y="356" class="body">5. 先画大量页面再回填对象结构</text>
  <text x="1016" y="390" class="tag">延后项</text>

  <rect x="76" y="450" width="620" height="252" rx="28" fill="#FFFFFF" stroke="#D9E5F2" filter="url(#shadow)"/>
  <text x="108" y="498" class="cardTitle">为什么不是六类对象一起上</text>
  <text x="108" y="536" class="body">1. 六类方法学都已经有草案，但首版资源有限，必须优先押中最能形成差异化的对象。</text>
  <text x="108" y="566" class="body">2. Skill 更适合作为 Agent / Workflow 的补充能力验证，而不是首版独立主对象。</text>
  <text x="108" y="596" class="body">3. Workflow 首版也不追求完整覆盖，而是只打关键路径回归。</text>
  <text x="108" y="626" class="body">4. 先把四类对象跑通，比六类对象都只做一层皮更有价值。</text>
  <text x="108" y="660" class="tag">取舍逻辑</text>

  <rect x="730" y="450" width="674" height="252" rx="28" fill="#FFFFFF" stroke="#D9E5F2" filter="url(#shadow)"/>
  <text x="762" y="498" class="cardTitle">首版交付应该长什么样</text>
  <text x="762" y="536" class="body">1. 一套可复用的样本资产，而不是临时脚本。</text>
  <text x="762" y="566" class="body">2. 一套可编排的 suite，而不是零散 case。</text>
  <text x="762" y="596" class="body">3. 一套可组合的 evaluator，而不是一个大打分器。</text>
  <text x="762" y="626" class="body">4. 一套能从 run 追到 Trace、再追到 report 和 regression 的执行链。</text>
  <text x="762" y="660" class="tag">目标形态</text>

  <rect x="76" y="738" width="1328" height="288" rx="28" fill="#FFFFFF" stroke="#D9E5F2" filter="url(#shadow)"/>
  <text x="108" y="786" class="cardTitle">方案结论</text>
  <text x="108" y="824" class="body">ChoKoNu 首版方案不是“先做一个总平台再慢慢填测试方法”，而是反过来：先用专项测试对象和执行主链定义平台边界。</text>
  <text x="108" y="854" class="body">因此首版的最小方案应当是：MCP、Chat/Agent、知识检索、Workflow 关键路径这四类对象 + 样本资产 + suite + evaluator + Trace + report + regression + 最小 gate。</text>
  <text x="108" y="884" class="body">只要这套骨架立住，页面、工作台、版本治理和后续自动评分体系都可以顺着长；如果这套骨架不立住，页面再多也只是壳子。</text>
  <text x="108" y="918" class="tag">方案判断</text>

  <text x="76" y="1080" class="foot">建议继续看：13 版本门禁设计、14 对象模型设计、15 工作台映射设计。</text>
</svg>
