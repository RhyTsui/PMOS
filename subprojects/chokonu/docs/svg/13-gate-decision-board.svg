<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="1080" viewBox="0 0 1480 1080" fill="none">
  <defs>
    <linearGradient id="bg" x1="60" y1="40" x2="1420" y2="1040" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF8F5"/>
      <stop offset="1" stop-color="#F6FBFF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#D7B9AC" flood-opacity="0.22"/>
    </filter>
    <style>
      text { font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .title { font-size: 34px; font-weight: 700; fill: #4A2F23; }
      .subtitle { font-size: 16px; font-weight: 500; fill: #81695F; }
      .cardTitle { font-size: 22px; font-weight: 700; fill: #4A3127; }
      .body { font-size: 14px; font-weight: 500; fill: #6D5A53; }
      .tag { font-size: 12px; font-weight: 700; fill: #B15B3A; }
      .foot { font-size: 13px; font-weight: 600; fill: #836D65; }
    </style>
  </defs>
  <rect width="1480" height="1080" fill="url(#bg)"/>
  <text x="76" y="70" class="title">13 版本门禁与评审判断板</text>
  <text x="76" y="102" class="subtitle">这张图回答“测试结果怎样进入版本判断”，把 legacy 里的门禁思路和当前评审需要接起来。</text>

  <rect x="76" y="150" width="300" height="252" rx="26" fill="#FFFFFF" stroke="#F2DED7" filter="url(#shadow)"/>
  <text x="108" y="196" class="cardTitle">红线项</text>
  <text x="108" y="232" class="body">1. 权限越界</text>
  <text x="108" y="262" class="body">2. 敏感数据泄露</text>
  <text x="108" y="292" class="body">3. 高风险工具误触发</text>
  <text x="108" y="322" class="body">4. 关键业务规则违反</text>
  <text x="108" y="356" class="tag">must-pass</text>

  <rect x="400" y="150" width="300" height="252" rx="26" fill="#FFFFFF" stroke="#F2DED7" filter="url(#shadow)"/>
  <text x="432" y="196" class="cardTitle">主指标项</text>
  <text x="432" y="232" class="body">1. MCP 契约通过率</text>
  <text x="432" y="262" class="body">2. Chat / Agent 任务解决率</text>
  <text x="432" y="292" class="body">3. 知识检索可支撑率</text>
  <text x="432" y="322" class="body">4. Workflow 关键路径成功率</text>
  <text x="432" y="356" class="tag">通过阈值</text>

  <rect x="724" y="150" width="300" height="252" rx="26" fill="#FFFFFF" stroke="#F2DED7" filter="url(#shadow)"/>
  <text x="756" y="196" class="cardTitle">回归项</text>
  <text x="756" y="232" class="body">1. 高风险场景是否恶化</text>
  <text x="756" y="262" class="body">2. 关键 slice 是否退化</text>
  <text x="756" y="292" class="body">3. 多 trial 稳定性是否下降</text>
  <text x="756" y="322" class="body">4. 历史事故样本是否复发</text>
  <text x="756" y="356" class="tag">版本比较</text>

  <rect x="1048" y="150" width="356" height="252" rx="26" fill="#FFFFFF" stroke="#F2DED7" filter="url(#shadow)"/>
  <text x="1080" y="196" class="cardTitle">上线后观察项</text>
  <text x="1080" y="232" class="body">1. 线上 Trace</text>
  <text x="1080" y="262" class="body">2. 告警</text>
  <text x="1080" y="292" class="body">3. 失败样本回流</text>
  <text x="1080" y="322" class="body">4. 用户反馈回流</text>
  <text x="1080" y="356" class="tag">观察层</text>

  <rect x="76" y="438" width="620" height="262" rx="26" fill="#FFFFFF" stroke="#F2DED7" filter="url(#shadow)"/>
  <text x="108" y="484" class="cardTitle">评审结论只保留三种</text>
  <text x="108" y="520" class="body">1. 通过：红线全过，主指标达标，回归未恶化，可以进入下一阶段或版本晋升。</text>
  <text x="108" y="550" class="body">2. 继续：没有红线问题，但主指标未达标或回归项存在不确定，需要继续补齐。</text>
  <text x="108" y="580" class="body">3. 打回：出现红线项，或关键业务成功率明显不达标，当前版本不能进入晋升。</text>
  <text x="108" y="614" class="tag">结论结构</text>

  <rect x="730" y="438" width="674" height="262" rx="26" fill="#FFFFFF" stroke="#F2DED7" filter="url(#shadow)"/>
  <text x="762" y="484" class="cardTitle">评审输出必须包含什么</text>
  <text x="762" y="520" class="body">1. 哪些对象在测：MCP、Chat/Agent、知识检索、Workflow 哪些进入本轮。</text>
  <text x="762" y="550" class="body">2. 哪些 suite 在跑：baseline、regression、scenario 各自覆盖范围。</text>
  <text x="762" y="580" class="body">3. 哪些 evaluator 在判：规则、契约、语义、人工复核各自占比和结果。</text>
  <text x="762" y="610" class="body">4. 哪些失败需要进 regression，哪些需要进人工复核池，哪些影响版本 gate。</text>
  <text x="762" y="644" class="tag">输出字段</text>

  <rect x="76" y="736" width="1328" height="276" rx="26" fill="#FFFFFF" stroke="#F2DED7" filter="url(#shadow)"/>
  <text x="108" y="784" class="cardTitle">设计要点</text>
  <text x="108" y="820" class="body">ChoKoNu 的门禁不应只有一个总分。总分会把对象差异、风险差异和业务差异全部抹平。</text>
  <text x="108" y="850" class="body">更合适的设计是四段式：红线项、主指标项、回归项、上线后观察项。这样既能支持首版，也能为未来 release gate 预留结构。</text>
  <text x="108" y="880" class="body">门禁板的价值不在“替代报告”，而在把报告中的测试结果重新翻译成版本决策语言，供 chief 和版本负责人直接判断。</text>
  <text x="108" y="914" class="tag">方案意义</text>

  <text x="76" y="1046" class="foot">这张图是“方案设计”里最接近版本判断的部分，应与 07 评审准备板一起看。</text>
</svg>
