<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980" fill="none">
  <defs>
    <linearGradient id="bg2" x1="80" y1="40" x2="1320" y2="940" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBFCFF"/>
      <stop offset="1" stop-color="#F1F5FF"/>
    </linearGradient>
    <filter id="s2" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#C1CDE4" flood-opacity="0.25"/>
    </filter>
    <style>
      text { font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .t { font-size: 34px; font-weight: 700; fill: #1F2A44; }
      .st { font-size: 16px; font-weight: 500; fill: #60708F; }
      .h { font-size: 22px; font-weight: 700; fill: #21314B; }
      .b { font-size: 14px; font-weight: 500; fill: #5C6D8A; }
    </style>
  </defs>
  <rect width="1400" height="980" fill="url(#bg2)"/>
  <text x="88" y="68" class="t">02 问题边界与优先级</text>
  <text x="88" y="98" class="st">现有文档已把业务问题收成 12 条，进一步压缩后可归纳为 4 条主轴和 3 层优先级。</text>

  <rect x="88" y="140" width="586" height="228" rx="28" fill="#FFFFFF" stroke="#D8E3F8" filter="url(#s2)"/>
  <text x="122" y="184" class="h">主轴 A：责任与流程不清</text>
  <text x="122" y="220" class="b">1. 验收责任与归属链条不清</text>
  <text x="122" y="248" class="b">2. 缺少统一状态流转和主链路</text>
  <text x="122" y="276" class="b">3. 项目、版本、渠道、包体、节点管理混乱</text>
  <text x="122" y="312" class="b">这类问题决定了事情怎么推进，是所有自动化之前的底层约束。</text>

  <rect x="726" y="140" width="586" height="228" rx="28" fill="#FFFFFF" stroke="#D8E3F8" filter="url(#s2)"/>
  <text x="760" y="184" class="h">主轴 B：文档与规则不成体系</text>
  <text x="760" y="220" class="b">1. 文档与规范不统一、不结构化</text>
  <text x="760" y="248" class="b">2. 验收标准与规则体系不稳定</text>
  <text x="760" y="276" class="b">3. 当前文档与规则不支持后续 AI 研发方式</text>
  <text x="760" y="312" class="b">这类问题决定平台是否能沉淀资产，而不是永远依赖口头经验。</text>

  <rect x="88" y="406" width="586" height="228" rx="28" fill="#FFFFFF" stroke="#D8E3F8" filter="url(#s2)"/>
  <text x="122" y="450" class="h">主轴 C：验收与协同效率太低</text>
  <text x="122" y="486" class="b">1. 数据查询与验收路径低效</text>
  <text x="122" y="514" class="b">2. 自动校验与人工确认没有形成闭环</text>
  <text x="122" y="542" class="b">3. 多角色协作成本过高，重复解释过多</text>
  <text x="122" y="578" class="b">这类问题决定项目是否真正节省带宽，而不是只增加一个系统。</text>

  <rect x="726" y="406" width="586" height="228" rx="28" fill="#FFFFFF" stroke="#D8E3F8" filter="url(#s2)"/>
  <text x="760" y="450" class="h">主轴 D：底座不支持未来 AI 研发</text>
  <text x="760" y="486" class="b">1. 文档不 AI-friendly</text>
  <text x="760" y="514" class="b">2. 规则不 AI-friendly</text>
  <text x="760" y="542" class="b">3. 验收链路无法支撑 AI 驱动的工作流</text>
  <text x="760" y="578" class="b">这类问题决定 ChoKoNu 是不是一个“未来可继续扩展”的平台。</text>

  <rect x="88" y="676" width="1224" height="216" rx="28" fill="#FFFFFF" stroke="#D8E3F8" filter="url(#s2)"/>
  <text x="122" y="720" class="h">优先级判断</text>
  <text x="122" y="760" class="b">P0：责任治理、统一流程、文档规则结构化、规则稳定、协同效率、AI-friendly 基线。这些必须先收住。</text>
  <text x="122" y="790" class="b">P1：项目/版本/渠道管理、数据查询优化、自动校验闭环、知识与排查支持、广告与特殊场景规则接入。</text>
  <text x="122" y="820" class="b">Not-now：复杂研发正确性判断、深度动态逻辑校验、完整根因分析引擎、全量自动化平台、底层链路内部治理。</text>
  <text x="122" y="856" class="b">一句话边界：一期不是解决所有数据与研发正确性问题，而是先把最卡效率的责任、流程、规则、查询和协作问题收住。</text>
</svg>
