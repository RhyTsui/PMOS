<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980" fill="none">
  <defs>
    <linearGradient id="bg3" x1="80" y1="40" x2="1320" y2="940" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#EEF4FF"/>
    </linearGradient>
    <filter id="s3" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#BECBE3" flood-opacity="0.25"/>
    </filter>
    <marker id="arr3" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10V0Z" fill="#6F84A8"/>
    </marker>
    <style>
      text { font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .t { font-size: 34px; font-weight: 700; fill: #1F2A44; }
      .st { font-size: 16px; font-weight: 500; fill: #60708F; }
      .h { font-size: 22px; font-weight: 700; fill: #21314B; }
      .b { font-size: 14px; font-weight: 500; fill: #5C6D8A; }
      .k { font-size: 13px; font-weight: 700; fill: #4D6FA8; }
    </style>
  </defs>
  <rect width="1400" height="980" fill="url(#bg3)"/>
  <text x="88" y="68" class="t">03 首版规划与质量主链</text>
  <text x="88" y="98" class="st">首版规划已经不再是泛 AI 平台，而是明确围绕质量主链收口。</text>

  <rect x="88" y="140" width="1224" height="118" rx="28" fill="#FFFFFF" stroke="#D8E3F8" filter="url(#s3)"/>
  <text x="122" y="186" class="h">首版目标</text>
  <text x="122" y="220" class="b">把 AI 应用测试、评测、自动化回归与结果治理的核心主链跑通，并形成版本评审可用的输入与结论。</text>

  <rect x="88" y="304" width="1224" height="236" rx="28" fill="#FFFFFF" stroke="#D8E3F8" filter="url(#s3)"/>
  <text x="122" y="348" class="h">质量主链</text>

  <rect x="122" y="398" width="116" height="60" rx="18" fill="#F4F8FF" stroke="#D8E4FA"/>
  <text x="151" y="434" class="h" font-size="18">标准</text>
  <rect x="274" y="398" width="116" height="60" rx="18" fill="#F4F8FF" stroke="#D8E4FA"/>
  <text x="303" y="434" class="h" font-size="18">样本</text>
  <rect x="426" y="398" width="116" height="60" rx="18" fill="#F4F8FF" stroke="#D8E4FA"/>
  <text x="443" y="434" class="h" font-size="18">评测集</text>
  <rect x="578" y="398" width="116" height="60" rx="18" fill="#F4F8FF" stroke="#D8E4FA"/>
  <text x="607" y="434" class="h" font-size="18">执行</text>
  <rect x="730" y="398" width="116" height="60" rx="18" fill="#F4F8FF" stroke="#D8E4FA"/>
  <text x="759" y="434" class="h" font-size="18">评估</text>
  <rect x="882" y="398" width="116" height="60" rx="18" fill="#F4F8FF" stroke="#D8E4FA"/>
  <text x="911" y="434" class="h" font-size="18">Trace</text>
  <rect x="1034" y="398" width="116" height="60" rx="18" fill="#FFF8F0" stroke="#F3DEC3"/>
  <text x="1055" y="434" class="h" font-size="18">报告</text>
  <rect x="1186" y="398" width="92" height="60" rx="18" fill="#FFF8F0" stroke="#F3DEC3"/>
  <text x="1199" y="434" class="h" font-size="18">回归</text>

  <path d="M238 428H274" stroke="#6F84A8" stroke-width="3" marker-end="url(#arr3)"/>
  <path d="M390 428H426" stroke="#6F84A8" stroke-width="3" marker-end="url(#arr3)"/>
  <path d="M542 428H578" stroke="#6F84A8" stroke-width="3" marker-end="url(#arr3)"/>
  <path d="M694 428H730" stroke="#6F84A8" stroke-width="3" marker-end="url(#arr3)"/>
  <path d="M846 428H882" stroke="#6F84A8" stroke-width="3" marker-end="url(#arr3)"/>
  <path d="M998 428H1034" stroke="#6F84A8" stroke-width="3" marker-end="url(#arr3)"/>
  <path d="M1150 428H1186" stroke="#6F84A8" stroke-width="3" marker-end="url(#arr3)"/>

  <text x="122" y="504" class="k">含义：不是只跑执行，而是从标准定义一路走到版本沉淀和回归复用。</text>

  <rect x="88" y="586" width="586" height="274" rx="28" fill="#FFFFFF" stroke="#D8E3F8" filter="url(#s3)"/>
  <text x="122" y="630" class="h">首版必须做</text>
  <text x="122" y="666" class="b">1. 测试标准与规则定义</text>
  <text x="122" y="694" class="b">2. 样本资产沉淀</text>
  <text x="122" y="722" class="b">3. 评测集组织与执行入口</text>
  <text x="122" y="750" class="b">4. 评估器分类与执行</text>
  <text x="122" y="778" class="b">5. Trace、报告、回归闭环</text>
  <text x="122" y="806" class="b">6. 版本评审输入能力</text>

  <rect x="726" y="586" width="586" height="274" rx="28" fill="#FFFFFF" stroke="#D8E3F8" filter="url(#s3)"/>
  <text x="760" y="630" class="h">首版不做</text>
  <text x="760" y="666" class="b">1. 通用 AI Agent 开发平台</text>
  <text x="760" y="694" class="b">2. 大而全企业资源门户</text>
  <text x="760" y="722" class="b">3. 复杂跨系统实时治理闭环</text>
  <text x="760" y="750" class="b">4. 无边界扩张的对象中心后台</text>
  <text x="760" y="786" class="k">结论：ChoKoNu 首版先把质量主链跑通，再考虑扩张。</text>
</svg>
