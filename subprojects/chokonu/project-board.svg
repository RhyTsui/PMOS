  <rect x="484" y="380" width="392" height="232" class="card"/>
  <text x="512" y="418" class="cardTitle">Immediate Needed Work</text>
  <text x="512" y="460" class="body">1. Run a real first review round against the current planning package.</text>
  <text x="512" y="492" class="body">2. Convert planning and review artifacts into navigable SVG boards.</text>
  <text x="512" y="524" class="body">3. Refine evaluation-set, evaluator, and report chain into execution-ready slices.</text>

  <rect x="896" y="380" width="392" height="232" class="card"/>
