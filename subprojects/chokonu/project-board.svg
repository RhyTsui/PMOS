  <text x="72" y="116" class="sub">Active root board for the AI testing platform subproject.</text>

  <rect x="72" y="160" width="392" height="180" class="card"/>
  <rect x="72" y="160" width="5" height="180" fill="#10a37f"/>
  <text x="100" y="198" class="cardTitle">Current Position</text>
  <text x="100" y="223" class="meta">partial adoption / planning package in place</text>
  <text x="100" y="258" class="body">ChoKoNu has an active project workflow, PM task sheet, first-version master planning package, and requirement/review input docs. The next valuable step is a real review round.</text>

  <rect x="484" y="160" width="392" height="180" class="card"/>
  <text x="512" y="198" class="cardTitle">Core First-Version Chain</text>
  <text x="512" y="258" class="body">rules -&gt; samples -&gt; evaluation suites -&gt; runs -&gt; evaluators -&gt; trace -&gt; report -&gt; regression asset</text>

  <rect x="896" y="160" width="392" height="180" class="card"/>
  <text x="924" y="198" class="cardTitle">Primary Output Rule</text>
  <text x="924" y="258" class="body">Use SVG planning and decision boards first. Markdown remains the detailed support layer for PM, testing, and review work.</text>

  <rect x="72" y="380" width="392" height="232" class="card"/>
