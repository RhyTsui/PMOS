  <rect x="72" y="160" width="5" height="190" fill="#10a37f"/>
  <text x="100" y="198" class="cardTitle">Current Position</text>
  <text x="100" y="223" class="meta">separate project identity</text>
  <text x="100" y="258" class="body">This project is now distinct from ChoKoNu. It should focus on game event telemetry acceptance and related validation flow rather than the broader AI testing platform scope.</text>

