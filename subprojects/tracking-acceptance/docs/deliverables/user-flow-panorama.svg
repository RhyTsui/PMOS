<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1060" viewBox="0 0 1600 1060">
  <defs>
    <style>
      text { font-family: "Segoe UI Variable", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #2c2218; }
      .title { font-size: 34px; font-weight: 700; }
      .subtitle { font-size: 16px; fill: #675949; }
      .section { font-size: 22px; font-weight: 700; }
      .label { font-size: 14px; font-weight: 700; fill: #6b5a46; letter-spacing: 1px; }
      .cardTitle { font-size: 18px; font-weight: 700; }
      .body { font-size: 14px; fill: #4b3d30; }
      .small { font-size: 12px; fill: #7a6a58; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#6b4e23" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 7 3.5, 0 7" fill="#2054c8"/>
    </marker>
  </defs>

  <rect width="1600" height="1060" fill="#f4efe4"/>
  <rect x="44" y="38" width="1512" height="984" rx="36" fill="#fff9f0" stroke="#e7d8c2"/>

  <text x="84" y="92" class="title">用户流程全景图 · 花花世界埋点验收 Demo</text>
  <text x="84" y="122" class="subtitle">今天的目标不是展示更多页面，而是把“用户怎么走、系统怎么承接、人工在哪里判断、最后输出什么”讲成一条完整主链路。</text>

  <rect x="84" y="164" width="1432" height="132" rx="28" fill="#fef4e8" stroke="#efd7b7"/>
  <text x="112" y="206" class="section">今天的主判断</text>
  <text x="112" y="236" class="body">1. 用户真实问题：资料太散、规则太灰、验收靠人盯，导致链路讲不清、问题查不准。</text>
  <text x="112" y="262" class="body">2. 产品真实任务：把输入、基线、验收和结论沉淀压成最小 AI-native 闭环，而不是继续讨论模板。</text>
  <text x="112" y="288" class="body">3. 今天成功标准：全景图能讲清主链路，demo 能按剧本稳定演示，风险边界被明确标注。</text>

  <g transform="translate(84, 334)">
    <text x="0" y="0" class="section">四层泳道</text>

    <rect x="0" y="28" width="1432" height="128" rx="26" fill="#fff4eb" stroke="#ecd7c5"/>
    <text x="28" y="60" class="label">用户动作</text>
    <rect x="28" y="78" width="410" height="54" rx="18" fill="#ffffff" stroke="#ead7c5" filter="url(#shadow)"/>
    <text x="48" y="110" class="body">提交 RM / SDK / 历史埋点表 / 联调结果</text>
    <rect x="510" y="78" width="370" height="54" rx="18" fill="#ffffff" stroke="#ead7c5" filter="url(#shadow)"/>
    <text x="530" y="110" class="body">指定今天的样例：花花世界</text>
    <rect x="952" y="78" width="430" height="54" rx="18" fill="#ffffff" stroke="#ead7c5" filter="url(#shadow)"/>
    <text x="972" y="110" class="body">要求输出用户流程全景图和可演示 demo</text>

    <rect x="0" y="184" width="1432" height="156" rx="26" fill="#eff6ff" stroke="#c8daf8"/>
    <text x="28" y="216" class="label">AI 系统动作</text>
    <rect x="28" y="236" width="410" height="78" rx="18" fill="#ffffff" stroke="#c8daf8" filter="url(#shadow)"/>
    <text x="48" y="266" class="cardTitle">抽取三条业务链</text>
    <text x="48" y="290" class="body">前置登录链、新手引导链、支付闭环链</text>
    <rect x="510" y="236" width="370" height="78" rx="18" fill="#ffffff" stroke="#c8daf8" filter="url(#shadow)"/>
    <text x="530" y="266" class="cardTitle">识别关键事件与字段</text>
    <text x="530" y="290" class="body">108、106、221、205、getTrackingInfo</text>
    <rect x="952" y="236" width="430" height="78" rx="18" fill="#ffffff" stroke="#c8daf8" filter="url(#shadow)"/>
    <text x="972" y="266" class="cardTitle">生成基线与风险</text>
    <text x="972" y="290" class="body">输出基线、待确认项、演示剧本和今日结论</text>

    <rect x="0" y="368" width="1432" height="128" rx="26" fill="#fff6e9" stroke="#f0d7aa"/>
    <text x="28" y="400" class="label">人工决策动作</text>
    <rect x="28" y="418" width="410" height="54" rx="18" fill="#ffffff" stroke="#f0d7aa" filter="url(#shadow)"/>
    <text x="48" y="450" class="body">确认推荐项是否升级为必接</text>
    <rect x="510" y="418" width="370" height="54" rx="18" fill="#ffffff" stroke="#f0d7aa" filter="url(#shadow)"/>
    <text x="530" y="450" class="body">确认支付链缺字段是否允许放行</text>
    <rect x="952" y="418" width="430" height="54" rx="18" fill="#ffffff" stroke="#f0d7aa" filter="url(#shadow)"/>
    <text x="972" y="450" class="body">确认本轮结果是 solved / partial / unsolved</text>

    <rect x="0" y="524" width="1432" height="128" rx="26" fill="#eefbf1" stroke="#c7eacb"/>
    <text x="28" y="556" class="label">最终输出</text>
    <rect x="28" y="574" width="410" height="54" rx="18" fill="#ffffff" stroke="#c7eacb" filter="url(#shadow)"/>
    <text x="48" y="606" class="body">一份可以直接汇报的用户流程全景图</text>
    <rect x="510" y="574" width="370" height="54" rx="18" fill="#ffffff" stroke="#c7eacb" filter="url(#shadow)"/>
    <text x="530" y="606" class="body">一个按主链路组织的前端 demo</text>
    <rect x="952" y="574" width="430" height="54" rx="18" fill="#ffffff" stroke="#c7eacb" filter="url(#shadow)"/>
    <text x="972" y="606" class="body">风险边界与下一步动作，不假装全部已闭环</text>
  </g>

  <g transform="translate(84, 1012)">
    <line x1="0" y1="0" x2="1410" y2="0" stroke="#d8c7b4"/>
  </g>

  <g transform="translate(84, 1010)">
    <text x="0" y="-36" class="section">三条今天必须讲清的链</text>
    <rect x="0" y="-8" width="448" height="64" rx="22" fill="#ffffff" stroke="#ded0be" filter="url(#shadow)"/>
    <text x="22" y="19" class="cardTitle">前置登录链</text>
    <text x="22" y="43" class="small">启动、资源、SDK 登录、设备获取、接服、网关、角色登录</text>
    <rect x="492" y="-8" width="448" height="64" rx="22" fill="#ffffff" stroke="#ded0be" filter="url(#shadow)"/>
    <text x="514" y="19" class="cardTitle">新手引导链</text>
    <text x="514" y="43" class="small">108 TutorialStep 对齐客户端引导步骤，20001 Tutorial 对齐后端状态</text>
    <rect x="984" y="-8" width="448" height="64" rx="22" fill="#ffffff" stroke="#ded0be" filter="url(#shadow)"/>
    <text x="1006" y="19" class="cardTitle">支付闭环链</text>
    <text x="1006" y="43" class="small">106 前端支付步骤，221 后端支付过程，205 支付成功与发货成功</text>
  </g>

  <path d="M510 490 C470 490, 470 568, 438 568" stroke="#2054c8" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M952 490 C920 490, 920 568, 880 568" stroke="#2054c8" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
</svg>
