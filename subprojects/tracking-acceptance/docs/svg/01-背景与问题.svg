    <linearGradient id="bg" x1="72" y1="40" x2="1368" y2="1060" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF9F2"/>
      <stop offset="1" stop-color="#F3E7D8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#9D8460" flood-opacity="0.18"/>
    </filter>
    <style>
      text { font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
