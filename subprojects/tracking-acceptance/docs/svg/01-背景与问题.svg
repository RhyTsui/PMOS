  <rect width="1440" height="1100" fill="url(#bg)"/>

  <text x="88" y="72" class="title">01 背景与问题</text>
  <text x="88" y="102" class="subtitle">项目先成立于“为什么现在必须做”和“哪些问题必须先收住”，而不是先成立于页面或模块。</text>

  <a href="./00-目录.svg">
    <rect x="1210" y="46" width="142" height="38" rx="19" fill="#FFFFFF" stroke="#D8C8B4"/>
    <text x="1248" y="71" class="link">← 返回目录</text>
  </a>

  <rect x="88" y="144" width="1264" height="148" rx="30" fill="#FFFDF9" stroke="#E3D5C3" filter="url(#shadow)"/>
  <text x="122" y="188" class="section">为什么现在做</text>
  <text x="122" y="218" class="body">团队与业务侧协作效率长期偏低，大量时间耗在文档整理、反复确认、人工验收、问题解释上，已经影响更高价值 AI 工作推进。</text>
  <text x="122" y="244" class="body">同时研发会越来越走 vibe coding / AI 辅助开发。如果文档、规则和验收机制不 AI-friendly，这些问题会被更快放大到实现与交付环节。</text>
  <text x="122" y="270" class="small">结论：先做 AI 埋点验收，不是为了做新平台，而是先解决提效并为后续 AI 研发打底。</text>

  <rect x="88" y="330" width="404" height="306" rx="28" fill="#FFFFFF" stroke="#E5D8C8" filter="url(#shadow)"/>
  <text x="118" y="372" class="section">主轴 A</text>
  <text x="118" y="402" class="card-title">责任和流程不清</text>
  <text x="118" y="434" class="body">• 谁主导文档、谁确认基线、谁推进状态不清。</text>
  <text x="118" y="458" class="body">• 买点验收缺少统一主链路，长期靠群里催和人盯。</text>
  <text x="118" y="482" class="body">• 多角色参与，但责任边界和拍板机制没有收住。</text>
  <text x="118" y="526" class="small">一期直接对应</text>
  <text x="118" y="550" class="body">角色治理、状态机、统一流程、最终确认机制。</text>

  <rect x="518" y="330" width="404" height="306" rx="28" fill="#FFFFFF" stroke="#E5D8C8" filter="url(#shadow)"/>
  <text x="548" y="372" class="section">主轴 B</text>
  <text x="548" y="402" class="card-title">文档和规则不成体系</text>
  <text x="548" y="434" class="body">• 文档灰区多，标准事件和自定义事件治理不一致。</text>
  <text x="548" y="458" class="body">• 规则长期靠人工维护，易遗漏、易冲突。</text>
  <text x="548" y="482" class="body">• 当前文档无法稳定支持 AI 提炼、规则生成和后续研发使用。</text>
  <text x="548" y="526" class="small">一期直接对应</text>
  <text x="548" y="550" class="body">Tracking Spec、字段定义、规则草稿、冲突确认。</text>

  <rect x="948" y="330" width="404" height="306" rx="28" fill="#FFFFFF" stroke="#E5D8C8" filter="url(#shadow)"/>
  <text x="978" y="372" class="section">主轴 C</text>
  <text x="978" y="402" class="card-title">验收和协作效率太低</text>
  <text x="978" y="434" class="body">• 查询路径低效，日志工具不适合验收场景。</text>
  <text x="978" y="458" class="body">• 自动校验与人工确认没有闭环。</text>
  <text x="978" y="482" class="body">• 同一类异常需要被反复解释，知识经验没有接回现场。</text>
  <text x="978" y="526" class="small">一期直接对应</text>
  <text x="978" y="550" class="body">ID/DID + 时间窗口查询、异常摘要、报告、知识链接。</text>

  <rect x="88" y="680" width="1264" height="172" rx="30" fill="#FFFDF9" stroke="#E3D5C3" filter="url(#shadow)"/>
  <text x="122" y="724" class="section">一期边界</text>
  <text x="122" y="756" class="body">一期必须先收住：责任、流程、文档、规则、查询、自动校验闭环、协作提效。</text>
  <text x="122" y="782" class="body">一期不先吞：复杂研发正确性判断、深度动态逻辑校验、完整根因分析引擎、大而全平台化建设。</text>
  <text x="122" y="814" class="small">策略：先把“最卡效率的一条链路”做成最小闭环，再往外扩。</text>

  <rect x="88" y="892" width="1264" height="140" rx="30" fill="#FFFFFF" stroke="#E5D8C8" filter="url(#shadow)"/>
