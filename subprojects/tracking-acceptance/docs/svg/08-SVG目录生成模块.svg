<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <style>
      text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .title { font-size: 34px; font-weight: 700; fill: #111827; }
      .subtitle { font-size: 16px; font-weight: 500; fill: #6b7280; }
      .section { font-size: 20px; font-weight: 700; fill: #111827; }
      .nodeTitle { font-size: 18px; font-weight: 700; fill: #111827; }
      .body { font-size: 14px; font-weight: 500; fill: #374151; }
      .small { font-size: 12px; font-weight: 600; fill: #6b7280; }
      .link { font-size: 14px; font-weight: 700; fill: #2563eb; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#94a3b8" flood-opacity="0.20"/>
    </filter>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
  </defs>
  <rect width="1600" height="980" fill="#ffffff"/>
  <text x="80" y="70" class="title">SVG 可视化与目录生成模块</text>
  <text x="80" y="102" class="subtitle">把标准文档基线自动转成可导航、可汇报、可点击回看的 SVG 图示体系。</text>
  <a href="./05-全景流程图.svg">
    <rect x="1360" y="40" width="160" height="40" rx="20" fill="#ffffff" stroke="#d1d5db"/>
    <text x="1390" y="66" class="link">返回全景流程</text>
  </a>

  <rect x="60" y="150" width="300" height="560" rx="24" fill="#f8fafc" stroke="#dbe3ee"/>
  <text x="90" y="192" class="section">上游输入</text>
  <rect x="90" y="240" width="240" height="70" rx="14" fill="#ffffff" stroke="#d1d5db" filter="url(#shadow)"/>
  <text x="118" y="270" class="body">标准文档基线</text>
  <text x="118" y="292" class="small">事件、字段、差异、待确认项</text>
  <rect x="90" y="340" width="240" height="70" rx="14" fill="#ffffff" stroke="#d1d5db" filter="url(#shadow)"/>
  <text x="118" y="370" class="body">图板模板</text>
  <text x="118" y="392" class="small">全景图、模块图、目录页模板</text>
  <rect x="90" y="440" width="240" height="96" rx="14" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="118" y="472" class="small">设计约束</text>
  <text x="118" y="496" class="body">统一标题、统一层级、统一跳转入口</text>

  <rect x="410" y="150" width="760" height="560" rx="24" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="440" y="192" class="section">生成流程</text>

  <rect x="450" y="250" width="200" height="120" rx="18" fill="#ffffff" stroke="#bfdbfe" filter="url(#shadow)"/>
  <text x="476" y="284" class="nodeTitle">内容分层</text>
  <text x="476" y="310" class="body">总览层</text>
  <text x="476" y="332" class="body">模块层</text>
  <text x="476" y="354" class="body">细节层</text>

  <rect x="690" y="250" width="200" height="120" rx="18" fill="#ffffff" stroke="#bfdbfe" filter="url(#shadow)"/>
  <text x="716" y="284" class="nodeTitle">目录编排</text>
  <text x="716" y="310" class="body">按阅读顺序排序</text>
  <text x="716" y="332" class="body">生成入口页</text>
  <text x="716" y="354" class="body">维护链接关系</text>

  <rect x="930" y="250" width="200" height="120" rx="18" fill="#ffffff" stroke="#bfdbfe" filter="url(#shadow)"/>
  <text x="956" y="284" class="nodeTitle">图示生成</text>
  <text x="956" y="310" class="body">流程图</text>
  <text x="956" y="332" class="body">协同图</text>
  <text x="956" y="354" class="body">模块实现图</text>

  <rect x="570" y="450" width="200" height="120" rx="18" fill="#ffffff" stroke="#bfdbfe" filter="url(#shadow)"/>
  <text x="596" y="484" class="nodeTitle">跳转封装</text>
  <text x="596" y="510" class="body">目录跳子图</text>
  <text x="596" y="532" class="body">子图回目录</text>
  <text x="596" y="554" class="body">形成浏览闭环</text>

  <rect x="810" y="450" width="200" height="120" rx="18" fill="#ffffff" stroke="#bfdbfe" filter="url(#shadow)"/>
  <text x="836" y="484" class="nodeTitle">更新触发</text>
  <text x="836" y="510" class="body">文档变更后重生成</text>
  <text x="836" y="532" class="body">保留版本快照</text>
  <text x="836" y="554" class="body">人工确认后发布</text>

  <path d="M360 275 H450" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <path d="M650 310 H690" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <path d="M890 310 H930" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <path d="M1030 370 V430 H910" stroke="#2563eb" stroke-width="2.5" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M790 370 V430 H670" stroke="#2563eb" stroke-width="2.5" fill="none" marker-end="url(#arrow-blue)"/>

  <rect x="1220" y="150" width="320" height="560" rx="24" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="1250" y="192" class="section">输出结果</text>
  <rect x="1250" y="240" width="260" height="80" rx="14" fill="#ffffff" stroke="#86efac" filter="url(#shadow)"/>
  <text x="1280" y="272" class="body">目录页</text>
  <text x="1280" y="296" class="small">一键进入所有图板</text>
  <rect x="1250" y="350" width="260" height="80" rx="14" fill="#ffffff" stroke="#86efac" filter="url(#shadow)"/>
  <text x="1280" y="382" class="body">全景与模块图</text>
  <text x="1280" y="406" class="small">开会直接投屏讲述</text>
  <rect x="1250" y="460" width="260" height="80" rx="14" fill="#ffffff" stroke="#86efac" filter="url(#shadow)"/>
  <text x="1280" y="492" class="body">可点击回链</text>
  <text x="1280" y="516" class="small">从图回文档或回目录</text>
  <rect x="1250" y="570" width="260" height="96" rx="14" fill="#fff7ed" stroke="#fdba74"/>
  <text x="1280" y="602" class="small">人工确认点</text>
  <text x="1280" y="626" class="body">确认图示逻辑无误后再作为正式展示版本</text>

  <path d="M1130 310 H1250" stroke="#059669" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <path d="M1010 510 H1250" stroke="#059669" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <path d="M770 510 C1070 510, 1110 390, 1250 390" stroke="#059669" stroke-width="2.5" fill="none" marker-end="url(#arrow-green)"/>

  <rect x="60" y="760" width="1480" height="160" rx="24" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="90" y="802" class="section">设计重点</text>
  <text x="90" y="832" class="body">1. SVG 不是装饰图，而是文档体系的主入口、主目录、主讲述界面。</text>
  <text x="90" y="860" class="body">2. 每张图都必须能回目录，目录必须能跳到每张图，避免“图很多但找不到”。</text>
  <text x="90" y="888" class="body">3. 模块图、全景图、协同图共用同一套资产命名和版本逻辑。</text>
</svg>
