<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <style>
      text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .title { font-size: 34px; font-weight: 700; fill: #111827; }
      .subtitle { font-size: 16px; font-weight: 500; fill: #6b7280; }
      .section { font-size: 20px; font-weight: 700; fill: #111827; }
      .nodeTitle { font-size: 18px; font-weight: 700; fill: #111827; }
      .body { font-size: 14px; font-weight: 500; fill: #374151; }
      .small { font-size: 12px; font-weight: 600; fill: #6b7280; }
      .link { font-size: 14px; font-weight: 700; fill: #2563eb; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#94a3b8" flood-opacity="0.20"/>
    </filter>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
  </defs>

  <rect width="1600" height="980" fill="#ffffff"/>

  <text x="80" y="70" class="title">AI 埋点验收全景流程图</text>
  <text x="80" y="102" class="subtitle">第一步只讲全景闭环：从输入收集，到 AI 生成，到人工确认，再到多端调用和版本沉淀。</text>

  <a href="./00-目录.svg">
    <rect x="1380" y="40" width="140" height="40" rx="20" fill="#ffffff" stroke="#d1d5db"/>
    <text x="1415" y="66" class="link">返回目录</text>
  </a>

  <rect x="60" y="140" width="1480" height="170" rx="24" fill="#f8fafc" stroke="#dbe3ee"/>
  <text x="90" y="182" class="section">1. 原始输入层</text>
  <text x="90" y="208" class="small">目标：把分散的业务输入先收进同一条链路。</text>

  <rect x="90" y="228" width="240" height="58" rx="14" fill="#ffffff" stroke="#d1d5db" filter="url(#shadow)"/>
  <text x="116" y="262" class="body">会议纪要 / 沟通结论</text>

  <rect x="360" y="228" width="240" height="58" rx="14" fill="#ffffff" stroke="#d1d5db" filter="url(#shadow)"/>
  <text x="390" y="262" class="body">埋点文档 / 事件表 / 字段表</text>

  <rect x="630" y="228" width="240" height="58" rx="14" fill="#ffffff" stroke="#d1d5db" filter="url(#shadow)"/>
  <text x="660" y="262" class="body">版本变更 / 新需求 / 差异说明</text>

  <rect x="900" y="228" width="240" height="58" rx="14" fill="#ffffff" stroke="#d1d5db" filter="url(#shadow)"/>
  <text x="930" y="262" class="body">研发本地样例 / 联调结果</text>

  <rect x="1170" y="228" width="300" height="58" rx="14" fill="#ffffff" stroke="#d1d5db" filter="url(#shadow)"/>
  <text x="1200" y="262" class="body">数据开发平台查询结果 / 历史验收记录</text>

  <rect x="60" y="340" width="1480" height="250" rx="24" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="90" y="382" class="section">2. AI 中台处理层</text>
  <text x="90" y="408" class="small">目标：把“文档、规则、报告”三类核心资产自动化生成出来。</text>

  <rect x="90" y="440" width="250" height="120" rx="18" fill="#ffffff" stroke="#bfdbfe" filter="url(#shadow)"/>
  <text x="116" y="474" class="nodeTitle">文档自动优化</text>
  <text x="116" y="500" class="body">统一结构</text>
  <text x="116" y="522" class="body">抽取事件与字段</text>
  <text x="116" y="544" class="body">形成标准文档基线</text>

  <rect x="385" y="440" width="250" height="120" rx="18" fill="#ffffff" stroke="#bfdbfe" filter="url(#shadow)"/>
  <text x="411" y="474" class="nodeTitle">目录 + SVG 可视化</text>
  <text x="411" y="500" class="body">自动生成目录导航</text>
  <text x="411" y="522" class="body">自动生成图示</text>
  <text x="411" y="544" class="body">便于汇报与评审</text>

  <rect x="680" y="440" width="250" height="120" rx="18" fill="#ffffff" stroke="#bfdbfe" filter="url(#shadow)"/>
  <text x="706" y="474" class="nodeTitle">规则自动生成</text>
  <text x="706" y="500" class="body">必填校验</text>
  <text x="706" y="522" class="body">枚举 / 格式 / 逻辑约束</text>
  <text x="706" y="544" class="body">生成可执行规则草案</text>

  <rect x="975" y="440" width="250" height="120" rx="18" fill="#ffffff" stroke="#bfdbfe" filter="url(#shadow)"/>
  <text x="1001" y="474" class="nodeTitle">自动检查</text>
  <text x="1001" y="500" class="body">按规则跑检查</text>
  <text x="1001" y="522" class="body">输出异常项</text>
  <text x="1001" y="544" class="body">标记待人工补充</text>

  <rect x="1270" y="440" width="240" height="120" rx="18" fill="#ffffff" stroke="#bfdbfe" filter="url(#shadow)"/>
  <text x="1296" y="474" class="nodeTitle">报告自动输出</text>
  <text x="1296" y="500" class="body">结论摘要</text>
  <text x="1296" y="522" class="body">异常说明</text>
  <text x="1296" y="544" class="body">建议后续动作</text>

  <rect x="60" y="620" width="1480" height="150" rx="24" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="90" y="662" class="section">3. 人工确认与版本治理层</text>
  <text x="90" y="688" class="small">目标：保证 AI 先做，但最终结论和关键变更仍由人兜底。</text>

  <rect x="90" y="708" width="300" height="40" rx="12" fill="#ffffff" stroke="#fdba74" filter="url(#shadow)"/>
  <text x="116" y="733" class="body">人工确认关键字段、灰区规则、例外场景</text>

  <rect x="430" y="708" width="300" height="40" rx="12" fill="#ffffff" stroke="#fdba74" filter="url(#shadow)"/>
  <text x="458" y="733" class="body">确认自动更新是否落版，保留审批痕迹</text>

  <rect x="770" y="708" width="300" height="40" rx="12" fill="#ffffff" stroke="#fdba74" filter="url(#shadow)"/>
  <text x="798" y="733" class="body">记录文档 / 规则 / 报告版本与差异</text>

  <rect x="1110" y="708" width="370" height="40" rx="12" fill="#ffffff" stroke="#fdba74" filter="url(#shadow)"/>
  <text x="1140" y="733" class="body">形成最终验收结论：通过 / 异常 / 待补充</text>

  <rect x="60" y="800" width="1480" height="130" rx="24" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="90" y="842" class="section">4. 调用与查看出口</text>
  <text x="90" y="868" class="small">目标：同一套资产，多处调用，不再散落在不同地方各做一套。</text>

  <rect x="110" y="882" width="250" height="30" rx="10" fill="#ffffff" stroke="#86efac"/>
  <text x="150" y="902" class="body">研发本地：调试 / 查看 / 补充</text>

  <rect x="430" y="882" width="320" height="30" rx="10" fill="#ffffff" stroke="#86efac"/>
  <text x="470" y="902" class="body">数据开发平台：正式执行 / 查询 / 留痕</text>

  <rect x="820" y="882" width="300" height="30" rx="10" fill="#ffffff" stroke="#86efac"/>
  <text x="860" y="902" class="body">小闪机器人：通知 / 快速查询 / 回看</text>

  <rect x="1190" y="882" width="280" height="30" rx="10" fill="#ffffff" stroke="#86efac"/>
  <text x="1220" y="902" class="body">后续模块复用同一套资产</text>

  <path d="M800 286 L800 410" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <rect x="716" y="330" width="168" height="28" rx="8" fill="#ffffff" opacity="0.96"/>
  <text x="735" y="349" class="small">输入进入 AI 主链路</text>

  <path d="M215 560 L215 690" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <path d="M510 560 L510 690" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <path d="M805 560 L805 690" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <path d="M1100 560 L1100 690" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <path d="M1390 560 L1390 690" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)"/>

  <path d="M1295 748 L1295 874" stroke="#059669" stroke-width="3" marker-end="url(#arrow-green)"/>
  <rect x="1220" y="796" width="150" height="28" rx="8" fill="#ffffff" opacity="0.96"/>
  <text x="1240" y="815" class="small">输出到多端</text>

  <path d="M1200 895 C1200 945, 950 945, 950 748" stroke="#ea580c" stroke-width="2.5" fill="none" stroke-dasharray="6 4" marker-end="url(#arrow-orange)"/>
  <rect x="977" y="940" width="210" height="28" rx="8" fill="#ffffff" opacity="0.96"/>
  <text x="994" y="959" class="small">多端反馈再进入下一轮版本</text>

  <g transform="translate(70, 946)">
    <line x1="0" y1="8" x2="34" y2="8" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
    <text x="44" y="12" class="small">主流程</text>
    <line x1="120" y1="8" x2="154" y2="8" stroke="#059669" stroke-width="2.5" marker-end="url(#arrow-green)"/>
    <text x="164" y="12" class="small">输出分发</text>
    <line x1="250" y1="8" x2="284" y2="8" stroke="#ea580c" stroke-width="2.5" stroke-dasharray="6 4" marker-end="url(#arrow-orange)"/>
    <text x="294" y="12" class="small">版本反馈回路</text>
  </g>
</svg>
