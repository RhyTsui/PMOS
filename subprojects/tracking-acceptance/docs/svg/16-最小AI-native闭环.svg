<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <style>
      text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .title { font-size: 34px; font-weight: 700; fill: #111827; }
      .subtitle { font-size: 16px; font-weight: 500; fill: #6b7280; }
      .nodeTitle { font-size: 18px; font-weight: 700; fill: #111827; }
      .body { font-size: 14px; font-weight: 500; fill: #374151; }
      .small { font-size: 12px; font-weight: 600; fill: #6b7280; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#94a3b8" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
  </defs>
  <rect width="1600" height="980" fill="#ffffff"/>
  <text x="80" y="70" class="title">最小 AI-native 闭环</text>
  <text x="80" y="102" class="subtitle">以“新增分析需求”作为验证场景，先跑通需求 -> 规格 -> 验收 -> 结果 -> 版本沉淀。</text>

  <rect x="90" y="180" width="180" height="130" rx="20" fill="#fff7ed" stroke="#fdba74" filter="url(#shadow)"/>
  <text x="116" y="220" class="nodeTitle">1 自然输入</text>
  <text x="116" y="248" class="body">会议纪要</text>
  <text x="116" y="270" class="body">群聊需求</text>
  <text x="116" y="292" class="body">版本变更</text>

  <rect x="320" y="180" width="180" height="130" rx="20" fill="#eff6ff" stroke="#93c5fd" filter="url(#shadow)"/>
  <text x="346" y="220" class="nodeTitle">2 AI 抽需求</text>
  <text x="346" y="248" class="body">识别意图</text>
  <text x="346" y="270" class="body">抽对象</text>
  <text x="346" y="292" class="body">列待确认项</text>

  <rect x="550" y="180" width="180" height="130" rx="20" fill="#eff6ff" stroke="#93c5fd" filter="url(#shadow)"/>
  <text x="576" y="220" class="nodeTitle">3 覆盖判断</text>
  <text x="576" y="248" class="body">现有埋点够不够</text>
  <text x="576" y="270" class="body">缺事件还是字段</text>
  <text x="576" y="292" class="body">缺透传还是口径</text>

  <rect x="780" y="180" width="180" height="130" rx="20" fill="#f0fdf4" stroke="#86efac" filter="url(#shadow)"/>
  <text x="806" y="220" class="nodeTitle">4 生成规格</text>
  <text x="806" y="248" class="body">生成埋点规格初稿</text>
  <text x="806" y="270" class="body">写清业务用途</text>
  <text x="806" y="292" class="body">标记灰区</text>

  <rect x="1010" y="180" width="180" height="130" rx="20" fill="#f0fdf4" stroke="#86efac" filter="url(#shadow)"/>
  <text x="1036" y="220" class="nodeTitle">5 生成验收</text>
  <text x="1036" y="248" class="body">debug 规则</text>
  <text x="1036" y="270" class="body">日志规则</text>
  <text x="1036" y="292" class="body">报表规则</text>

  <rect x="1240" y="180" width="180" height="130" rx="20" fill="#eef2ff" stroke="#a5b4fc" filter="url(#shadow)"/>
  <text x="1266" y="220" class="nodeTitle">6 执行检查</text>
  <text x="1266" y="248" class="body">连接 debug / 日志</text>
  <text x="1266" y="270" class="body">跑规则</text>
  <text x="1266" y="292" class="body">产出结果</text>

  <rect x="250" y="470" width="220" height="140" rx="20" fill="#faf5ff" stroke="#c4b5fd" filter="url(#shadow)"/>
  <text x="278" y="512" class="nodeTitle">7 解释业务影响</text>
  <text x="278" y="540" class="body">不是只报字段错</text>
  <text x="278" y="564" class="body">而是解释伤到哪条链路</text>
  <text x="278" y="588" class="body">归因 / 漏斗 / BI / 付费</text>

  <rect x="560" y="470" width="220" height="140" rx="20" fill="#fff7ed" stroke="#fdba74" filter="url(#shadow)"/>
  <text x="588" y="512" class="nodeTitle">8 只抛必须确认项</text>
  <text x="588" y="540" class="body">灰区</text>
  <text x="588" y="564" class="body">例外</text>
  <text x="588" y="588" class="body">发布是否放行</text>

  <rect x="870" y="470" width="220" height="140" rx="20" fill="#f8fafc" stroke="#d1d5db" filter="url(#shadow)"/>
  <text x="898" y="512" class="nodeTitle">9 版本沉淀</text>
  <text x="898" y="540" class="body">记录 change</text>
  <text x="898" y="564" class="body">生成补验动作</text>
  <text x="898" y="588" class="body">历史可回看</text>

  <rect x="1180" y="470" width="240" height="140" rx="20" fill="#f8fafc" stroke="#d1d5db" filter="url(#shadow)"/>
  <text x="1208" y="512" class="nodeTitle">10 多端同步</text>
  <text x="1208" y="540" class="body">研发本地</text>
  <text x="1208" y="564" class="body">数据开发平台</text>
  <text x="1208" y="588" class="body">机器人通知</text>

  <path d="M270 245 H320" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <path d="M500 245 H550" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <path d="M730 245 H780" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <path d="M960 245 H1010" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <path d="M1190 245 H1240" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>

  <path d="M1330 310 V390 H360 V470" stroke="#2563eb" stroke-width="2.5" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M470 540 H560" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <path d="M780 540 H870" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <path d="M1090 540 H1180" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>

  <path d="M1300 610 C1300 700, 980 720, 980 610" stroke="#ea580c" stroke-width="2.5" fill="none" stroke-dasharray="6 4" marker-end="url(#arrow-orange)"/>
  <rect x="1050" y="726" width="250" height="28" rx="8" fill="#ffffff" opacity="0.96"/>
  <text x="1068" y="745" class="small">结果和变更继续回流到下一轮需求</text>

  <rect x="90" y="840" width="1330" height="90" rx="22" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="120" y="878" class="nodeTitle">闭环成功的关键</text>
  <text x="120" y="906" class="body">不新增主流程，不新增主角色，不新增主负担；只用 AI 吃掉跨角色翻译、灰区暴露、变更追踪这些高频重复劳动。</text>
</svg>
