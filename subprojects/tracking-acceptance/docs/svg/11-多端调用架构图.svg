<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <style>
      text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .title { font-size: 34px; font-weight: 700; fill: #111827; }
      .subtitle { font-size: 16px; font-weight: 500; fill: #6b7280; }
      .section { font-size: 20px; font-weight: 700; fill: #111827; }
      .nodeTitle { font-size: 18px; font-weight: 700; fill: #111827; }
      .body { font-size: 14px; font-weight: 500; fill: #374151; }
      .small { font-size: 12px; font-weight: 600; fill: #6b7280; }
      .link { font-size: 14px; font-weight: 700; fill: #2563eb; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#94a3b8" flood-opacity="0.20"/>
    </filter>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
  </defs>
  <rect width="1600" height="980" fill="#ffffff"/>
  <text x="80" y="70" class="title">多端调用架构图</text>
  <text x="80" y="102" class="subtitle">同一套文档、规则、报告和版本结果，对研发本地、数据开发平台、小闪机器人分别提供不同使用方式。</text>
  <a href="./05-全景流程图.svg">
    <rect x="1360" y="40" width="160" height="40" rx="20" fill="#ffffff" stroke="#d1d5db"/>
    <text x="1390" y="66" class="link">返回全景流程</text>
  </a>

  <rect x="590" y="170" width="420" height="520" rx="28" fill="#eff6ff" stroke="#93c5fd" filter="url(#shadow)"/>
  <text x="630" y="220" class="section">AI 埋点验收核心资产层</text>
  <text x="630" y="248" class="body">统一沉淀、统一查询、统一分发</text>

  <rect x="650" y="300" width="300" height="72" rx="14" fill="#ffffff" stroke="#bfdbfe"/>
  <text x="680" y="330" class="body">标准文档基线</text>
  <text x="680" y="352" class="small">事件 / 字段 / 版本差异</text>

  <rect x="650" y="400" width="300" height="72" rx="14" fill="#ffffff" stroke="#bfdbfe"/>
  <text x="680" y="430" class="body">规则清单 + 自动检查结果</text>
  <text x="680" y="452" class="small">支持执行和回看</text>

  <rect x="650" y="500" width="300" height="72" rx="14" fill="#ffffff" stroke="#bfdbfe"/>
  <text x="680" y="530" class="body">验收报告 + 版本历史</text>
  <text x="680" y="552" class="small">支持通知、回查、复盘</text>

  <rect x="90" y="220" width="320" height="180" rx="24" fill="#ffffff" stroke="#d1d5db" filter="url(#shadow)"/>
  <text x="120" y="262" class="nodeTitle">研发本地</text>
  <text x="120" y="292" class="body">用途：调试、验证样例、补输入、回看规则</text>
  <text x="120" y="320" class="body">关注：单次问题定位、当前版本差异</text>
  <text x="120" y="348" class="body">动作：上传样例、查看结果、补充反馈</text>

  <rect x="1190" y="220" width="320" height="180" rx="24" fill="#ffffff" stroke="#d1d5db" filter="url(#shadow)"/>
  <text x="1220" y="262" class="nodeTitle">数据开发平台</text>
  <text x="1220" y="292" class="body">用途：正式执行、查询、留痕</text>
  <text x="1220" y="320" class="body">关注：批量检查、状态、历史版本</text>
  <text x="1220" y="348" class="body">动作：发起检查、查看报告、追踪结果</text>

  <rect x="1190" y="500" width="320" height="180" rx="24" fill="#ffffff" stroke="#d1d5db" filter="url(#shadow)"/>
  <text x="1220" y="542" class="nodeTitle">小闪机器人</text>
  <text x="1220" y="572" class="body">用途：通知、快速查询、分享结果</text>
  <text x="1220" y="600" class="body">关注：轻入口、快速回执、状态同步</text>
  <text x="1220" y="628" class="body">动作：推送结论、接受查询、回链详情</text>

  <rect x="90" y="500" width="320" height="180" rx="24" fill="#ffffff" stroke="#d1d5db" filter="url(#shadow)"/>
  <text x="120" y="542" class="nodeTitle">后续其他模块</text>
  <text x="120" y="572" class="body">用途：复用同一套标准文档、规则、报告</text>
  <text x="120" y="600" class="body">关注：不要重复造数据结构</text>
  <text x="120" y="628" class="body">动作：按接口或资产读取</text>

  <path d="M410 310 C500 310, 520 336, 650 336" stroke="#2563eb" stroke-width="2.5" fill="none" marker-end="url(#arrow-blue)"/>
  <rect x="470" y="286" width="120" height="28" rx="8" fill="#ffffff" opacity="0.96"/>
  <text x="488" y="305" class="small">补输入与回看</text>

  <path d="M1190 310 C1100 310, 1080 436, 950 436" stroke="#7c3aed" stroke-width="2.5" fill="none" marker-end="url(#arrow-purple)"/>
  <rect x="1010" y="346" width="126" height="28" rx="8" fill="#ffffff" opacity="0.96"/>
  <text x="1028" y="365" class="small">正式执行与查询</text>

  <path d="M950 536 C1080 536, 1100 590, 1190 590" stroke="#059669" stroke-width="2.5" fill="none" marker-end="url(#arrow-green)"/>
  <rect x="1020" y="554" width="126" height="28" rx="8" fill="#ffffff" opacity="0.96"/>
  <text x="1038" y="573" class="small">结果通知与回链</text>

  <path d="M650 536 C520 536, 500 590, 410 590" stroke="#059669" stroke-width="2.5" fill="none" marker-end="url(#arrow-green)"/>
  <rect x="470" y="554" width="120" height="28" rx="8" fill="#ffffff" opacity="0.96"/>
  <text x="490" y="573" class="small">资产复用</text>

  <rect x="60" y="760" width="1480" height="160" rx="24" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="90" y="802" class="section">设计重点</text>
  <text x="90" y="832" class="body">1. 多端只是不同入口，底层必须共用同一套核心资产，不允许各端各存一份口径。</text>
  <text x="90" y="860" class="body">2. 研发本地偏调试，数据开发平台偏正式执行，小闪机器人偏轻量通知和查询。</text>
  <text x="90" y="888" class="body">3. 新模块接入时优先接资产层，而不是绕过中台直接读散落文档。</text>
</svg>
