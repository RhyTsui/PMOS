<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <style>
      text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .title { font-size: 34px; font-weight: 700; fill: #111827; }
      .subtitle { font-size: 16px; font-weight: 500; fill: #6b7280; }
      .section { font-size: 20px; font-weight: 700; fill: #111827; }
      .nodeTitle { font-size: 18px; font-weight: 700; fill: #111827; }
      .body { font-size: 14px; font-weight: 500; fill: #374151; }
      .small { font-size: 12px; font-weight: 600; fill: #6b7280; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#94a3b8" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
  </defs>
  <rect width="1600" height="980" fill="#ffffff"/>
  <text x="80" y="70" class="title">行业研究：数据上报的业务价值链</text>
  <text x="80" y="102" class="subtitle">埋点不是“字段采集”，而是把业务目标翻译成可归因、可分析、可诊断、可协同的数据链路。</text>

  <rect x="60" y="150" width="1480" height="180" rx="24" fill="#f8fafc" stroke="#dbe3ee"/>
  <text x="90" y="194" class="section">上游：业务为什么提出埋点需求</text>
  <rect x="100" y="232" width="260" height="64" rx="16" fill="#ffffff" stroke="#d1d5db" filter="url(#shadow)"/>
  <text x="130" y="270" class="body">广告投放要看渠道效果与 ROI</text>
  <rect x="390" y="232" width="260" height="64" rx="16" fill="#ffffff" stroke="#d1d5db" filter="url(#shadow)"/>
  <text x="420" y="270" class="body">产品要看新手漏斗与转化</text>
  <rect x="680" y="232" width="260" height="64" rx="16" fill="#ffffff" stroke="#d1d5db" filter="url(#shadow)"/>
  <text x="710" y="270" class="body">分析师要做通用报表与定制下钻</text>
  <rect x="970" y="232" width="260" height="64" rx="16" fill="#ffffff" stroke="#d1d5db" filter="url(#shadow)"/>
  <text x="1000" y="270" class="body">数开要能联调、验收、排障</text>
  <rect x="1260" y="232" width="240" height="64" rx="16" fill="#ffffff" stroke="#d1d5db" filter="url(#shadow)"/>
  <text x="1288" y="270" class="body">老板要看预算与结果</text>

  <rect x="60" y="370" width="1480" height="210" rx="24" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="90" y="414" class="section">中游：埋点需求真正承接的对象</text>
  <rect x="100" y="460" width="260" height="86" rx="18" fill="#ffffff" stroke="#bfdbfe" filter="url(#shadow)"/>
  <text x="126" y="492" class="nodeTitle">业务事件</text>
  <text x="126" y="518" class="body">启动、注册、引导步骤、付费等</text>
  <rect x="390" y="460" width="260" height="86" rx="18" fill="#ffffff" stroke="#bfdbfe" filter="url(#shadow)"/>
  <text x="416" y="492" class="nodeTitle">字段与实体</text>
  <text x="416" y="518" class="body">渠道、分包、设备、版本、用户等</text>
  <rect x="680" y="460" width="260" height="86" rx="18" fill="#ffffff" stroke="#bfdbfe" filter="url(#shadow)"/>
  <text x="706" y="492" class="nodeTitle">上报与透传链路</text>
  <text x="706" y="518" class="body">客户端、SDK、服务端、日志、回传</text>
  <rect x="970" y="460" width="260" height="86" rx="18" fill="#ffffff" stroke="#bfdbfe" filter="url(#shadow)"/>
  <text x="996" y="492" class="nodeTitle">归因与聚合口径</text>
  <text x="996" y="518" class="body">organic / non-organic、窗口、去重</text>
  <rect x="1260" y="460" width="240" height="86" rx="18" fill="#ffffff" stroke="#bfdbfe" filter="url(#shadow)"/>
  <text x="1286" y="492" class="nodeTitle">验收规则</text>
  <text x="1286" y="518" class="body">如何判定对、错、灰区</text>

  <rect x="60" y="620" width="1480" height="170" rx="24" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="90" y="664" class="section">下游：数据被谁消费</text>
  <rect x="100" y="700" width="260" height="56" rx="14" fill="#ffffff" stroke="#86efac" filter="url(#shadow)"/>
  <text x="130" y="734" class="body">广告归因与渠道效果</text>
  <rect x="390" y="700" width="260" height="56" rx="14" fill="#ffffff" stroke="#86efac" filter="url(#shadow)"/>
  <text x="420" y="734" class="body">通用 BI 报表</text>
  <rect x="680" y="700" width="260" height="56" rx="14" fill="#ffffff" stroke="#86efac" filter="url(#shadow)"/>
  <text x="710" y="734" class="body">定制探索与多维分析</text>
  <rect x="970" y="700" width="260" height="56" rx="14" fill="#ffffff" stroke="#86efac" filter="url(#shadow)"/>
  <text x="1000" y="734" class="body">漏斗 / 留存 / 付费分析</text>
  <rect x="1260" y="700" width="240" height="56" rx="14" fill="#ffffff" stroke="#86efac" filter="url(#shadow)"/>
  <text x="1288" y="734" class="body">排障与联调结论</text>

  <path d="M800 296 V438" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <path d="M800 546 V678" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <rect x="704" y="340" width="192" height="28" rx="8" fill="#ffffff" opacity="0.96"/>
  <text x="725" y="359" class="small">业务目标被翻译成规格</text>
  <rect x="706" y="596" width="188" height="28" rx="8" fill="#ffffff" opacity="0.96"/>
  <text x="726" y="615" class="small">规格被消费为业务结果</text>

  <rect x="60" y="830" width="1480" height="110" rx="24" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="90" y="872" class="section">关键研究结论</text>
  <text x="90" y="902" class="body">任何一个上报问题，影响的都不是单个字段，而是整条业务消费链。产品真正要解决的是“业务需求到数据消费”的翻译问题。</text>
  <path d="M1260 728 C1330 728, 1360 860, 1100 860" stroke="#ea580c" stroke-width="2.5" fill="none" stroke-dasharray="6 4" marker-end="url(#arrow-orange)"/>
  <rect x="1170" y="812" width="260" height="28" rx="8" fill="#ffffff" opacity="0.96"/>
  <text x="1188" y="831" class="small">下游问题会反向暴露上游规格缺陷</text>
</svg>
