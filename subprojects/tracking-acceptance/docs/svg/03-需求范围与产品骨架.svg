<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1120" viewBox="0 0 1440 1120" fill="none">
  <defs>
    <linearGradient id="bg" x1="64" y1="36" x2="1376" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FCFCFF"/>
      <stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#BAC4E7" flood-opacity="0.24"/>
    </filter>
    <style>
      text { font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .title { font-size: 34px; font-weight: 700; fill: #23284A; }
      .subtitle { font-size: 16px; font-weight: 500; fill: #66739A; }
      .section { font-size: 20px; font-weight: 700; fill: #293456; }
      .card-title { font-size: 18px; font-weight: 700; fill: #253050; }
      .body { font-size: 14px; font-weight: 500; fill: #5E698E; }
      .small { font-size: 12px; font-weight: 600; fill: #7380A8; }
      .link { font-size: 14px; font-weight: 700; fill: #1A73E8; }
    </style>
  </defs>
  <rect width="1440" height="1120" fill="url(#bg)"/>

  <text x="88" y="72" class="title">03 需求范围与产品骨架</text>
  <text x="88" y="102" class="subtitle">先按问题域落需求，再按最小闭环抽产品模块，不反过来先堆页面。</text>

  <a href="./00-目录.svg">
    <rect x="1210" y="46" width="142" height="38" rx="19" fill="#FFFFFF" stroke="#D7DDF5"/>
    <text x="1248" y="71" class="link">← 返回目录</text>
  </a>

  <rect x="88" y="144" width="404" height="320" rx="30" fill="#FFFFFF" stroke="#D9DFF7" filter="url(#shadow)"/>
  <text x="118" y="188" class="section">P0 核心范围</text>
  <text x="118" y="222" class="body">• 责任与角色治理</text>
  <text x="118" y="246" class="body">• 验收流程主链路</text>
  <text x="118" y="270" class="body">• 文档与规范基线</text>
  <text x="118" y="294" class="body">• 规则中心</text>
  <text x="118" y="318" class="body">• 验收执行</text>
  <text x="118" y="342" class="body">• 协作与报告</text>
  <text x="118" y="366" class="body">• AI 输入提炼 / 文档标准化 / 规则生成 / 结果总结</text>
  <text x="118" y="406" class="small">判断标准</text>
  <text x="118" y="430" class="body">这些能力不先做，项目无法真正跑通最小闭环。</text>

  <rect x="518" y="144" width="404" height="320" rx="30" fill="#FFFFFF" stroke="#D9DFF7" filter="url(#shadow)"/>
  <text x="548" y="188" class="section">P1 紧随推进</text>
  <text x="548" y="222" class="body">• 项目 / 版本 / 节点管理</text>
  <text x="548" y="246" class="body">• 知识与排查支撑</text>
  <text x="548" y="270" class="body">• 广告与特殊场景治理</text>
  <text x="548" y="294" class="body">• 历史文档导入与版本继承</text>
  <text x="548" y="406" class="small">判断标准</text>
  <text x="548" y="430" class="body">这些能力能显著增强一期价值，但不应阻塞最小闭环落地。</text>

  <rect x="948" y="144" width="404" height="320" rx="30" fill="#FFFFFF" stroke="#D9DFF7" filter="url(#shadow)"/>
  <text x="978" y="188" class="section">P2 后续增强</text>
  <text x="978" y="222" class="body">• 深度动态逻辑校验</text>
  <text x="978" y="246" class="body">• 更完整的 AI 自动化</text>
  <text x="978" y="270" class="body">• 更完整的持续监控</text>
  <text x="978" y="406" class="small">判断标准</text>
  <text x="978" y="430" class="body">这些能力重要，但不该抢占当前阶段的实施重心。</text>

  <rect x="88" y="514" width="1264" height="334" rx="30" fill="#FFFFFF" stroke="#D9DFF7" filter="url(#shadow)"/>
  <text x="122" y="558" class="section">产品一级模块骨架</text>
  <text x="122" y="586" class="body">先按最小闭环拆成 6 个一级模块，页面和交互都围绕这 6 块展开。</text>

  <rect x="122" y="624" width="170" height="150" rx="24" fill="#F4F7FF" stroke="#D9E2FA"/>
  <text x="146" y="662" class="card-title">输入与提炼</text>
  <text x="146" y="690" class="body">inbox 输入</text>
  <text x="146" y="712" class="body">AI 结构提炼</text>
  <text x="146" y="734" class="body">待确认项</text>

  <rect x="322" y="624" width="170" height="150" rx="24" fill="#F4F7FF" stroke="#D9E2FA"/>
  <text x="346" y="662" class="card-title">文档基线</text>
  <text x="346" y="690" class="body">Tracking Spec</text>
  <text x="346" y="712" class="body">字段定义</text>
  <text x="346" y="734" class="body">版本差异</text>

  <rect x="522" y="624" width="170" height="150" rx="24" fill="#F4F7FF" stroke="#D9E2FA"/>
  <text x="546" y="662" class="card-title">规则中心</text>
  <text x="546" y="690" class="body">规则草稿</text>
  <text x="546" y="712" class="body">冲突确认</text>
  <text x="546" y="734" class="body">生效范围</text>

  <rect x="722" y="624" width="170" height="150" rx="24" fill="#F4F7FF" stroke="#D9E2FA"/>
  <text x="746" y="662" class="card-title">验收执行</text>
  <text x="746" y="690" class="body">查询</text>
  <text x="746" y="712" class="body">自动校验</text>
  <text x="746" y="734" class="body">异常识别</text>

  <rect x="922" y="624" width="170" height="150" rx="24" fill="#F4F7FF" stroke="#D9E2FA"/>
  <text x="946" y="662" class="card-title">协作与报告</text>
  <text x="946" y="690" class="body">角色化输出</text>
  <text x="946" y="712" class="body">报告沉淀</text>
  <text x="946" y="734" class="body">状态透明</text>

  <rect x="1122" y="624" width="170" height="150" rx="24" fill="#F4F7FF" stroke="#D9E2FA"/>
  <text x="1146" y="662" class="card-title">知识与历史</text>
  <text x="1146" y="690" class="body">常见问题</text>
  <text x="1146" y="712" class="body">历史结果</text>
  <text x="1146" y="734" class="body">版本继承</text>

  <text x="122" y="808" class="small">说明</text>
  <text x="122" y="832" class="body">当前前端原型已经按这 6 块完成第一版信息架构，后续真实数据和状态机也应按同样边界接入。</text>

  <rect x="88" y="888" width="1264" height="150" rx="30" fill="#FFFDF9" stroke="#D9DFF7" filter="url(#shadow)"/>
  <text x="122" y="932" class="section">来源文档</text>
  <a href="../requirements/一期需求范围.md"><text x="122" y="962" class="link">requirements/一期需求范围.md</text></a>
  <a href="../src/README.md"><text x="484" y="962" class="link">src/README.md</text></a>
  <a href="../../frontend/README.md"><text x="744" y="962" class="link">frontend/README.md</text></a>
  <text x="122" y="994" class="body">这张图把需求分层和产品模块骨架合并到一张板上，后续讨论范围和模块时优先参照这里。</text>
</svg>
