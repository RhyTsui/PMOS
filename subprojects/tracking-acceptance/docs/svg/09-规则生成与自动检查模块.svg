<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <style>
      text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .title { font-size: 34px; font-weight: 700; fill: #111827; }
      .subtitle { font-size: 16px; font-weight: 500; fill: #6b7280; }
      .section { font-size: 20px; font-weight: 700; fill: #111827; }
      .nodeTitle { font-size: 18px; font-weight: 700; fill: #111827; }
      .body { font-size: 14px; font-weight: 500; fill: #374151; }
      .small { font-size: 12px; font-weight: 600; fill: #6b7280; }
      .link { font-size: 14px; font-weight: 700; fill: #2563eb; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#94a3b8" flood-opacity="0.20"/>
    </filter>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
  </defs>
  <rect width="1600" height="980" fill="#ffffff"/>
  <text x="80" y="70" class="title">规则自动生成与自动检查模块</text>
  <text x="80" y="102" class="subtitle">从标准文档自动产出规则，再驱动自动检查，最后把异常交回人工补充与裁决。</text>
  <a href="./05-全景流程图.svg">
    <rect x="1360" y="40" width="160" height="40" rx="20" fill="#ffffff" stroke="#d1d5db"/>
    <text x="1390" y="66" class="link">返回全景流程</text>
  </a>

  <rect x="60" y="150" width="280" height="560" rx="24" fill="#f8fafc" stroke="#dbe3ee"/>
  <text x="90" y="192" class="section">上游输入</text>
  <rect x="90" y="240" width="220" height="72" rx="14" fill="#ffffff" stroke="#d1d5db" filter="url(#shadow)"/>
  <text x="118" y="270" class="body">标准文档基线</text>
  <text x="118" y="292" class="small">事件、字段、口径说明</text>
  <rect x="90" y="340" width="220" height="72" rx="14" fill="#ffffff" stroke="#d1d5db" filter="url(#shadow)"/>
  <text x="118" y="370" class="body">历史规则与异常样本</text>
  <text x="118" y="392" class="small">复用已有经验</text>
  <rect x="90" y="440" width="220" height="96" rx="14" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="118" y="472" class="small">设计目标</text>
  <text x="118" y="496" class="body">规则结构化、检查自动化、异常显式化</text>

  <rect x="390" y="150" width="820" height="560" rx="24" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="420" y="192" class="section">核心流程</text>

  <rect x="430" y="240" width="220" height="120" rx="18" fill="#ffffff" stroke="#bfdbfe" filter="url(#shadow)"/>
  <text x="456" y="274" class="nodeTitle">规则抽取</text>
  <text x="456" y="300" class="body">必填字段</text>
  <text x="456" y="322" class="body">枚举约束</text>
  <text x="456" y="344" class="body">时间 / 逻辑关系</text>

  <rect x="690" y="240" width="220" height="120" rx="18" fill="#ffffff" stroke="#bfdbfe" filter="url(#shadow)"/>
  <text x="716" y="274" class="nodeTitle">规则结构化</text>
  <text x="716" y="300" class="body">规则 ID</text>
  <text x="716" y="322" class="body">触发条件</text>
  <text x="716" y="344" class="body">失败提示模板</text>

  <rect x="950" y="240" width="220" height="120" rx="18" fill="#ffffff" stroke="#bfdbfe" filter="url(#shadow)"/>
  <text x="976" y="274" class="nodeTitle">自动执行</text>
  <text x="976" y="300" class="body">调用数据源</text>
  <text x="976" y="322" class="body">逐条校验</text>
  <text x="976" y="344" class="body">产出异常明细</text>

  <rect x="560" y="440" width="220" height="120" rx="18" fill="#ffffff" stroke="#bfdbfe" filter="url(#shadow)"/>
  <text x="586" y="474" class="nodeTitle">异常归类</text>
  <text x="586" y="500" class="body">明确异常类型</text>
  <text x="586" y="522" class="body">区分系统问题 / 口径问题</text>
  <text x="586" y="544" class="body">聚合相同异常</text>

  <rect x="850" y="440" width="220" height="120" rx="18" fill="#ffffff" stroke="#bfdbfe" filter="url(#shadow)"/>
  <text x="876" y="474" class="nodeTitle">待人工补充</text>
  <text x="876" y="500" class="body">灰区裁决</text>
  <text x="876" y="522" class="body">例外确认</text>
  <text x="876" y="544" class="body">规则回修建议</text>

  <path d="M340 276 H430" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <path d="M650 300 H690" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <path d="M910 300 H950" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <path d="M1060 360 V420 H960" stroke="#2563eb" stroke-width="2.5" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M950 500 H780" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>

  <rect x="1260" y="150" width="280" height="560" rx="24" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="1290" y="192" class="section">输出</text>
  <rect x="1290" y="240" width="220" height="80" rx="14" fill="#ffffff" stroke="#86efac" filter="url(#shadow)"/>
  <text x="1320" y="272" class="body">规则清单</text>
  <text x="1320" y="296" class="small">后续复用和版本管理</text>
  <rect x="1290" y="350" width="220" height="80" rx="14" fill="#ffffff" stroke="#86efac" filter="url(#shadow)"/>
  <text x="1320" y="382" class="body">自动检查结果</text>
  <text x="1320" y="406" class="small">通过 / 异常 / 未覆盖</text>
  <rect x="1290" y="460" width="220" height="96" rx="14" fill="#fff7ed" stroke="#fdba74"/>
  <text x="1320" y="492" class="small">人工介入点</text>
  <text x="1320" y="516" class="body">只处理灰区和例外，不重新手工跑全量检查</text>

  <path d="M1170 300 H1290" stroke="#059669" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <path d="M1070 500 H1290" stroke="#059669" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <path d="M780 500 C1080 500, 1110 390, 1290 390" stroke="#059669" stroke-width="2.5" fill="none" marker-end="url(#arrow-green)"/>

  <path d="M1290 520 C1180 520, 1130 620, 800 620 C670 620, 660 584, 670 560" stroke="#ea580c" stroke-width="2.5" fill="none" stroke-dasharray="6 4" marker-end="url(#arrow-orange)"/>
  <rect x="930" y="646" width="210" height="28" rx="8" fill="#ffffff" opacity="0.96"/>
  <text x="948" y="665" class="small">人工裁决反向修正规则模型</text>

  <rect x="60" y="760" width="1480" height="160" rx="24" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="90" y="802" class="section">设计重点</text>
  <text x="90" y="832" class="body">1. 规则必须结构化，不允许只存在自然语言说明里。</text>
  <text x="90" y="860" class="body">2. 自动检查负责跑全量，人工只负责处理“自动无法裁决”的部分。</text>
  <text x="90" y="888" class="body">3. 人工补充的结果要能反哺规则模型，逐步减少灰区。</text>
</svg>
