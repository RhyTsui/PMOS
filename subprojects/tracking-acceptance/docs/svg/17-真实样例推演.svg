<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <style>
      text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .title { font-size: 34px; font-weight: 700; fill: #111827; }
      .subtitle { font-size: 16px; font-weight: 500; fill: #6b7280; }
      .nodeTitle { font-size: 18px; font-weight: 700; fill: #111827; }
      .body { font-size: 14px; font-weight: 500; fill: #374151; }
      .small { font-size: 12px; font-weight: 600; fill: #6b7280; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#94a3b8" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
  </defs>
  <rect width="1600" height="980" fill="#ffffff"/>
  <text x="80" y="70" class="title">真实样例推演：新增分析需求</text>
  <text x="80" y="102" class="subtitle">样例：要看巨量安卓分包新用户的新手引导 1/2/3 步流失，以及这些用户后续 7 日付费差异。</text>

  <rect x="60" y="150" width="1480" height="130" rx="24" fill="#fff7ed" stroke="#fdba74"/>
  <text x="90" y="192" class="nodeTitle">原始输入</text>
  <text x="90" y="222" class="body">“想看巨量安卓渠道不同分包的新用户在新手引导第 1、2、3 步的流失情况，并比较这些用户后续 7 日付费差异。”</text>

  <rect x="60" y="320" width="320" height="220" rx="24" fill="#eff6ff" stroke="#93c5fd" filter="url(#shadow)"/>
  <text x="90" y="362" class="nodeTitle">AI 抽出的需求对象</text>
  <text x="90" y="392" class="body">目标：评估分包新用户质量</text>
  <text x="90" y="416" class="body">类型：新分析需求</text>
  <text x="90" y="440" class="body">链路：漏斗 + 7 日付费 + 分包归因</text>
  <text x="90" y="472" class="small">自动识别未知项</text>
  <text x="90" y="496" class="body">新用户定义？</text>
  <text x="90" y="518" class="body">7 日付费窗口锚点？</text>

  <rect x="430" y="320" width="320" height="220" rx="24" fill="#eff6ff" stroke="#93c5fd" filter="url(#shadow)"/>
  <text x="460" y="362" class="nodeTitle">覆盖判断</text>
  <text x="460" y="392" class="body">已有：启动 / 注册 / 付费</text>
  <text x="460" y="416" class="body">部分覆盖：引导步骤事件</text>
  <text x="460" y="440" class="body">未知：付费能否回溯分包 ID</text>
  <text x="460" y="472" class="small">结论</text>
  <text x="460" y="496" class="body">部分覆盖，不能直接上报表</text>

  <rect x="800" y="320" width="320" height="220" rx="24" fill="#f0fdf4" stroke="#86efac" filter="url(#shadow)"/>
  <text x="830" y="362" class="nodeTitle">AI 生成规格与验收</text>
  <text x="830" y="392" class="body">规范 tutorial_step_complete</text>
  <text x="830" y="416" class="body">明确 package_id 透传要求</text>
  <text x="830" y="440" class="body">生成 4 条验收规则</text>
  <text x="830" y="472" class="small">规则重点</text>
  <text x="830" y="496" class="body">步骤完整性 / 枚举一致性 / 分包透传 / 7 日口径</text>

  <rect x="1170" y="320" width="370" height="220" rx="24" fill="#fef2f2" stroke="#fca5a5" filter="url(#shadow)"/>
  <text x="1200" y="362" class="nodeTitle">执行结果</text>
  <text x="1200" y="392" class="body">通过：步骤事件上报</text>
  <text x="1200" y="416" class="body">部分通过：步骤枚举版本不一致</text>
  <text x="1200" y="440" class="body">失败：付费事件无法稳定关联分包 ID</text>
  <text x="1200" y="464" class="body">待确认：7 日付费统计口径</text>

  <path d="M380 430 H430" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <path d="M750 430 H800" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <path d="M1120 430 H1170" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>

  <rect x="120" y="650" width="420" height="190" rx="24" fill="#fff7ed" stroke="#fdba74" filter="url(#shadow)"/>
  <text x="150" y="692" class="nodeTitle">AI 自动解释的业务影响</text>
  <text x="150" y="722" class="body">1. 分包付费差异分析当前不可信</text>
  <text x="150" y="746" class="body">2. 跨版本漏斗对比当前不可信</text>
  <text x="150" y="770" class="body">3. 不能直接据此调预算或改新手引导</text>

  <rect x="620" y="650" width="360" height="190" rx="24" fill="#faf5ff" stroke="#c4b5fd" filter="url(#shadow)"/>
  <text x="650" y="692" class="nodeTitle">AI 只抛给人的确认项</text>
  <text x="650" y="722" class="body">产品：新用户定义</text>
  <text x="650" y="746" class="body">产品 / 分析：7 日付费口径</text>
  <text x="650" y="770" class="body">客户端 / 服务端：谁保证分包透传</text>

  <rect x="1060" y="650" width="360" height="190" rx="24" fill="#f8fafc" stroke="#d1d5db" filter="url(#shadow)"/>
  <text x="1090" y="692" class="nodeTitle">下一步动作</text>
  <text x="1090" y="722" class="body">补 package_id 链路</text>
  <text x="1090" y="746" class="body">统一 tutorial_step_index</text>
  <text x="1090" y="770" class="body">补写口径并重新补验</text>

  <path d="M1355 540 C1355 610, 1180 610, 1180 650" stroke="#dc2626" stroke-width="2.5" fill="none" marker-end="url(#arrow-red)"/>
  <path d="M1355 540 C1355 610, 800 610, 800 650" stroke="#059669" stroke-width="2.5" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M1355 540 C1355 610, 330 610, 330 650" stroke="#059669" stroke-width="2.5" fill="none" marker-end="url(#arrow-green)"/>
</svg>
