<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1120" viewBox="0 0 1440 1120" fill="none">
  <defs>
    <linearGradient id="bg" x1="80" y1="32" x2="1360" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#E8EFFB"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#AFC4E7" flood-opacity="0.24"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10V0Z" fill="#7991BA"/>
    </marker>
    <style>
      text { font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .title { font-size: 34px; font-weight: 700; fill: #1F2A44; }
      .subtitle { font-size: 16px; font-weight: 500; fill: #5E7090; }
      .section { font-size: 20px; font-weight: 700; fill: #24324B; }
      .card-title { font-size: 17px; font-weight: 700; fill: #203049; }
      .body { font-size: 14px; font-weight: 500; fill: #596A87; }
      .small { font-size: 12px; font-weight: 600; fill: #7082A2; }
      .link { font-size: 14px; font-weight: 700; fill: #1A73E8; }
      .white { fill: #FFFFFF; }
    </style>
  </defs>
  <rect width="1440" height="1120" fill="url(#bg)"/>

  <text x="88" y="72" class="title">02 一期方案与主链路</text>
  <text x="88" y="102" class="subtitle">方案的核心不是“纯 AI 替代”，而是 AI 先承担最耗人的结构化工作，人保留确认与裁决。</text>

  <a href="./00-目录.svg">
    <rect x="1210" y="46" width="142" height="38" rx="19" fill="#FFFFFF" stroke="#D5E0F3"/>
    <text x="1248" y="71" class="link">← 返回目录</text>
  </a>

  <rect x="88" y="144" width="1264" height="96" rx="28" fill="#1A73E8" filter="url(#shadow)"/>
  <text x="122" y="186" font-size="24" font-weight="700" class="white">一期方案原则</text>
  <text x="122" y="214" font-size="14" font-weight="500" fill="#DDEBFF">AI 主提效 + 人工做确认 + 系统承接闭环。先跑通最小链路，不先追求复杂自动化和深层根因分析。</text>

  <text x="88" y="284" class="section">8 步主链路</text>

  <rect x="88" y="320" width="136" height="140" rx="24" fill="#FFFFFF" stroke="#D7E3F7" filter="url(#shadow)"/>
  <text x="112" y="360" class="card-title">01 原始输入</text>
  <text x="112" y="388" class="body">会议纪要</text>
  <text x="112" y="410" class="body">需求稿 / Excel</text>
  <text x="112" y="432" class="body">版本说明</text>

  <rect x="252" y="320" width="136" height="140" rx="24" fill="#FFFFFF" stroke="#D7E3F7" filter="url(#shadow)"/>
  <text x="276" y="360" class="card-title">02 AI 提炼</text>
  <text x="276" y="388" class="body">项目 / 版本</text>
  <text x="276" y="410" class="body">事件 / 字段</text>
  <text x="276" y="432" class="body">待确认项</text>

  <rect x="416" y="320" width="136" height="140" rx="24" fill="#FFFFFF" stroke="#D7E3F7" filter="url(#shadow)"/>
  <text x="440" y="360" class="card-title">03 文档基线</text>
  <text x="440" y="388" class="body">标准事件</text>
  <text x="440" y="410" class="body">自定义事件</text>
  <text x="440" y="432" class="body">版本差异</text>

  <rect x="580" y="320" width="136" height="140" rx="24" fill="#FFFFFF" stroke="#D7E3F7" filter="url(#shadow)"/>
  <text x="604" y="360" class="card-title">04 规则生成</text>
  <text x="604" y="388" class="body">必填规则</text>
  <text x="604" y="410" class="body">枚举 / 格式</text>
  <text x="604" y="432" class="body">冲突提示</text>

  <rect x="744" y="320" width="136" height="140" rx="24" fill="#FFFFFF" stroke="#D7E3F7" filter="url(#shadow)"/>
  <text x="768" y="360" class="card-title">05 验收执行</text>
  <text x="768" y="388" class="body">ID / DID</text>
  <text x="768" y="410" class="body">时间窗口</text>
  <text x="768" y="432" class="body">自动校验</text>

  <rect x="908" y="320" width="136" height="140" rx="24" fill="#FFFFFF" stroke="#D7E3F7" filter="url(#shadow)"/>
  <text x="932" y="360" class="card-title">06 异常总结</text>
  <text x="932" y="388" class="body">异常摘要</text>
  <text x="932" y="410" class="body">责任建议</text>
  <text x="932" y="432" class="body">知识链接</text>

  <rect x="1072" y="320" width="136" height="140" rx="24" fill="#FFF8F0" stroke="#EEDABF" filter="url(#shadow)"/>
  <text x="1096" y="360" class="card-title">07 人工确认</text>
  <text x="1096" y="388" class="body">灰区判断</text>
  <text x="1096" y="410" class="body">例外确认</text>
  <text x="1096" y="432" class="body">最终通过</text>

  <rect x="1236" y="320" width="116" height="140" rx="24" fill="#FFF8F0" stroke="#EEDABF" filter="url(#shadow)"/>
  <text x="1258" y="360" class="card-title">08 沉淀</text>
  <text x="1258" y="388" class="body">报告</text>
  <text x="1258" y="410" class="body">状态</text>
  <text x="1258" y="432" class="body">历史</text>

  <path d="M224 390H252" stroke="#7991BA" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M388 390H416" stroke="#7991BA" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M552 390H580" stroke="#7991BA" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M716 390H744" stroke="#7991BA" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M880 390H908" stroke="#7991BA" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1044 390H1072" stroke="#7991BA" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1208 390H1236" stroke="#7991BA" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="88" y="520" width="608" height="232" rx="28" fill="#FFFFFF" stroke="#D7E3F7" filter="url(#shadow)"/>
  <text x="118" y="562" class="section">人机分工</text>
  <text x="118" y="596" class="card-title">AI 负责</text>
  <text x="118" y="622" class="body">• 输入提炼</text>
  <text x="118" y="644" class="body">• 文档标准化</text>
  <text x="118" y="666" class="body">• 规则草稿生成</text>
  <text x="118" y="688" class="body">• 异常总结与角色化输出</text>
  <text x="350" y="596" class="card-title">人工负责</text>
  <text x="350" y="622" class="body">• 确认文档基线</text>
  <text x="350" y="644" class="body">• 确认规则灰区与例外</text>
  <text x="350" y="666" class="body">• 完成最终验收结论</text>
  <text x="350" y="688" class="body">• 拍板争议项</text>

  <rect x="744" y="520" width="608" height="232" rx="28" fill="#FFFFFF" stroke="#D7E3F7" filter="url(#shadow)"/>
  <text x="774" y="562" class="section">系统负责</text>
  <text x="774" y="596" class="body">• 管角色权限</text>
  <text x="774" y="620" class="body">• 管流程状态</text>
  <text x="774" y="644" class="body">• 管版本和节点</text>
  <text x="774" y="668" class="body">• 执行查询和自动校验</text>
  <text x="774" y="692" class="body">• 沉淀报告、异常记录和历史结果</text>
  <text x="774" y="726" class="small">结论：AI 不是裁决者，一期必须保留人工最终确认。</text>

  <rect x="88" y="792" width="1264" height="164" rx="28" fill="#FFFDF9" stroke="#D6E1F4" filter="url(#shadow)"/>
  <text x="122" y="836" class="section">一期不做</text>
  <text x="122" y="868" class="body">• 不做 AI 全自动拍板</text>
  <text x="122" y="892" class="body">• 不做复杂研发正确性判断</text>
  <text x="460" y="868" class="body">• 不做完整根因分析引擎</text>
  <text x="460" y="892" class="body">• 不做重型多 Agent 平台</text>
  <text x="850" y="868" class="body">• 不吞掉所有数据接入和研发问题</text>
  <text x="850" y="892" class="body">• 不先做大而全平台</text>
  <text x="122" y="926" class="small">策略：先把最耗人的结构化和沟通环节交给 AI，把“机器先判，人做最终业务判断”做成稳定闭环。</text>

  <rect x="88" y="982" width="1264" height="96" rx="28" fill="#FFFFFF" stroke="#D7E3F7" filter="url(#shadow)"/>
  <text x="122" y="1024" class="section">来源文档</text>
  <a href="../overview/一期AI方案说明.md"><text x="122" y="1052" class="link">overview/一期AI方案说明.md</text></a>
  <a href="../product/PRD前言.md"><text x="452" y="1052" class="link">product/PRD前言.md</text></a>
</svg>
