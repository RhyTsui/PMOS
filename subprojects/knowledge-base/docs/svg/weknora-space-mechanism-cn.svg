<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1760 1820" role="img" aria-labelledby="title desc">
  <title id="title">WeKnora 空间机制、需求演化与代表性</title>
  <desc id="desc">说明为什么需要空间机制、需求如何从传统权限演化而来、传统账号角色模型为何不足、知识库常见权限设计，以及 WeKnora 的空间机制是否具有普遍代表性。</desc>
  <defs>
    <style>
      text { font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #10243e; }
      .title { font-size: 31px; font-weight: 700; }
      .subtitle { font-size: 16px; fill: #49627d; }
      .section-title { font-size: 22px; font-weight: 700; }
      .label { font-size: 17px; font-weight: 600; }
      .body { font-size: 15px; fill: #35506b; }
      .small { font-size: 14px; fill: #5a7186; }
      .chip { font-size: 14px; font-weight: 700; }
      .mono { font-size: 14px; font-family: "Cascadia Code", "Consolas", monospace; fill: #1e3a5f; }
    </style>
    <marker id="arrowBlue" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2f6fed"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#ea7a22"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#1f9d72"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f8fc"/>
      <stop offset="100%" stop-color="#eef4fb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#a5b6cb" flood-opacity="0.26"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1760" height="1820" fill="url(#bg)"/>
  <rect x="24" y="24" width="1712" height="1772" rx="28" fill="#ffffff" stroke="#d8e2ef"/>

  <text x="64" y="82" class="title">WeKnora 空间机制、需求演化与代表性</text>
  <text x="64" y="110" class="subtitle">空间在 WeKnora 里本质上就是 <tspan class="mono">organization</tspan>。它不是租户，不是知识库本体，而是一个跨租户协作与资源接收的工作区。</text>

  <rect x="56" y="148" width="1648" height="226" rx="22" fill="#f9fbfe" stroke="#dbe5f1"/>
  <text x="84" y="188" class="section-title">1. 先给结论：空间到底是什么</text>

  <rect x="84" y="220" width="382" height="118" rx="18" fill="#edf3ff" stroke="#c9d9ff" filter="url(#shadow)"/>
  <text x="106" y="252" class="label">它是什么</text>
  <text x="106" y="280" class="body">一个可邀请成员、承接资源分享、挂空间角色、做运营治理的协作容器。</text>
  <text x="106" y="306" class="small">成员、分享、审批、搜索发现、邀请码都挂在这层。</text>

  <rect x="500" y="220" width="382" height="118" rx="18" fill="#eefaf6" stroke="#c7eadc" filter="url(#shadow)"/>
  <text x="522" y="252" class="label">它不是什么</text>
  <text x="522" y="280" class="body">不是 tenant，不是部门树，不是知识库本体，也不是资源所有权边界。</text>
  <text x="522" y="306" class="small">它只解决“谁在一个协作圈里接触共享资源”。</text>

  <rect x="916" y="220" width="382" height="118" rx="18" fill="#fff8eb" stroke="#f0d8a6" filter="url(#shadow)"/>
  <text x="938" y="252" class="label">它为什么存在</text>
  <text x="938" y="280" class="body">为了在不打破 tenant 硬隔离的前提下，给跨团队共享建立一个“协作层”。</text>
  <text x="938" y="306" class="small">没有这层，就只能在租户边界上硬共享或复制资源。</text>

  <rect x="1332" y="220" width="344" height="118" rx="18" fill="#f8f1ff" stroke="#ddc9ff" filter="url(#shadow)"/>
  <text x="1354" y="252" class="label">一句话</text>
  <text x="1354" y="280" class="body">space = collaboration layer</text>
  <text x="1354" y="306" class="body">不是 sovereignty layer</text>

  <rect x="56" y="406" width="804" height="380" rx="22" fill="#f9fbfe" stroke="#dbe5f1"/>
  <text x="84" y="446" class="section-title">2. 没有空间机制，哪些需求很难满足</text>

  <rect x="84" y="482" width="352" height="122" rx="18" fill="#ffffff" stroke="#dbe5f1"/>
  <text x="106" y="514" class="label">跨租户共享会变得很粗暴</text>
  <text x="106" y="542" class="body">要么直接开放整个 tenant，要么复制一份资源给对方。</text>
  <text x="106" y="566" class="small">前者过宽，后者带来同步、版本、删除和审计问题。</text>

  <rect x="472" y="482" width="352" height="122" rx="18" fill="#ffffff" stroke="#dbe5f1"/>
  <text x="494" y="514" class="label">无法表达“共享给一群协作者”</text>
  <text x="494" y="542" class="body">只能一对一个人授权，授权对象数量会爆炸。</text>
  <text x="494" y="566" class="small">成员变动后，权限维护成本会非常高。</text>

  <rect x="84" y="630" width="352" height="122" rx="18" fill="#ffffff" stroke="#dbe5f1"/>
  <text x="106" y="662" class="label">共享资源缺少接收治理面</text>
  <text x="106" y="690" class="body">你需要一个“谁能进来、谁能升级角色、谁能取消分享”的地方。</text>
  <text x="106" y="714" class="small">没有空间，这些运营动作都没挂点。</text>

  <rect x="472" y="630" width="352" height="122" rx="18" fill="#ffffff" stroke="#dbe5f1"/>
  <text x="494" y="662" class="label">很难兼顾开放性和边界</text>
  <text x="494" y="690" class="body">你想让资源被搜索发现，但又不想一搜索到就直接拥有高权限。</text>
  <text x="494" y="714" class="small">空间提供了“先加入协作圈，再拿资源访问”的缓冲层。</text>

  <rect x="896" y="406" width="808" height="380" rx="22" fill="#f9fbfe" stroke="#dbe5f1"/>
  <text x="924" y="446" class="section-title">3. 需求是怎么演化出来的</text>

  <rect x="924" y="486" width="180" height="214" rx="18" fill="#edf3ff" stroke="#c9d9ff"/>
  <text x="944" y="518" class="chip" fill="#2f6fed">阶段 1</text>
  <text x="944" y="548" class="label">个人私域</text>
  <text x="944" y="576" class="body">先解决“我自己的知识库 / 智能体怎么用”。</text>
  <text x="944" y="604" class="small">这时账号级权限通常够用。</text>

  <rect x="1120" y="486" width="180" height="214" rx="18" fill="#eefaf6" stroke="#c7eadc"/>
  <text x="1140" y="518" class="chip" fill="#1f9d72">阶段 2</text>
  <text x="1140" y="548" class="label">团队协作</text>
  <text x="1140" y="576" class="body">开始出现“几个人一起维护、一起消费”。</text>
  <text x="1140" y="604" class="small">角色开始出现，但还偏单租户。</text>

  <rect x="1316" y="486" width="180" height="214" rx="18" fill="#fff8eb" stroke="#f0d8a6"/>
  <text x="1336" y="518" class="chip" fill="#ea7a22">阶段 3</text>
  <text x="1336" y="548" class="label">跨组织共享</text>
  <text x="1336" y="576" class="body">资源所有者和使用者不再在同一个租户里。</text>
  <text x="1336" y="604" class="small">这时就需要共享落点和成员治理层。</text>

  <rect x="1512" y="486" width="164" height="214" rx="18" fill="#f8f1ff" stroke="#ddc9ff"/>
  <text x="1532" y="518" class="chip" fill="#7c3aed">阶段 4</text>
  <text x="1532" y="548" class="label">应用投影</text>
  <text x="1532" y="576" class="body">不仅共享知识库，还共享智能体。</text>
  <text x="1532" y="604" class="small">共享开始从资源扩展到应用入口。</text>

  <line x1="1104" y1="592" x2="1120" y2="592" stroke="#2f6fed" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <line x1="1300" y1="592" x2="1316" y2="592" stroke="#2f6fed" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <line x1="1496" y1="592" x2="1512" y2="592" stroke="#2f6fed" stroke-width="3" marker-end="url(#arrowBlue)"/>

  <rect x="924" y="724" width="752" height="36" rx="12" fill="#ffffff" stroke="#dbe5f1"/>
  <text x="946" y="748" class="small">演化本质：从“谁能用我的东西”走向“不同边界上的一群人怎样安全协作地用同一份东西”。</text>

  <rect x="56" y="818" width="1648" height="304" rx="22" fill="#f9fbfe" stroke="#dbe5f1"/>
  <text x="84" y="858" class="section-title">4. 为什么传统的账号 / 角色 / 角色组 / 功能权限 / 数据权限不够</text>

  <rect x="84" y="894" width="300" height="188" rx="18" fill="#ffffff" stroke="#dbe5f1"/>
  <text x="106" y="926" class="label">账号模型只擅长个人授权</text>
  <text x="106" y="954" class="body">它回答“这个人是谁”，</text>
  <text x="106" y="978" class="body">不擅长回答“这个人在哪个协作圈里，以什么身份接触被共享进来的资源”。</text>

  <rect x="408" y="894" width="300" height="188" rx="18" fill="#ffffff" stroke="#dbe5f1"/>
  <text x="430" y="926" class="label">角色模型更偏系统内角色</text>
  <text x="430" y="954" class="body">传统 RBAC 适合后台系统功能菜单授权，</text>
  <text x="430" y="978" class="body">不擅长表达“在 A 空间是 viewer，在 B 空间是 editor”。</text>

  <rect x="732" y="894" width="300" height="188" rx="18" fill="#ffffff" stroke="#dbe5f1"/>
  <text x="754" y="926" class="label">角色组解决的是管理效率</text>
  <text x="754" y="954" class="body">角色组能批量分发角色，</text>
  <text x="754" y="978" class="body">但不天然提供资源接收面、加入流程、分享治理、来源租户切换。</text>

  <rect x="1056" y="894" width="300" height="188" rx="18" fill="#ffffff" stroke="#dbe5f1"/>
  <text x="1078" y="926" class="label">功能权限和知识权限不是一类东西</text>
  <text x="1078" y="954" class="body">菜单能不能点、接口能不能调，</text>
  <text x="1078" y="978" class="body">和“某个共享知识库能不能被搜索、引用、编辑”不是一条权限链。</text>

  <rect x="1380" y="894" width="300" height="188" rx="18" fill="#ffffff" stroke="#dbe5f1"/>
  <text x="1402" y="926" class="label">传统数据权限也不完全够</text>
  <text x="1402" y="954" class="body">数据权限多半针对库表、字段、行级过滤。</text>
  <text x="1402" y="978" class="body">知识场景还要解决协作、分享、引用、应用投影、审计和来源解释。</text>

  <rect x="56" y="1154" width="840" height="396" rx="22" fill="#f9fbfe" stroke="#dbe5f1"/>
  <text x="84" y="1194" class="section-title">5. 知识库权限设计一般有哪些</text>

  <rect x="84" y="1232" width="370" height="132" rx="18" fill="#edf3ff" stroke="#c9d9ff"/>
  <text x="106" y="1264" class="label">A. 所有权模型</text>
  <text x="106" y="1292" class="body">owner / maintainer / consumer</text>
  <text x="106" y="1316" class="small">先回答资源归谁、谁维护、谁消费。</text>

  <rect x="478" y="1232" width="370" height="132" rx="18" fill="#eefaf6" stroke="#c7eadc"/>
  <text x="500" y="1264" class="label">B. 可见范围模型</text>
  <text x="500" y="1292" class="body">private / team / department / public</text>
  <text x="500" y="1316" class="small">回答资源面向谁开放，不直接等同操作权限。</text>

  <rect x="84" y="1392" width="370" height="132" rx="18" fill="#fff8eb" stroke="#f0d8a6"/>
  <text x="106" y="1424" class="label">C. 操作模型</text>
  <text x="106" y="1452" class="body">view / search / cite / edit / publish / admin</text>
  <text x="106" y="1476" class="small">把“看、搜、引、改、发、管”拆开。</text>

  <rect x="478" y="1392" width="370" height="132" rx="18" fill="#f8f1ff" stroke="#ddc9ff"/>
  <text x="500" y="1424" class="label">D. 分享 / 协作模型</text>
  <text x="500" y="1452" class="body">分享给人、分享给组、分享给空间、应用投影</text>
  <text x="500" y="1476" class="small">这是 WeKnora 空间机制重点所在。</text>

  <rect x="936" y="1154" width="768" height="396" rx="22" fill="#f9fbfe" stroke="#dbe5f1"/>
  <text x="964" y="1194" class="section-title">6. 这个空间机制有没有普遍代表性</text>

  <rect x="964" y="1234" width="712" height="138" rx="18" fill="#ffffff" stroke="#dbe5f1" filter="url(#shadow)"/>
  <text x="986" y="1266" class="label">有代表性，但不是唯一答案</text>
  <text x="986" y="1294" class="body">它代表了一类很常见的企业协作思路：保留租户硬隔离，在中间加一个协作空间 / 工作区 / group / project / workspace 层。</text>
  <text x="986" y="1320" class="body">很多产品不一定叫 space，但都会有一个承接共享、成员、角色、运营规则的中间层。</text>

  <rect x="964" y="1398" width="340" height="126" rx="18" fill="#edf3ff" stroke="#c9d9ff"/>
  <text x="986" y="1430" class="label">它的普遍性</text>
  <text x="986" y="1458" class="body">协作容器 + 角色容器 + 分享落点</text>
  <text x="986" y="1482" class="small">这三件事很常见。</text>

  <rect x="1336" y="1398" width="340" height="126" rx="18" fill="#fff8eb" stroke="#f0d8a6"/>
  <text x="1358" y="1430" class="label">它的局限性</text>
  <text x="1358" y="1458" class="body">更适合“跨团队共享协作”，</text>
  <text x="1358" y="1482" class="small">不天然等于公司里的部门树、项目树和个人知识管理体系。</text>

  <rect x="56" y="1584" width="1648" height="176" rx="22" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="84" y="1624" class="section-title">7. 最终判断</text>
  <text x="84" y="1660" class="body">WeKnora 的空间机制解决的是“在不打破 tenant 硬隔离的前提下，让一群协作者接触被分享的知识库和智能体”。</text>
  <text x="84" y="1688" class="body">它对跨租户协作有代表性，但它只覆盖了企业知识权限的一部分。你们后面要做公司级个人 / 部门 / 项目 / 应用 / 工具权限时，不能只靠空间一层解决全部问题。</text>
  <text x="84" y="1716" class="small">一句话：空间很典型，但它是协作层，不是完整企业权限体系本身。</text>

  <rect x="1436" y="70" width="240" height="64" rx="14" fill="#ffffff" stroke="#dbe5f1"/>
  <text x="1456" y="98" class="chip" fill="#2f6fed">蓝色箭头</text>
  <text x="1546" y="98" class="small">需求演化</text>
  <text x="1456" y="122" class="chip" fill="#ea7a22">核心结论</text>
  <text x="1546" y="122" class="small">space 是协作层</text>
</svg>
