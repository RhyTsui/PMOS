<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1640" role="img" aria-labelledby="title desc">
  <title id="title">知识资产平台 v1.1 权限需求分析</title>
  <desc id="desc">从五类业务输入、产品经理拆解、合理性判断、行业最佳实践和待拍板问题出发，对企业内部 AI 应用与知识资产权限需求做需求澄清与分析。</desc>
  <defs>
    <style>
      text { font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .title { font-size: 34px; font-weight: 700; }
      .subtitle { font-size: 19px; fill: #475569; }
      .section { font-size: 24px; font-weight: 700; }
      .label { font-size: 18px; font-weight: 700; }
      .body { font-size: 16px; fill: #334155; }
      .small { font-size: 15px; fill: #64748b; }
      .chip { font-size: 15px; font-weight: 700; }
    </style>
    <marker id="arrowBlue" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#ea580c"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef4fb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#94a3b8" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1800" height="1640" fill="url(#bg)"/>
  <rect x="24" y="24" width="1752" height="1592" rx="28" fill="#ffffff" stroke="#dbe4ee"/>

  <text x="64" y="84" class="title">知识资产平台 v1.1 权限需求分析</text>
  <text x="64" y="116" class="subtitle">当前阶段只做需求澄清与产品分析：先把需求讲清楚、质疑清楚、边界讲清楚，再进入权限设计。</text>

  <rect x="56" y="150" width="1688" height="270" rx="24" fill="#f8fafc" stroke="#dbe4ee"/>
  <text x="84" y="190" class="section">1. 原始需求输入：五类业务场景</text>

  <rect x="84" y="220" width="300" height="160" rx="18" fill="#eff6ff" stroke="#bfdbfe" filter="url(#shadow)"/>
  <text x="106" y="252" class="label">A. 数据部 AI 应用内置知识</text>
  <text x="106" y="282" class="body">游戏数据分析 chat</text>
  <text x="106" y="306" class="body">广告助手 / 诊断 / 联调</text>
  <text x="106" y="330" class="small">不只是问答，还会碰 BI、多维分析、诊断、自动化动作。</text>

  <rect x="408" y="220" width="300" height="160" rx="18" fill="#f0fdf4" stroke="#bbf7d0" filter="url(#shadow)"/>
  <text x="430" y="252" class="label">B. 数据部公共支持库</text>
  <text x="430" y="282" class="body">公司内共享问答与支持资料</text>
  <text x="430" y="306" class="body">FAQ / 指南 / 流程知识</text>
  <text x="430" y="330" class="small">重点是“公司内部公开”，不是面向外部。</text>

  <rect x="732" y="220" width="300" height="160" rx="18" fill="#fff7ed" stroke="#fed7aa" filter="url(#shadow)"/>
  <text x="754" y="252" class="label">C. 各部门 AI 应用挂库</text>
  <text x="754" y="282" class="body">部门 chat / 助手挂内置或外挂库</text>
  <text x="754" y="306" class="body">项目成员维护，普通用户消费</text>
  <text x="754" y="330" class="small">这是“应用治理”问题，不是简单分享问题。</text>

  <rect x="1056" y="220" width="300" height="160" rx="18" fill="#faf5ff" stroke="#ddd6fe" filter="url(#shadow)"/>
  <text x="1078" y="252" class="label">D. 员工个人知识管理</text>
  <text x="1078" y="282" class="body">会议纪要 / 周报 / 策划案</text>
  <text x="1078" y="306" class="body">个人沉淀、分析、洞察</text>
  <text x="1078" y="330" class="small">默认应私有，后续才考虑升级为共享资产。</text>

  <rect x="1380" y="220" width="332" height="160" rx="18" fill="#ecfeff" stroke="#a5f3fc" filter="url(#shadow)"/>
  <text x="1402" y="252" class="label">E. 员工 AI 应用统一挂载能力</text>
  <text x="1402" y="282" class="body">个人 AI 应用可挂个人库</text>
  <text x="1402" y="306" class="body">也可挂公共库或授权库</text>
  <text x="1402" y="330" class="small">核心问题是：应用挂载关系是否独立治理。</text>

  <rect x="56" y="448" width="1028" height="600" rx="24" fill="#f8fafc" stroke="#dbe4ee"/>
  <text x="84" y="488" class="section">2. 产品经理拆解：这不是单一知识库需求</text>

  <rect x="84" y="524" width="214" height="164" rx="18" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="104" y="556" class="label">主体</text>
  <text x="104" y="586" class="body">员工</text>
  <text x="104" y="610" class="body">部门</text>
  <text x="104" y="634" class="body">项目 / 项目组</text>
  <text x="104" y="658" class="body">AI 应用</text>

  <rect x="322" y="524" width="214" height="164" rx="18" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="342" y="556" class="label">资产</text>
  <text x="342" y="586" class="body">个人库</text>
  <text x="342" y="610" class="body">项目库 / 部门库</text>
  <text x="342" y="634" class="body">公共库</text>
  <text x="342" y="658" class="body">应用内置 / 外挂库</text>

  <rect x="560" y="524" width="214" height="164" rx="18" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="580" y="556" class="label">行为</text>
  <text x="580" y="586" class="body">看见 / 检索 / 引用</text>
  <text x="580" y="610" class="body">编辑 / 发布</text>
  <text x="580" y="634" class="body">挂载到 AI 应用</text>
  <text x="580" y="658" class="body">管理授权</text>

  <rect x="798" y="524" width="254" height="164" rx="18" fill="#faf5ff" stroke="#ddd6fe"/>
  <text x="818" y="556" class="label">高风险能力</text>
  <text x="818" y="586" class="body">BI 查询</text>
  <text x="818" y="610" class="body">多维分析</text>
  <text x="818" y="634" class="body">诊断能力</text>
  <text x="818" y="658" class="body">自动联调 / 执行动作</text>

  <rect x="84" y="724" width="968" height="136" rx="18" fill="#ffffff" stroke="#dbe4ee"/>
  <text x="106" y="756" class="label">关键判断 1</text>
  <text x="210" y="756" class="body">这里同时存在“知识权限”和“工具权限”，两者不能混成一条链。</text>
  <text x="106" y="786" class="label">关键判断 2</text>
  <text x="210" y="786" class="body">这里同时存在“使用权限”和“维护权限”，不能只谈能否查看。</text>
  <text x="106" y="816" class="label">关键判断 3</text>
  <text x="210" y="816" class="body">AI 应用本身应视为权限主体和运营对象，而不只是聊天入口。</text>

  <rect x="84" y="888" width="968" height="128" rx="18" fill="#ffffff" stroke="#dbe4ee"/>
  <text x="106" y="920" class="label">阶段结论</text>
  <text x="106" y="948" class="body">这件事的本质是“企业内部 AI 应用与知识资产控制面”，不是普通知识库权限升级版。</text>
  <text x="106" y="974" class="body">如果按单一组织角色去理解，后面一定会在个人资产、应用挂载、工具调用上返工。</text>

  <rect x="1112" y="448" width="632" height="600" rx="24" fill="#f8fafc" stroke="#dbe4ee"/>
  <text x="1140" y="488" class="section">3. 合理性判断与行业最佳实践</text>

  <rect x="1140" y="526" width="576" height="186" rx="18" fill="#ffffff" stroke="#dbe4ee"/>
  <text x="1162" y="558" class="label">为什么需求本身合理</text>
  <text x="1162" y="590" class="body">1. 五类诉求共享同一底层对象：主体、资产、作用域、挂载、策略、工具。</text>
  <text x="1162" y="618" class="body">2. 业务应用增强、公共支持、个人知识管理，本来就是企业 AI 平台的三条主线。</text>
  <text x="1162" y="646" class="body">3. 统一权限中心只做鉴权时，本项目必须自己承担领域授权与运营控制面。</text>
  <text x="1162" y="674" class="body">4. 员工、项目、部门、应用混在一起时，单纯 RBAC 很快就不够用。</text>

  <rect x="1140" y="734" width="576" height="282" rx="18" fill="#ffffff" stroke="#dbe4ee"/>
  <text x="1162" y="766" class="label">行业最佳实践</text>
  <text x="1162" y="796" class="body">1. 不只做 RBAC，要做“主体 + 资源 + 动作 + 作用域 + 策略”。</text>
  <text x="1162" y="824" class="body">2. 默认私有，显式共享；个人资产不能默认外溢到公共域。</text>
  <text x="1162" y="852" class="body">3. 检索、引用、编辑、发布、绑定、执行动作要拆开授权。</text>
  <text x="1162" y="880" class="body">4. AI 应用挂载关系通常独立建模，不依附在“分享”概念下。</text>
  <text x="1162" y="908" class="body">5. 知识权限和数据工具权限分离，避免“能问”自动变成“能执行”。</text>
  <text x="1162" y="936" class="body">6. 要有出处、审计、回收、观察、回退，不然运营上不可控。</text>

  <rect x="56" y="1080" width="1688" height="408" rx="24" fill="#f8fafc" stroke="#dbe4ee"/>
  <text x="84" y="1120" class="section">4. 必须反问并拍板的问题</text>

  <rect x="84" y="1156" width="520" height="292" rx="18" fill="#ffffff" stroke="#dbe4ee" filter="url(#shadow)"/>
  <text x="106" y="1188" class="label">概念边界</text>
  <text x="106" y="1218" class="body">1. “公共”是否统一定义为“公司内部公开”？</text>
  <text x="106" y="1246" class="body">2. 公共资产是可搜索即可，还是可搜索且可引用？</text>
  <text x="106" y="1274" class="body">3. 个人资产能否升级为项目 / 部门 / 公共资产？</text>
  <text x="106" y="1302" class="body">4. 一个资产能否同时属于多个治理域？</text>

  <rect x="628" y="1156" width="520" height="292" rx="18" fill="#ffffff" stroke="#dbe4ee" filter="url(#shadow)"/>
  <text x="650" y="1188" class="label">应用治理</text>
  <text x="650" y="1218" class="body">1. AI 应用是否视为独立权限主体？</text>
  <text x="650" y="1246" class="body">2. 个人知识库能否挂到团队共享应用上？要不要审批？</text>
  <text x="650" y="1274" class="body">3. 应用挂多个知识源时，引用是否要区分来源级别？</text>
  <text x="650" y="1302" class="body">4. 项目解散后，应用绑定和知识资产由谁接管？</text>

  <rect x="1172" y="1156" width="544" height="292" rx="18" fill="#ffffff" stroke="#dbe4ee" filter="url(#shadow)"/>
  <text x="1194" y="1188" class="label">高风险能力</text>
  <text x="1194" y="1218" class="body">1. BI / 诊断 / 联调是否纳入本项目控制面？</text>
  <text x="1194" y="1246" class="body">2. 工具执行结果是否允许沉淀为知识资产？谁审批发布？</text>
  <text x="1194" y="1274" class="body">3. 公司内部公开知识，是否默认可被任何 AI 应用外挂使用？</text>
  <text x="1194" y="1302" class="body">4. 引用到用户无权查看的片段时，回答应该怎么降级？</text>

  <line x1="900" y1="420" x2="900" y2="448" stroke="#2563eb" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <line x1="900" y1="1048" x2="900" y2="1080" stroke="#ea580c" stroke-width="3" marker-end="url(#arrowOrange)"/>

  <rect x="1356" y="66" width="356" height="64" rx="14" fill="#ffffff" stroke="#dbe4ee"/>
  <text x="1378" y="94" class="chip" fill="#2563eb">蓝色箭头</text>
  <text x="1462" y="94" class="small">从原始需求进入产品拆解</text>
  <text x="1378" y="118" class="chip" fill="#ea580c">橙色箭头</text>
  <text x="1462" y="118" class="small">从分析进入待拍板问题</text>

  <rect x="56" y="1516" width="1688" height="72" rx="18" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="84" y="1550" class="label">本阶段产出</text>
  <text x="218" y="1550" class="body">冻结需求语义、拆清边界、形成反问清单。下一步才进入权限设计，而不是现在直接画库表和接口。</text>
  <text x="84" y="1578" class="small">一句话：先确认“这到底是个什么产品问题”，再确认“权限该怎么设计”。</text>
</svg>
