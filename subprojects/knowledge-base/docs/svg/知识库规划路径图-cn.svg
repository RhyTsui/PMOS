<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1640" role="img" aria-labelledby="title desc">
  <title id="title">知识库规划路径图</title>
  <desc id="desc">展示知识库项目从初始设想到关键分叉、被舍弃路径，再到最终确定方向，并把各版本的解决方案挂到路径上。</desc>
  <defs>
    <style>
      text { font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #10243e; }
      .title { font-size: 32px; font-weight: 700; }
      .subtitle { font-size: 16px; fill: #536b84; }
      .section { font-size: 22px; font-weight: 700; }
      .label { font-size: 18px; font-weight: 700; }
      .body { font-size: 15px; fill: #38526d; }
      .small { font-size: 14px; fill: #61788f; }
      .chip { font-size: 14px; font-weight: 700; }
      .mono { font-size: 14px; font-family: "Cascadia Code", "Consolas", monospace; fill: #1d3557; }
    </style>
    <marker id="arrowBlue" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2f6fed"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#ea7a22"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#d9485f"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f8fc"/>
      <stop offset="100%" stop-color="#edf3fa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#a5b6cb" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1800" height="1640" fill="url(#bg)"/>
  <rect x="24" y="24" width="1752" height="1592" rx="28" fill="#ffffff" stroke="#d8e2ef"/>

  <text x="64" y="82" class="title">知识库规划路径图</text>
  <text x="64" y="110" class="subtitle">从推理过程里抽出来的主路径不是“做一个更重的 Wiki”，而是“在现有壳上先把权限、更新、接入、结构和推荐串起来”。</text>

  <rect x="56" y="148" width="332" height="130" rx="20" fill="#edf3ff" stroke="#c9d9ff" filter="url(#shadow)"/>
  <text x="80" y="182" class="chip" fill="#2f6fed">起点</text>
  <text x="80" y="212" class="label">先把知识库做起来</text>
  <text x="80" y="240" class="body">希望在现有 WeKnora 前台上改，</text>
  <text x="80" y="264" class="body">不要一开始重做完整新产品壳。</text>

  <rect x="474" y="72" width="360" height="120" rx="18" fill="#ffffff" stroke="#dbe5f1" filter="url(#shadow)"/>
  <text x="498" y="104" class="chip" fill="#d9485f">被弱化路径</text>
  <text x="498" y="134" class="label">做重型独立 Wiki 壳</text>
  <text x="498" y="162" class="small">投入太大，偏离“先快速落地”的策略。</text>

  <rect x="474" y="228" width="360" height="120" rx="18" fill="#ffffff" stroke="#dbe5f1" filter="url(#shadow)"/>
  <text x="498" y="260" class="chip" fill="#ea7a22">主路径选择</text>
  <text x="498" y="290" class="label">先在现有前台上做有限改造</text>
  <text x="498" y="318" class="small">保留已有壳，优先把权限、更新、结构、接入做出来。</text>

  <line x1="388" y1="212" x2="474" y2="132" stroke="#d9485f" stroke-width="4" marker-end="url(#arrowRed)"/>
  <line x1="388" y1="212" x2="474" y2="288" stroke="#2f6fed" stroke-width="4" marker-end="url(#arrowBlue)"/>

  <rect x="922" y="228" width="360" height="120" rx="18" fill="#eefaf6" stroke="#c7eadc" filter="url(#shadow)"/>
  <text x="946" y="260" class="chip" fill="#1f9d72">第一决策</text>
  <text x="946" y="290" class="label">权限先做</text>
  <text x="946" y="318" class="small">先把组织协作、知识归属、共享边界立住。</text>

  <line x1="834" y1="288" x2="922" y2="288" stroke="#2f6fed" stroke-width="4" marker-end="url(#arrowBlue)"/>

  <rect x="1370" y="228" width="360" height="120" rx="18" fill="#fff8eb" stroke="#f0d8a6" filter="url(#shadow)"/>
  <text x="1394" y="260" class="chip" fill="#ea7a22">第二决策</text>
  <text x="1394" y="290" class="label">更新治理比花哨前台更重要</text>
  <text x="1394" y="318" class="small">先解决更新关系、旧内容淘汰、增量写入与更新判断。</text>

  <line x1="1282" y1="288" x2="1370" y2="288" stroke="#2f6fed" stroke-width="4" marker-end="url(#arrowBlue)"/>

  <rect x="474" y="462" width="360" height="124" rx="18" fill="#ffffff" stroke="#dbe5f1" filter="url(#shadow)"/>
  <text x="498" y="494" class="chip" fill="#d9485f">被弱化</text>
  <text x="498" y="524" class="label">问答沉淀做核心价值</text>
  <text x="498" y="552" class="small">用户未必主动使用，单靠缓存节省成本不够强。</text>

  <rect x="922" y="462" width="360" height="124" rx="18" fill="#ffffff" stroke="#dbe5f1" filter="url(#shadow)"/>
  <text x="946" y="494" class="chip" fill="#ea7a22">转向</text>
  <text x="946" y="524" class="label">从“企业库”转成“双主线”</text>
  <text x="946" y="552" class="small">企业知识库 + 个人知识库，一起形成更强价值闭环。</text>

  <rect x="1370" y="462" width="360" height="124" rx="18" fill="#ffffff" stroke="#dbe5f1" filter="url(#shadow)"/>
  <text x="1394" y="494" class="chip" fill="#1f9d72">确认</text>
  <text x="1394" y="524" class="label">导入能力是关键抓手</text>
  <text x="1394" y="552" class="small">会议纪要、文档中心、绩效、项目系统、邮件、外部订阅要方便进来。</text>

  <line x1="1550" y1="348" x2="1550" y2="462" stroke="#2f6fed" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <line x1="1102" y1="348" x2="1102" y2="462" stroke="#2f6fed" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <path d="M1370 288 C1200 288, 1040 400, 820 510" fill="none" stroke="#d9485f" stroke-width="4" marker-end="url(#arrowRed)"/>

  <rect x="56" y="684" width="1688" height="520" rx="22" fill="#f9fbfe" stroke="#dbe5f1"/>
  <text x="84" y="724" class="section">最终落下来的版本路径与解决方案</text>

  <rect x="84" y="772" width="250" height="186" rx="18" fill="#edf3ff" stroke="#c9d9ff" filter="url(#shadow)"/>
  <text x="106" y="804" class="chip" fill="#2f6fed">1.0</text>
  <text x="170" y="804" class="label">部署</text>
  <text x="106" y="834" class="body">解决什么：</text>
  <text x="106" y="858" class="body">先把底座与现有能力跑起来。</text>
  <text x="106" y="888" class="body">方案：</text>
  <text x="106" y="912" class="small">WeKnora 本地部署、隐藏不必要能力、保留知识库和基础 RAG 服务。</text>

  <rect x="362" y="772" width="250" height="186" rx="18" fill="#eefaf6" stroke="#c7eadc" filter="url(#shadow)"/>
  <text x="384" y="804" class="chip" fill="#1f9d72">1.1</text>
  <text x="448" y="804" class="label">权限</text>
  <text x="384" y="834" class="body">解决什么：</text>
  <text x="384" y="858" class="body">知识归属、组织协作、共享边界。</text>
  <text x="384" y="888" class="body">方案：</text>
  <text x="384" y="912" class="small">在现有系统上先加组织权限层，明确企业库、个人库、协作边界。</text>

  <rect x="640" y="772" width="250" height="186" rx="18" fill="#fff8eb" stroke="#f0d8a6" filter="url(#shadow)"/>
  <text x="662" y="804" class="chip" fill="#ea7a22">1.2</text>
  <text x="726" y="804" class="label">更新</text>
  <text x="662" y="834" class="body">解决什么：</text>
  <text x="662" y="858" class="body">旧文档被召回、更新关系缺失、增量覆盖失真。</text>
  <text x="662" y="888" class="body">方案：</text>
  <text x="662" y="912" class="small">建立更新治理、淘汰关系、增量写入联动，先把“知识会变”管起来。</text>

  <rect x="918" y="772" width="250" height="186" rx="18" fill="#f8f1ff" stroke="#ddc9ff" filter="url(#shadow)"/>
  <text x="940" y="804" class="chip" fill="#7c3aed">1.3</text>
  <text x="1004" y="804" class="label">接入</text>
  <text x="940" y="834" class="body">解决什么：</text>
  <text x="940" y="858" class="body">企业知识和个人知识导入门槛太高。</text>
  <text x="940" y="888" class="body">方案：</text>
  <text x="940" y="912" class="small">接入腾讯会议、钉钉文档、EHR、小亮、邮件、外部订阅、外挂知识库等。</text>

  <rect x="1196" y="772" width="250" height="186" rx="18" fill="#eef7ff" stroke="#c7dff7" filter="url(#shadow)"/>
  <text x="1218" y="804" class="chip" fill="#0f766e">1.4</text>
  <text x="1282" y="804" class="label">广场</text>
  <text x="1218" y="834" class="body">解决什么：</text>
  <text x="1218" y="858" class="body">知识接进来了，但缺发现与共享入口。</text>
  <text x="1218" y="888" class="body">方案：</text>
  <text x="1218" y="912" class="small">做广场，让知识库、外挂知识、公共内容能被浏览、发现、挂载和消费。</text>

  <rect x="1474" y="772" width="250" height="186" rx="18" fill="#fff7ed" stroke="#fdba74" filter="url(#shadow)"/>
  <text x="1496" y="804" class="chip" fill="#c2410c">1.5</text>
  <text x="1560" y="804" class="label">自动标签结构</text>
  <text x="1496" y="834" class="body">解决什么：</text>
  <text x="1496" y="858" class="body">知识进来后仍然散、薄、难组织。</text>
  <text x="1496" y="888" class="body">方案：</text>
  <text x="1496" y="912" class="small">自动标签、自动结构、自动聚合，让知识开始自组织。</text>

  <line x1="334" y1="865" x2="362" y2="865" stroke="#2f6fed" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <line x1="612" y1="865" x2="640" y2="865" stroke="#2f6fed" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <line x1="890" y1="865" x2="918" y2="865" stroke="#2f6fed" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <line x1="1168" y1="865" x2="1196" y2="865" stroke="#2f6fed" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <line x1="1446" y1="865" x2="1474" y2="865" stroke="#2f6fed" stroke-width="4" marker-end="url(#arrowBlue)"/>

  <rect x="318" y="1004" width="1168" height="164" rx="18" fill="#ffffff" stroke="#dbe5f1"/>
  <text x="340" y="1036" class="chip" fill="#7c3aed">1.6</text>
  <text x="404" y="1036" class="label">自动主题 / 自动导航 / 自动推荐</text>
  <text x="340" y="1066" class="body">解决什么：</text>
  <text x="494" y="1066" class="body">知识不只是要被组织，还要被主动导向用户。</text>
  <text x="340" y="1096" class="body">方案：</text>
  <text x="494" y="1096" class="body">在自动标签和自动结构基础上，生成主题、摘要、导航与推荐入口，让系统更接近 LLM Auto Wiki 形态。</text>
  <text x="340" y="1126" class="small">你在推理里也收敛过：如果后续热度统计和问答分析放到 AI 评测系统，这里可以收束到“主题推荐”为止。</text>

  <rect x="56" y="1236" width="1688" height="344" rx="22" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="84" y="1276" class="section">最后确定的方向</text>

  <rect x="84" y="1314" width="1608" height="74" rx="16" fill="#ffffff" stroke="#dbe5f1"/>
  <text x="106" y="1344" class="label">方向 1</text>
  <text x="214" y="1344" class="body">知识库项目不重做完整 Wiki 壳，也不重做完整 Agent / Chat 应用层，而是专注知识资产层和知识治理能力。</text>

  <rect x="84" y="1406" width="1608" height="74" rx="16" fill="#ffffff" stroke="#dbe5f1"/>
  <text x="106" y="1436" class="label">方向 2</text>
  <text x="214" y="1436" class="body">企业知识库和个人知识库并行推进，目标不是只服务公共问答，而是让系统比官方模型更懂员工自己的上下文。</text>

  <rect x="84" y="1498" width="1608" height="18" rx="9" fill="#ffffff" stroke="#dbe5f1"/>
  <text x="106" y="1512" class="small">一句话：先把知识的权限、更新、接入、广场、自动标签结构和主题推荐做好，让系统自然长成更像 LLM Auto Wiki 的形态，而不是先做一个很重的 Wiki 外壳。</text>
</svg>
