<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1180" role="img" aria-labelledby="title desc">
  <title id="title">WeKnora 权限架构</title>
  <desc id="desc">从访问判定、组织运营到二次开发约束，展示 WeKnora 现有权限体系的中文 SVG 图。</desc>
  <defs>
    <style>
      text { font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #10243e; }
      .title { font-size: 30px; font-weight: 700; }
      .subtitle { font-size: 16px; fill: #49627d; }
      .section-title { font-size: 20px; font-weight: 700; }
      .label { font-size: 16px; font-weight: 600; }
      .body { font-size: 15px; fill: #35506b; }
      .small { font-size: 14px; fill: #5a7186; }
      .chip { font-size: 14px; font-weight: 700; }
    </style>
    <marker id="arrowBlue" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2f6fed"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#ea7a22"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#1f9d72"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f8fc"/>
      <stop offset="100%" stop-color="#eef4fb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#a5b6cb" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1600" height="1180" fill="url(#bg)"/>
  <rect x="24" y="24" width="1552" height="1132" rx="28" fill="#ffffff" stroke="#d8e2ef"/>

  <text x="64" y="82" class="title">WeKnora 现有权限架构</text>
  <text x="64" y="110" class="subtitle">依据 organization API、tenant/auth 中间件、知识库分享、智能体分享与知识库访问处理逻辑整理</text>

  <rect x="56" y="146" width="1488" height="430" rx="22" fill="#f9fbfe" stroke="#dbe5f1"/>
  <text x="84" y="186" class="section-title">1. 访问权限如何被判定</text>

  <rect x="84" y="220" width="220" height="120" rx="18" fill="#edf3ff" stroke="#c9d9ff"/>
  <text x="104" y="252" class="label">身份入口</text>
  <text x="104" y="278" class="body">JWT Bearer Token</text>
  <text x="104" y="300" class="body">或 X-API-Key</text>
  <text x="104" y="322" class="small">OIDC 只负责登录，不直接作为业务权限票据。</text>

  <rect x="356" y="220" width="240" height="120" rx="18" fill="#eefaf6" stroke="#c7eadc"/>
  <text x="376" y="252" class="label">租户边界</text>
  <text x="376" y="278" class="body">每个请求先绑定 tenant context。</text>
  <text x="376" y="300" class="body">跨租户切换只在显式全局能力下开放。</text>
  <text x="376" y="322" class="body">tenant 是硬隔离，不是软标签。</text>

  <rect x="648" y="220" width="256" height="120" rx="18" fill="#fff8eb" stroke="#f0d8a6"/>
  <text x="668" y="252" class="label">组织空间角色</text>
  <text x="668" y="278" class="body">成员角色：admin &gt; editor &gt; viewer</text>
  <text x="668" y="300" class="body">角色层级是固定有序的。</text>
  <text x="668" y="322" class="body">创建组织者默认成为空间管理员。</text>

  <rect x="956" y="220" width="250" height="120" rx="18" fill="#f8f1ff" stroke="#ddc9ff"/>
  <text x="976" y="252" class="label">资源分享层</text>
  <text x="976" y="278" class="body">知识库分享：viewer / editor / admin</text>
  <text x="976" y="300" class="body">智能体分享：实现里被强制收敛为 viewer</text>
  <text x="976" y="322" class="small">分享只建立访问桥，不转移所有权。</text>

  <rect x="1258" y="220" width="246" height="120" rx="18" fill="#eef7ff" stroke="#c7dff7"/>
  <text x="1278" y="252" class="label">最终有效权限</text>
  <text x="1278" y="278" class="body">effective = min(组织角色, 分享权限)</text>
  <text x="1278" y="300" class="body">随后切到 source_tenant_id</text>
  <text x="1278" y="322" class="body">去读取真实资源和检索数据。</text>

  <line x1="304" y1="280" x2="356" y2="280" stroke="#2f6fed" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <line x1="596" y1="280" x2="648" y2="280" stroke="#2f6fed" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <line x1="904" y1="280" x2="956" y2="280" stroke="#2f6fed" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <line x1="1206" y1="280" x2="1258" y2="280" stroke="#2f6fed" stroke-width="3" marker-end="url(#arrowBlue)"/>

  <rect x="84" y="382" width="1420" height="162" rx="18" fill="#ffffff" stroke="#dbe5f1"/>
  <text x="106" y="414" class="label">资源访问三条路径</text>

  <rect x="112" y="438" width="392" height="78" rx="14" fill="#edf7f2" stroke="#c9ead8"/>
  <text x="132" y="466" class="chip" fill="#1f9d72">路径 A</text>
  <text x="186" y="466" class="label">本租户自有资源</text>
  <text x="132" y="490" class="body">知识库 tenant 与当前调用 tenant 相同。</text>
  <text x="132" y="510" class="body">结果：拥有者完全控制，删除仍然只允许 owner。</text>

  <rect x="548" y="438" width="432" height="78" rx="14" fill="#eef3ff" stroke="#c9d9ff"/>
  <text x="568" y="466" class="chip" fill="#2f6fed">路径 B</text>
  <text x="622" y="466" class="label">通过组织共享的知识库</text>
  <text x="568" y="490" class="body">先要求用户是该组织成员，再校验 share 记录。</text>
  <text x="568" y="510" class="body">读写能力由“组织角色”和“share 权限”取更低值决定。</text>

  <rect x="1024" y="438" width="452" height="78" rx="14" fill="#fff5eb" stroke="#f0d8a6"/>
  <text x="1044" y="466" class="chip" fill="#ea7a22">路径 C</text>
  <text x="1098" y="466" class="label">通过共享智能体投影出来的访问</text>
  <text x="1044" y="490" class="body">即使没有直接分享知识库，也可能因共享 agent 间接可见。</text>
  <text x="1044" y="510" class="body">这条链路只读，且受 agent 的 KB 选择策略约束。</text>

  <text x="126" y="554" class="small">关键结论：WeKnora 不是一张平面的 RBAC 表，而是“租户隔离 + 空间角色 + 分享桥接 + 来源租户切换”的叠加授权模型。</text>

  <rect x="56" y="604" width="720" height="518" rx="22" fill="#f9fbfe" stroke="#dbe5f1"/>
  <text x="84" y="644" class="section-title">2. 这套权限是怎么运营起来的</text>

  <rect x="84" y="676" width="296" height="186" rx="18" fill="#ffffff" stroke="#dbe5f1" filter="url(#shadow)"/>
  <text x="106" y="708" class="label">组织空间初始化</text>
  <text x="106" y="734" class="body">1. 创建 organization / space</text>
  <text x="106" y="756" class="body">2. 设置 member_limit</text>
  <text x="106" y="778" class="body">3. 设置 invite_code_validity_days</text>
  <text x="106" y="800" class="body">4. 打开或关闭 require_approval</text>
  <text x="106" y="822" class="body">5. 打开或关闭 searchable</text>
  <text x="106" y="844" class="small">这些是治理开关，不是资源权限本身。</text>

  <rect x="404" y="676" width="332" height="186" rx="18" fill="#ffffff" stroke="#dbe5f1" filter="url(#shadow)"/>
  <text x="426" y="708" class="label">成员增长与审批</text>
  <text x="426" y="734" class="body">邀请码加入</text>
  <text x="426" y="756" class="body">搜索组织后按 organization id 申请加入</text>
  <text x="426" y="778" class="body">管理员直接邀请</text>
  <text x="426" y="800" class="body">require_approval = true 时进入审批队列</text>
  <text x="426" y="822" class="body">已有成员还可以发起角色升级申请</text>
  <text x="426" y="844" class="small">admin 审核加入申请和升级申请。</text>

  <rect x="84" y="892" width="652" height="196" rx="18" fill="#ffffff" stroke="#dbe5f1" filter="url(#shadow)"/>
  <text x="106" y="924" class="label">资源分发与治理方式</text>
  <text x="106" y="950" class="body">知识库分享前提：</text>
  <text x="286" y="950" class="body">资源必须属于当前租户，且分享人至少是该组织 editor。</text>
  <text x="106" y="972" class="body">知识库分享动作：</text>
  <text x="286" y="972" class="body">创建分享、调整分享权限、取消分享。</text>
  <text x="106" y="994" class="body">智能体分享前提：</text>
  <text x="286" y="994" class="body">资源属于当前租户，且 agent 已完成必要配置。</text>
  <text x="106" y="1016" class="body">智能体分享行为：</text>
  <text x="286" y="1016" class="body">权限统一收敛成 viewer，更像只读投影而不是共享编辑入口。</text>
  <text x="106" y="1038" class="body">共享智能体偏好：</text>
  <text x="286" y="1038" class="body">目标租户可以把共享 agent 在自己下拉中隐藏，但不撤销权限。</text>
  <text x="106" y="1060" class="small">org admin 或原始分享人都可以做 share 清理和治理。</text>

  <line x1="380" y1="768" x2="404" y2="768" stroke="#ea7a22" stroke-width="3" marker-end="url(#arrowOrange)"/>
  <line x1="570" y1="862" x2="570" y2="892" stroke="#ea7a22" stroke-width="3" marker-end="url(#arrowOrange)"/>

  <rect x="816" y="604" width="728" height="518" rx="22" fill="#f9fbfe" stroke="#dbe5f1"/>
  <text x="844" y="644" class="section-title">3. 你二开时最好保留的约束</text>

  <rect x="844" y="676" width="670" height="96" rx="18" fill="#edf3ff" stroke="#c9d9ff"/>
  <text x="866" y="708" class="label">约束 A：tenant 仍然必须是硬隔离域</text>
  <text x="866" y="734" class="body">不要把 organization 直接升级成主所有权边界。空间是协作层，tenant 才是资源和配置真正的归属层。</text>
  <text x="866" y="756" class="small">所有跨租户读取链路都应该保留 explicit effective tenant switching。</text>

  <rect x="844" y="790" width="670" height="96" rx="18" fill="#eefaf6" stroke="#c7eadc"/>
  <text x="866" y="822" class="label">约束 B：资源访问必须双重校验</text>
  <text x="866" y="848" class="body">先校验用户是不是该组织成员，再校验组织是否真的持有该资源的分享记录。</text>
  <text x="866" y="870" class="small">最终权限必须取组织角色和分享权限中的较低值。</text>

  <rect x="844" y="904" width="670" height="96" rx="18" fill="#fff8eb" stroke="#f0d8a6"/>
  <text x="866" y="936" class="label">约束 C：共享智能体继续保持只读投影</text>
  <text x="866" y="962" class="body">如果要做更强协作，建议新增独立资源分享模式，不要把 agent share 直接升级成可写通道。</text>
  <text x="866" y="984" class="small">通过智能体间接可见的知识库，也要继续标识为间接访问。</text>

  <rect x="844" y="1018" width="670" height="70" rx="18" fill="#f8f1ff" stroke="#ddc9ff"/>
  <text x="866" y="1050" class="label">推荐扩展方向</text>
  <text x="866" y="1074" class="body">建议在 share 之上增加部门策略、项目边界、审批流、审计日志和资源标签，但不要破坏现有分层判定链。</text>

  <path d="M776 745 C810 745, 810 724, 844 724" fill="none" stroke="#1f9d72" stroke-width="3" marker-end="url(#arrowGreen)"/>
  <path d="M776 855 C810 855, 810 838, 844 838" fill="none" stroke="#1f9d72" stroke-width="3" marker-end="url(#arrowGreen)"/>
  <path d="M776 982 C810 982, 810 952, 844 952" fill="none" stroke="#1f9d72" stroke-width="3" marker-end="url(#arrowGreen)"/>

  <rect x="1228" y="76" width="292" height="62" rx="14" fill="#ffffff" stroke="#dbe5f1"/>
  <text x="1248" y="102" class="chip" fill="#2f6fed">蓝色箭头</text>
  <text x="1338" y="102" class="small">访问授权链路</text>
  <text x="1248" y="124" class="chip" fill="#ea7a22">橙色箭头</text>
  <text x="1352" y="124" class="small">运营流程链路</text>

</svg>
