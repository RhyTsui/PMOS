<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1680 1120" role="img" aria-labelledby="title desc">
  <title id="title">知识库拆分与分类规则示例</title>
  <desc id="desc">展示知识库应如何按归属和类型拆分，而不是按空间反推；同一资产可被多个业务域消费。</desc>
  <defs>
    <style>
      text { font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #10243e; }
      .title { font-size: 30px; font-weight: 700; }
      .subtitle { font-size: 16px; fill: #536b84; }
      .section { font-size: 22px; font-weight: 700; }
      .label { font-size: 17px; font-weight: 700; }
      .body { font-size: 14px; fill: #38526d; }
      .small { font-size: 13px; fill: #61788f; }
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f8fc"/>
      <stop offset="100%" stop-color="#edf3fa"/>
    </linearGradient>
  </defs>

  <rect width="1680" height="1120" fill="url(#bg)"/>
  <rect x="24" y="24" width="1632" height="1072" rx="28" fill="#ffffff" stroke="#d8e2ef"/>
  <text x="64" y="82" class="title">知识库拆分与分类规则示例</text>
  <text x="64" y="110" class="subtitle">先按归属和责任边界拆，再按知识类型分类；不要先建空间，再把内容硬塞进去。</text>

  <rect x="56" y="148" width="736" height="900" rx="22" fill="#f9fbfe" stroke="#dbe5f1"/>
  <text x="84" y="188" class="section">A. 拆分规则</text>

  <rect x="84" y="226" width="680" height="92" rx="18" fill="#edf3ff" stroke="#c9d9ff"/>
  <text x="108" y="258" class="label">规则 1：先看归属</text>
  <text x="108" y="286" class="body">个人 / 部门 / 组织 / 项目，先回答“谁负责维护、谁决定升级下线”。</text>

  <rect x="84" y="338" width="680" height="92" rx="18" fill="#eefaf6" stroke="#c7eadc"/>
  <text x="108" y="370" class="label">规则 2：再看类型</text>
  <text x="108" y="398" class="body">埋点、复盘、策划案、SDK、方法论、指标口径、规则库、数据库说明等。</text>

  <rect x="84" y="450" width="680" height="92" rx="18" fill="#fff8eb" stroke="#f0d8a6"/>
  <text x="108" y="482" class="label">规则 3：空间是消费层，不是拆库依据</text>
  <text x="108" y="510" class="body">同一个知识库可以进入多个空间，但不因为进了空间就变成另一个知识库。</text>

  <rect x="84" y="574" width="680" height="430" rx="18" fill="#ffffff" stroke="#dbe5f1"/>
  <text x="108" y="608" class="label">示例资产</text>

  <rect x="108" y="642" width="300" height="66" rx="14" fill="#f8fbfe" stroke="#dbe5f1"/>
  <text x="130" y="670" class="body">游戏数据分析数据库</text>
  <text x="130" y="692" class="small">归属：数据部 ｜ 类型：数据说明 / 数据库</text>

  <rect x="432" y="642" width="300" height="66" rx="14" fill="#f8fbfe" stroke="#dbe5f1"/>
  <text x="454" y="670" class="body">指间山海埋点知识库</text>
  <text x="454" y="692" class="small">归属：项目 / 数据联合 ｜ 类型：埋点</text>

  <rect x="108" y="726" width="300" height="66" rx="14" fill="#f8fbfe" stroke="#dbe5f1"/>
  <text x="130" y="754" class="body">SDK知识库</text>
  <text x="130" y="776" class="small">归属：研发部门 ｜ 类型：技术 / SDK</text>

  <rect x="432" y="726" width="300" height="66" rx="14" fill="#f8fbfe" stroke="#dbe5f1"/>
  <text x="454" y="754" class="body">策划案知识库</text>
  <text x="454" y="776" class="small">归属：项目 / 产品 ｜ 类型：策划案</text>

  <rect x="108" y="810" width="300" height="66" rx="14" fill="#f8fbfe" stroke="#dbe5f1"/>
  <text x="130" y="838" class="body">产品方法论知识库</text>
  <text x="130" y="860" class="small">归属：组织 ｜ 类型：方法论</text>

  <rect x="432" y="810" width="300" height="66" rx="14" fill="#f8fbfe" stroke="#dbe5f1"/>
  <text x="454" y="838" class="body">活动复盘知识库</text>
  <text x="454" y="860" class="small">归属：项目 / 组织 ｜ 类型：复盘</text>

  <rect x="836" y="148" width="788" height="900" rx="22" fill="#f9fbfe" stroke="#dbe5f1"/>
  <text x="864" y="188" class="section">B. 分类视角</text>

  <rect x="864" y="226" width="736" height="118" rx="18" fill="#ffffff" stroke="#dbe5f1"/>
  <text x="888" y="258" class="label">一个资产至少同时有三类分类</text>
  <text x="888" y="288" class="body">1. 归属分类：个人 / 部门 / 组织 / 项目</text>
  <text x="888" y="314" class="body">2. 业务域分类：广告数据分析域 / 游戏数据分析域 / 游戏研发域 / 产品经理域 ...</text>
  <text x="888" y="340" class="body">3. 资产类型分类：埋点 / 复盘 / 策划案 / SDK / 方法论 / 规则 / 数据说明 ...</text>

  <rect x="864" y="382" width="736" height="232" rx="18" fill="#edf3ff" stroke="#c9d9ff"/>
  <text x="888" y="414" class="label">示例：指间山海埋点知识库</text>
  <text x="888" y="446" class="body">归属分类：</text>
  <text x="1000" y="446" class="body">项目A / 数据部联合维护</text>
  <text x="888" y="476" class="body">业务域分类：</text>
  <text x="1000" y="476" class="body">游戏数据分析域、游戏研发域</text>
  <text x="888" y="506" class="body">资产类型：</text>
  <text x="1000" y="506" class="body">埋点库</text>
  <text x="888" y="536" class="body">说明：</text>
  <text x="1000" y="536" class="body">它不需要因为进入两个空间就复制成两份知识库。</text>

  <rect x="864" y="648" width="736" height="232" rx="18" fill="#eefaf6" stroke="#c7eadc"/>
  <text x="888" y="680" class="label">示例：产品方法论知识库</text>
  <text x="888" y="712" class="body">归属分类：</text>
  <text x="1000" y="712" class="body">组织</text>
  <text x="888" y="742" class="body">业务域分类：</text>
  <text x="1000" y="742" class="body">产品经理域、AICoding域</text>
  <text x="888" y="772" class="body">资产类型：</text>
  <text x="1000" y="772" class="body">方法论库</text>
  <text x="888" y="802" class="body">说明：</text>
  <text x="1000" y="802" class="body">组织级公共知识最适合做“多空间消费”。</text>

  <rect x="864" y="914" width="736" height="90" rx="18" fill="#fff8eb" stroke="#f0d8a6"/>
  <text x="888" y="946" class="label">一句话</text>
  <text x="966" y="946" class="body">知识库拆分看归属与责任边界，知识库分类看类型与业务域，空间只是消费与协作入口。</text>
</svg>
