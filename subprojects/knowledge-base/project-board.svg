  <rect x="690" y="408" width="598" height="360" class="card"/>
  <text x="718" y="450" class="h">下一步</text>
  <text x="718" y="494" class="b">1. 跑出首批扫描产物，确认 WeKnora 前后端改造切口</text>
  <text x="718" y="520" class="b">2. 解决 Docker 镜像访问，或确认改走源码编译路线</text>
  <text x="718" y="546" class="b">3. 明确 Prompt / Chat / Agent Runtime / 权限控制面归属</text>
  <text x="718" y="572" class="b">4. 再进入 v1.1 产品壳和业务页面改造</text>
