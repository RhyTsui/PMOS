<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1360 920" width="1360" height="920">
  <style>
    text { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #14213d; }
    .title { font-size: 30px; font-weight: 700; }
    .sub { font-size: 14px; fill: #52607a; }
    .card { fill: #ffffff; stroke: #d6dde8; stroke-width: 1.5; rx: 18; }
    .h { font-size: 20px; font-weight: 700; }
    .b { font-size: 14px; }
    .m { font-size: 13px; fill: #6b7280; }
    .link { font-size: 14px; fill: #2563eb; font-weight: 600; }
  </style>
  <rect width="1360" height="920" fill="#f5f7fb"/>
  <text x="72" y="68" class="title">知识库项目 / project-board</text>
  <text x="72" y="98" class="sub">当前阶段不是直接做业务功能，而是先把 WeKnora 二开准备包补齐，让项目具备长期迭代和可验证开工能力。</text>

  <rect x="72" y="140" width="380" height="220" class="card"/>
  <text x="100" y="182" class="h">当前定位</text>
  <text x="100" y="220" class="b">阶段：研究收敛 + 二开准备</text>
  <text x="100" y="252" class="b">当前真相：WeKnora 已进仓，但环境、扫描、架构边界、</text>
  <text x="100" y="278" class="b">项目入口和长周期迭代能力还没形成完整开工包。</text>
  <text x="100" y="320" class="m">禁止在代码扫描前直接改业务主模块。</text>

  <rect x="490" y="140" width="380" height="220" class="card"/>
  <text x="518" y="182" class="h">本轮新增</text>
  <text x="518" y="220" class="b">1. 二开准备真源与检查清单</text>
  <text x="518" y="246" class="b">2. WeKnora 代码扫描脚本与扫描产物</text>
  <text x="518" y="272" class="b">3. knowledge-base 子项目专用 skill registry</text>
  <text x="518" y="298" class="b">4. project / roadmap / decision / change-log 入口</text>
  <text x="518" y="330" class="m">这些都属于外挂式补强，不改平台主内核。</text>

  <rect x="908" y="140" width="380" height="220" class="card"/>
  <text x="936" y="182" class="h">当前阻塞</text>
  <text x="936" y="220" class="b">1. Docker 镜像拉取被外部网络/代理阻断</text>
  <text x="936" y="246" class="b">2. 本机未检测到 `go`，源码编译路线未满足</text>
  <text x="936" y="272" class="b">3. WeKnora 是底座还是临时产品壳，仍需拍板</text>
  <text x="936" y="304" class="m">环境问题当前不是仓库配置错误。</text>

