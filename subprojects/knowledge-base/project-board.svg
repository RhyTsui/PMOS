  </style>
  <rect width="1360" height="920" fill="#ffffff"/>
  <a href="../../boards/index.svg"><text x="72" y="46" class="linkText">← Back to PMAIOS directory</text></a>
  <text x="72" y="88" class="title">Knowledge Base Project Board</text>
  <text x="72" y="116" class="sub">Current sample project for product workflow rollout.</text>

  <rect x="72" y="160" width="392" height="190" class="card"/>
  <rect x="72" y="160" width="5" height="190" fill="#10a37f"/>
  <text x="100" y="198" class="cardTitle">Current Position</text>
  <text x="100" y="223" class="meta">research-first / partial adoption</text>
  <text x="100" y="258" class="body">This project is still before final solution convergence. The current truth is: broaden research, complete industry best-practice understanding, then converge architecture and product direction.</text>

  <rect x="484" y="160" width="392" height="190" class="card"/>
  <text x="512" y="198" class="cardTitle">Confirmed Inputs</text>
  <text x="512" y="258" class="body">WeKnora fit study exists, startup meeting inputs exist, and product-workflow governance has been laid down. Those inputs are starting points, not final locked direction.</text>

  <rect x="896" y="160" width="392" height="190" class="card"/>
  <text x="924" y="198" class="cardTitle">Needed Next</text>
  <text x="924" y="258" class="body">Competitor/open-source comparison, broader best-practice research, architecture boundary confirmation, and clearer phase split.</text>

  <rect x="72" y="390" width="392" height="216" class="card"/>
  <text x="100" y="428" class="cardTitle">Main Docs</text>
  <a href="README.md"><text x="100" y="470" class="linkText">README.md</text></a>
  <a href="docs/WeKnora适配性评估.md"><text x="100" y="502" class="linkText">WeKnora fit study</text></a>
  <a href="docs/知识库项目执行工作流.md"><text x="100" y="534" class="linkText">project workflow</text></a>
  <a href="docs/知识库项目产品经理任务单.md"><text x="100" y="566" class="linkText">PM task sheet</text></a>

  <rect x="484" y="390" width="392" height="216" class="card"/>
  <text x="512" y="428" class="cardTitle">Operating Rule</text>
  <text x="512" y="470" class="body">Do not jump from early inputs into final PRD. This project is the sample proving that research-first workflow must be real, not ceremonial.</text>

  <rect x="896" y="390" width="392" height="216" class="card"/>
  <text x="924" y="428" class="cardTitle">Follow-Up Boards</text>
  <text x="924" y="470" class="body">Recommended next SVG boards:</text>
  <text x="924" y="502" class="body">- research-map.svg</text>
  <text x="924" y="534" class="body">- architecture-board.svg</text>
  <text x="924" y="566" class="body">- decision-board.svg</text>
