version: "3.9"

services:
  backend:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -lc "pip install -e . && uvicorn ad.app:app --host 0.0.0.0 --port 8020"
    ports:
      - "8020:8020"

  frontend:
    build:
      context: ./frontend/src
      dockerfile: Dockerfile
    working_dir: /app
    environment:
      PORT: 8002
    ports:
      - "8002:8002"
    depends_on:
      - backend
