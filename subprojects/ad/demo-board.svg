<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 980" width="1440" height="980">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif; }
    .title { fill: #111827; font-size: 30px; font-weight: 700; }
    .sub { fill: #4b5563; font-size: 14px; }
    .section { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.5; rx: 18; }
    .sectionTitle { fill: #111827; font-size: 18px; font-weight: 700; }
    .body { fill: #334155; font-size: 14px; }
    .meta { fill: #6b7280; font-size: 12px; }
    .linkText { fill: #2563eb; font-size: 14px; font-weight: 600; }
    .pill { fill: #eff6ff; stroke: #bfdbfe; stroke-width: 1; rx: 12; }
    .pillText { fill: #1d4ed8; font-size: 12px; font-weight: 700; }
    .node { rx: 14; stroke-width: 1.5; }
    .nodeTitle { fill: #0f172a; font-size: 16px; font-weight: 700; }
    .small { fill: #475569; font-size: 13px; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2563eb"/>
    </marker>
    <marker id="dashArrow" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#059669"/>
    </marker>
  </defs>

  <rect width="1440" height="980" fill="#f8fafc"/>
  <a href="project-board.svg"><text x="72" y="48" class="linkText">Back to ad project board</text></a>
  <text x="72" y="94" class="title">Ad Demo Board</text>
  <text x="72" y="122" class="sub">Demo-first scope for the 2026-04-30 story: diagnose a gap, compare two assets, and keep both inside one guided workbench.</text>

  <rect x="72" y="156" width="1296" height="116" class="section"/>
  <text x="100" y="194" class="sectionTitle">Frozen Goal</text>
  <rect x="100" y="212" width="168" height="28" class="pill"/>
  <text x="126" y="231" class="pillText">DEADLINE 2026-04-30</text>
  <text x="296" y="231" class="body">Deliver a stable mock-data demo that explains what the agent does, why it reached a conclusion, and what should enter MVP next.</text>
  <text x="100" y="256" class="meta">Out of scope: real media APIs, full automation, asset-agent chain, knowledge-base governance platform, broad Ad OS narrative expansion.</text>

  <rect x="72" y="304" width="1296" height="348" class="section"/>
  <text x="100" y="342" class="sectionTitle">Core Demo Story</text>

  <rect x="112" y="388" width="250" height="180" fill="#dbeafe" stroke="#93c5fd" class="node"/>
  <text x="138" y="424" class="nodeTitle">1. Workbench Entry</text>
  <text x="138" y="454" class="small">Single landing space for</text>
  <text x="138" y="476" class="small">diagnosis and comparison.</text>
  <text x="138" y="516" class="small">Needs:</text>
  <text x="138" y="538" class="small">prompt box, quick actions,</text>
  <text x="138" y="560" class="small">scene switch, state area.</text>

  <rect x="456" y="388" width="250" height="180" fill="#dcfce7" stroke="#86efac" class="node"/>
  <text x="482" y="424" class="nodeTitle">2. Diagnosis Demo</text>
  <text x="482" y="454" class="small">Question example:</text>
  <text x="482" y="476" class="small">Why is activation 30%</text>
  <text x="482" y="498" class="small">below BI yesterday?</text>
  <text x="482" y="538" class="small">Show 4-5 fixed steps,</text>
  <text x="482" y="560" class="small">evidence, conclusion, action.</text>

  <rect x="800" y="388" width="250" height="180" fill="#fef3c7" stroke="#fcd34d" class="node"/>
  <text x="826" y="424" class="nodeTitle">3. Comparison Demo</text>
  <text x="826" y="454" class="small">Question example:</text>
  <text x="826" y="476" class="small">Compare asset A and B</text>
  <text x="826" y="498" class="small">over the last 7 days.</text>
  <text x="826" y="538" class="small">Return cards or table,</text>
  <text x="826" y="560" class="small">support one follow-up ask.</text>

  <rect x="1144" y="388" width="184" height="180" fill="#fee2e2" stroke="#fca5a5" class="node"/>
  <text x="1170" y="424" class="nodeTitle">4. Demo Outcome</text>
  <text x="1170" y="454" class="small">Audience sees:</text>
  <text x="1170" y="476" class="small">clear process,</text>
  <text x="1170" y="498" class="small">structured result,</text>
  <text x="1170" y="520" class="small">next-step confidence.</text>

  <path d="M362 478 L456 478" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M706 478 L800 478" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1050 478 L1144 478" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="72" y="684" width="620" height="224" class="section"/>
  <text x="100" y="722" class="sectionTitle">P0 Delivery Package</text>
  <text x="100" y="760" class="body">Product: lock the demo script, landing IA, and result-card schemas.</text>
  <text x="100" y="792" class="body">Frontend: upgrade the funnel prototype into a workbench with prompt input, execution states, diagnosis cards, and comparison cards/table.</text>
  <text x="100" y="824" class="body">Backend: provide unified demo endpoints plus diagnosis/comparison mock APIs with one response model.</text>
  <text x="100" y="856" class="body">Content: prepare mock evidence, mock tables, homepage copy, and presenter prompts.</text>

  <rect x="748" y="684" width="620" height="224" class="section"/>
  <text x="776" y="722" class="sectionTitle">P1 After Demo</text>
  <text x="776" y="760" class="body">Automation orchestration, real MCP abstraction, broader scenario set, and asset-agent / knowledge-base foundation move to MVP evaluation.</text>
  <text x="776" y="792" class="body">Decision needed after demo: which capability earns the first real integration budget.</text>
  <text x="776" y="856" class="meta">Related boards: user-flow-board.svg, acceptance-board.svg</text>
</svg>
