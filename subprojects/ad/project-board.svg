  <rect x="72" y="682" width="1216" height="152" class="card"/>
  <text x="100" y="720" class="cardTitle">Default Communication Mode</text>
  <text x="100" y="760" class="body">Future project-facing summaries, plans, and review artifacts should default to SVG boards. Markdown remains the detailed appendix layer and source material.</text>
