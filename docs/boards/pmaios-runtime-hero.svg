  </g>

  <g>
    <rect x="548" y="422" width="472" height="196" rx="28" fill="#F7FAFF" stroke="#D8E4FF"/>
    <text x="580" y="468" fill="#165DFF" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="24">Live Status</text>
    <text x="580" y="526" fill="#1C1814" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="30" font-weight="700">Current Mode: do</text>
    <text x="580" y="570" fill="#6F675D" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="22">Current Task: 补 PMAIOS 介绍图并挂到 Wiki 首页</text>
