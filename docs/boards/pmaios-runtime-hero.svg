    <text x="880" y="760" fill="#D8E4FF" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="24">提示词清单页</text>
    <text x="1108" y="760" fill="white" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="28" font-weight="700">/pmaios/graph</text>
