    <text x="1084" y="468" fill="#A84F27" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="24">Recent Moves</text>
    <text x="1084" y="524" fill="#1C1814" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="24">1. 介绍页重构为状态型入口</text>
