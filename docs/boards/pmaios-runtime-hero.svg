  <g>
    <text x="108" y="132" fill="#A84F27" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="24" letter-spacing="5">PMAIOS RUNTIME SNAPSHOT</text>
    <text x="108" y="214" fill="#1C1814" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="74" font-weight="700">PMAIOS</text>
    <text x="108" y="294" fill="#233C7A" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="58" font-weight="700">运行态介绍图</text>
    <text x="108" y="354" fill="#6F675D" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="28">面向当前状态、最近动作与关键入口的人读总览，而不是把 prompt 和长文都堆在首页。</text>
  </g>

  <g>
    <rect x="108" y="422" width="408" height="196" rx="28" fill="#FFF9F1" stroke="#E8D9C7"/>
