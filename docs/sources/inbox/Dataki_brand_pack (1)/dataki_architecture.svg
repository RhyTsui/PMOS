<svg width="1600" height="980" viewBox="0 0 1600 980" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    .title { font: 700 44px Inter, Arial, sans-serif; fill: #0B132B; }
    .sub { font: 500 20px 'Noto Sans SC', 'Microsoft YaHei', sans-serif; fill: #374151; }
    .label { font: 700 22px 'Noto Sans SC', 'Microsoft YaHei', sans-serif; fill: #0B132B; }
    .small { font: 500 18px 'Noto Sans SC', 'Microsoft YaHei', sans-serif; fill: #374151; }
    .tiny { font: 500 16px 'Noto Sans SC', 'Microsoft YaHei', sans-serif; fill: #6B7280; }
  </style>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M0 0L10 5L0 10Z" fill="#2563EB"/>
  </marker>
</defs>
<rect width="1600" height="980" fill="#F8FAFC"/>
<text x="70" y="80" class="title">Dataki 产品架构图</text>
<text x="70" y="116" class="sub">LLM + AutoWiki + RAG + MCP + Skills + Agents + 外部工具</text>

<rect x="70" y="160" width="1460" height="110" rx="24" fill="#FFFFFF" stroke="#D1D5DB"/>
<text x="100" y="206" class="label">交互层</text>
<text x="100" y="236" class="small">Chat / 搜索问答 / 指标解读 / 洞察卡片 / 自动 Wiki / 运营与数据协作台</text>

<rect x="70" y="300" width="1460" height="150" rx="24" fill="#FFFFFF" stroke="#D1D5DB"/>
<text x="100" y="346" class="label">智能编排层</text>
<text x="100" y="376" class="small">Planner Agent · Analyst Agent · Wiki Agent · Review Agent · Router Agent</text>
<text x="100" y="406" class="tiny">负责问题拆解、任务路由、多 Agent 协作、结果评审、回流补查</text>

<rect x="70" y="480" width="700" height="250" rx="24" fill="#FFFFFF" stroke="#D1D5DB"/>
<text x="100" y="526" class="label">推理与生成层</text>
<text x="100" y="560" class="small">LLM 推理引擎</text>
<text x="100" y="592" class="tiny">结构化问答 / 指标解释 / 原因分析 / 洞察生成 / 建议生成</text>
<rect x="100" y="620" width="260" height="70" rx="16" fill="#EEF2FF"/>
<text x="126" y="662" class="small">AutoWiki 生成器</text>
<rect x="390" y="620" width="330" height="70" rx="16" fill="#EFF6FF"/>
<text x="416" y="662" class="small">知识摘要 / 口径卡 / 归因结论</text>

<rect x="800" y="480" width="730" height="250" rx="24" fill="#FFFFFF" stroke="#D1D5DB"/>
<text x="830" y="526" class="label">知识与检索层</text>
<text x="830" y="560" class="small">RAG 检索 · 向量索引 · 结构化索引 · 术语/口径图谱</text>
<rect x="830" y="620" width="200" height="70" rx="16" fill="#F5F3FF"/>
<text x="860" y="662" class="small">知识库 / Wiki</text>
<rect x="1050" y="620" width="200" height="70" rx="16" fill="#F5F3FF"/>
<text x="1086" y="662" class="small">指标口径库</text>
<rect x="1270" y="620" width="220" height="70" rx="16" fill="#F5F3FF"/>
<text x="1312" y="662" class="small">知识图谱 / Reg</text>

<rect x="70" y="760" width="1460" height="140" rx="24" fill="#FFFFFF" stroke="#D1D5DB"/>
<text x="100" y="806" class="label">连接与执行层</text>
<text x="100" y="838" class="small">MCP / Skills / 外挂工具 / SQL / BI API / 文档系统 / 飞书 / 埋点平台 / 数据仓库</text>
<text x="100" y="868" class="tiny">把知识、数据、动作统一接入，使“解释 - 写回 - 触发”形成闭环</text>

<line x1="800" y1="270" x2="800" y2="300" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/>
<line x1="420" y1="450" x2="420" y2="480" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/>
<line x1="1170" y1="450" x2="1170" y2="480" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/>
<line x1="800" y1="730" x2="800" y2="760" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/>
<line x1="770" y1="608" x2="800" y2="608" stroke="#7C3AED" stroke-width="4" marker-end="url(#arrow)"/>

<rect x="1210" y="300" width="320" height="150" rx="20" fill="#0B132B"/>
<text x="1240" y="344" class="label" fill="#FFFFFF">核心闭环</text>
<text x="1240" y="378" class="small" fill="#FFFFFF">数据 → 检索 → 推理 →</text>
<text x="1240" y="408" class="small" fill="#FFFFFF">洞察 → Wiki 沉淀 →</text>
<text x="1240" y="438" class="small" fill="#FFFFFF">再次被检索与复用</text>
