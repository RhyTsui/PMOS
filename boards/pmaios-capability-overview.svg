  <a href="pmaios-architecture-roadmap.svg"><text x="690" y="1102" class="linkText">补充看：架构 + 路线图 -&gt;</text></a>
  <a href="../docs/operations/pmaios-v0.5-checklist.md"><text x="980" y="1102" class="linkText">配套文档：v0.5 checklist -&gt;</text></a>
</svg>
