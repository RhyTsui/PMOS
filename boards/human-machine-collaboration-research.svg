  <a href="mode-architecture.svg"><text x="1210" y="1018" class="linkText">模式图板 -&gt;</text></a>
  <text x="100" y="1046" class="meta">当前实验样板：task-60d32fc4-4bea-466a-adc7-443a4869dc72</text>
</svg>
