<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1680 1320" width="1680" height="1320">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    .title { fill: #0f172a; font-size: 34px; font-weight: 700; }
    .sub { fill: #475569; font-size: 15px; }
    .section { fill: #0f172a; font-size: 20px; font-weight: 700; }
    .card { fill: #ffffff; stroke: #dbe2ea; stroke-width: 1.5; rx: 18; }
    .meta { fill: #64748b; font-size: 12px; }
    .body { fill: #334155; font-size: 15px; }
    .small { fill: #475569; font-size: 13px; }
    .linkText { fill: #2563eb; font-size: 13px; font-weight: 600; }
    .chipBlue { fill: #eff6ff; stroke: #bfdbfe; stroke-width: 1; rx: 14; }
    .chipGreen { fill: #ecfdf5; stroke: #a7f3d0; stroke-width: 1; rx: 14; }
    .chipAmber { fill: #fffbeb; stroke: #fde68a; stroke-width: 1; rx: 14; }
    .chipSlate { fill: #f8fafc; stroke: #dbe2ea; stroke-width: 1; rx: 14; }
    .chipText { fill: #0f172a; font-size: 12px; font-weight: 600; }
  </style>

  <rect width="1680" height="1320" fill="#f8fafc"/>
  <a href="index.svg"><text x="72" y="48" class="linkText">&lt;- 返回目录</text></a>
  <text x="72" y="94" class="title">PMAIOS 模式架构详细介绍</text>
  <text x="72" y="126" class="sub">基于 `mode-architecture.md` 的中文细化版图板。目标不是把默认模式改坏，而是建立显式的协作模式路由层。</text>

  <rect x="72" y="156" width="1520" height="36" class="chipBlue"/>
  <text x="100" y="178" class="chipText">一句话：同一个系统里，按任务目标和风险水平切换 `default / plan / deep / do`，而不是强迫一套行为覆盖所有场景。</text>

  <rect x="72" y="224" width="1520" height="122" class="card"/>
  <text x="100" y="266" class="section">为什么需要模式架构</text>
  <text x="100" y="294" class="meta">这不是提示词小修，而是执行协议分层</text>
  <text x="100" y="332" class="body">默认保守模式有价值：更适合高不确定、高风险、需要强治理的任务。</text>
  <text x="100" y="358" class="body">但它不适合所有情况，尤其不适合同日交付冲刺、低歧义执行、长时间不中断推进。</text>
  <text x="100" y="384" class="body">因此 PMAIOS 需要一个“模式路由层”，让模式影响同步节奏、停顿条件、新想法插入策略和权限处理方式。</text>

  <rect x="72" y="382" width="360" height="252" class="card"/>
  <text x="100" y="424" class="section">default</text>
  <text x="100" y="452" class="meta">保守 / 评估 / 治理优先</text>
  <text x="100" y="490" class="body">适用：</text>
  <text x="130" y="516" class="small">高不确定、高风险、需要更多确认和评估的任务</text>
  <text x="100" y="550" class="body">行为：</text>
  <text x="130" y="576" class="small">更多确认、更多 refinement、更稳的阶段同步</text>
  <text x="100" y="610" class="body">价值：</text>
  <text x="130" y="636" class="small">降低误做概率，提升治理质量</text>

  <rect x="460" y="382" width="360" height="252" class="card"/>
  <text x="488" y="424" class="section">plan</text>
  <text x="488" y="452" class="meta">先完善再实施</text>
  <text x="488" y="490" class="body">适用：</text>
  <text x="518" y="516" class="small">用户仍在探索，idea 需要被强化成可执行方案</text>
  <text x="488" y="550" class="body">行为：</text>
  <text x="518" y="576" class="small">先识别意图，再做拆解、最佳实践扫描、影响评估</text>
  <text x="488" y="610" class="body">价值：</text>
  <text x="518" y="636" class="small">避免把局部想法直接当成最终方案</text>

  <rect x="848" y="382" width="360" height="252" class="card"/>
  <text x="876" y="424" class="section">deep</text>
  <text x="876" y="452" class="meta">旁路深研，不打断主线</text>
  <text x="876" y="490" class="body">适用：</text>
  <text x="906" y="516" class="small">大课题、长期议题、值得持续积累的研究线</text>
  <text x="876" y="550" class="body">行为：</text>
  <text x="906" y="576" class="small">主线继续做，旁边单开 deep research document 持续增长</text>
  <text x="876" y="610" class="body">价值：</text>
  <text x="906" y="636" class="small">不拖慢主流程，同时沉淀深层认知</text>

  <rect x="1236" y="382" width="356" height="252" class="card"/>
  <text x="1264" y="424" class="section">do</text>
  <text x="1264" y="452" class="meta">快速实施路线</text>
  <text x="1264" y="490" class="body">适用：</text>
  <text x="1294" y="516" class="small">目标已明确、方向已接受、需要快速冲结果</text>
  <text x="1264" y="550" class="body">行为：</text>
  <text x="1294" y="576" class="small">连续执行、短同步、阶段汇报不停工、侧线默认旁路</text>
  <text x="1264" y="610" class="body">价值：</text>
  <text x="1294" y="636" class="small">扩大连续执行窗口，减少伪停顿</text>

  <rect x="72" y="674" width="1520" height="232" class="card"/>
  <text x="100" y="716" class="section">模式切换后，哪些东西必须跟着变</text>
  <text x="100" y="744" class="meta">模式不是标签，而是协议</text>

  <rect x="100" y="772" width="280" height="104" class="chipSlate"/>
  <text x="126" y="804" class="chipText">优先级处理</text>
  <text x="126" y="832" class="small">default 频繁复核</text>
  <text x="126" y="856" class="small">do 以当前接受目标快速推进</text>

  <rect x="406" y="772" width="280" height="104" class="chipSlate"/>
  <text x="432" y="804" class="chipText">阶段同步</text>
  <text x="432" y="832" class="small">default 可更完整</text>
  <text x="432" y="856" class="small">do 必须短而且不阻断执行</text>

  <rect x="712" y="772" width="280" height="104" class="chipSlate"/>
  <text x="738" y="804" class="chipText">新想法插入</text>
  <text x="738" y="832" class="small">plan 倾向先完善</text>
  <text x="738" y="856" class="small">do 默认挂成 parked / sidecar</text>

  <rect x="1018" y="772" width="280" height="104" class="chipSlate"/>
  <text x="1044" y="804" class="chipText">权限处理</text>
  <text x="1044" y="832" class="small">default 可更保守</text>
  <text x="1044" y="856" class="small">do 倾向批量申请并并行推进非阻塞部分</text>

  <rect x="1324" y="772" width="240" height="104" class="chipSlate"/>
  <text x="1350" y="804" class="chipText">产物预期</text>
  <text x="1350" y="832" class="small">不同模式对应不同输出密度</text>
  <text x="1350" y="856" class="small">不是所有任务都同一种产物</text>

  <rect x="72" y="938" width="740" height="270" class="card"/>
  <text x="100" y="980" class="section">`{do}` 的触发与最小启动契约</text>
  <text x="100" y="1008" class="meta">快速实施不是一句口号，要有启动字段</text>
  <text x="100" y="1046" class="body">建议触发：</text>
  <text x="130" y="1072" class="small">`{do} finish today's plan`</text>
  <text x="130" y="1096" class="small">`{do} keep pushing, do not stop`</text>
  <text x="100" y="1132" class="body">进入 `{do}` 后应显式给出：</text>
  <text x="130" y="1158" class="small">accepted target</text>
  <text x="130" y="1182" class="small">current highest-priority line</text>
  <text x="370" y="1158" class="small">parked side lines</text>
  <text x="370" y="1182" class="small">known blockers</text>
  <text x="590" y="1158" class="small">next safe step</text>

  <rect x="840" y="938" width="752" height="270" class="card"/>
  <text x="868" y="980" class="section">`{do}` 的硬边界</text>
  <text x="868" y="1008" class="meta">快，不等于莽</text>
  <text x="868" y="1046" class="body">即使在 `{do}` 模式，也只在这些场景继续停下：</text>
  <text x="898" y="1076" class="small">1. 下一步被真实阻塞</text>
  <text x="898" y="1102" class="small">2. 出现高风险架构或产品分叉</text>
  <text x="898" y="1128" class="small">3. 必需权限门阻断继续执行</text>
  <text x="898" y="1154" class="small">4. 继续做会明显偏离目标</text>
  <text x="868" y="1190" class="body">不应因为这些理由停下：</text>
  <text x="898" y="1220" class="small">阶段边界、写了一段总结、小不确定、新侧想法出现</text>

  <rect x="72" y="1236" width="1520" height="52" class="card"/>
