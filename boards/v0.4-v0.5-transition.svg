  <a href="../docs/operations/v0.5-implementation-index.md"><text x="580" y="1080" class="linkText">v0.5 实施索引 -&gt;</text></a>
  <a href="pmaios-v0.5.svg"><text x="840" y="1080" class="linkText">v0.5 清单板 -&gt;</text></a>
  <a href="index.svg"><text x="1050" y="1080" class="linkText">图板目录 -&gt;</text></a>
</svg>
