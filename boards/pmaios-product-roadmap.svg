<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1100" width="1500" height="1100">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    .title { fill: #0f172a; font-size: 30px; font-weight: 700; }
    .sub { fill: #475569; font-size: 14px; }
    .card { fill: #ffffff; stroke: #dbe2ea; stroke-width: 1.5; rx: 14; }
    .phase { fill: #0f172a; font-size: 18px; font-weight: 700; }
    .meta { fill: #64748b; font-size: 12px; }
    .body { fill: #334155; font-size: 14px; }
    .linkText { fill: #2563eb; font-size: 13px; font-weight: 600; }
  </style>
  <rect width="1500" height="1100" fill="#f8fafc"/>
  <a href="index.svg"><text x="72" y="46" class="linkText">&lt;- 返回目录</text></a>
  <text x="72" y="88" class="title">PMAIOS 产品线路图</text>
  <text x="72" y="118" class="sub">从 v0.1 到 v0.5 的产品演进逻辑。适合公司内部说明“这个产品不是临时工具，而是一条持续收敛的产品线”。</text>

  <line x1="150" y1="250" x2="1350" y2="250" stroke="#cbd5e1" stroke-width="4"/>
  <circle cx="210" cy="250" r="14" fill="#10a37f"/>
  <circle cx="480" cy="250" r="14" fill="#10a37f"/>
  <circle cx="750" cy="250" r="14" fill="#10a37f"/>
  <circle cx="1020" cy="250" r="14" fill="#10a37f"/>
  <circle cx="1290" cy="250" r="14" fill="#f59e0b"/>

  <rect x="90" y="300" width="240" height="212" class="card"/>
  <text x="118" y="344" class="phase">v0.1 原型种子</text>
  <text x="118" y="372" class="meta">2026-04-06 - 2026-04-12</text>
  <text x="118" y="414" class="body">先证明 workflow runtime、review、memory 和文档驱动协作这条路线能跑起来。</text>
  <text x="118" y="446" class="body">重点不是完整产品，而是原型种子和可回放痕迹。</text>

  <rect x="360" y="300" width="240" height="212" class="card"/>
  <text x="388" y="344" class="phase">v0.2 本地运行基线</text>
  <text x="388" y="372" class="meta">2026-04-13 - 2026-04-18</text>
  <text x="388" y="414" class="body">把前端、后端、CLI、构建、测试和本地运行链路补齐。</text>
  <text x="388" y="446" class="body">让 PMAIOS 从“规划想法”进入“本地可运行系统”。</text>

  <rect x="630" y="300" width="240" height="212" class="card"/>
  <text x="658" y="344" class="phase">v0.3 AI Product Office 基础</text>
  <text x="658" y="372" class="meta">2026-04-18 晚间</text>
  <text x="658" y="414" class="body">定义目标 operating model：AI 不只是回答问题，而是做数字世界里的产品工作。</text>
  <text x="658" y="446" class="body">明确 Product Chief、Specialist PM、输出类型和人机边界。</text>

  <rect x="900" y="300" width="240" height="212" class="card"/>
  <text x="928" y="344" class="phase">v0.4 活跃 runtime</text>
  <text x="928" y="372" class="meta">当前版本 / release candidate</text>
  <text x="928" y="414" class="body">把 Product Chief、Product Agents、Requirements、Versions、Workflow Ops、Review、DAG、Retrieval 等主线能力真正接起来。</text>
  <text x="928" y="462" class="body">让项目 PM 产出开始能够每天直接使用。</text>

  <rect x="1170" y="300" width="240" height="212" class="card"/>
  <text x="1198" y="344" class="phase">v0.5 收敛升级</text>
  <text x="1198" y="372" class="meta">下一周期</text>
  <text x="1198" y="414" class="body">把协作、执行、Web UI、知识导航、人阅读访问面、多模型上下文连续性合成一个统一版本目标。</text>
  <text x="1198" y="462" class="body">从“可运行”继续走向“可在公司里更顺畅使用”。</text>

  <rect x="90" y="570" width="1320" height="190" class="card"/>
  <text x="118" y="614" class="phase">v0.5 的公司价值主线</text>
  <text x="118" y="642" class="meta">建议演示时重点讲这一块</text>
  <text x="118" y="686" class="body">1. 统一协作：减少每次切换模型、切换项目都要重新讲背景的问题。</text>
  <text x="118" y="718" class="body">2. 统一记忆：把规则、项目背景、会话上下文和产物沉淀成可以跨模型复用的长期资产。</text>
  <text x="118" y="750" class="body">3. 统一阅读：把 SVG、Markdown、DOCX 和子项目服务统一通过固定 IP + 端口访问，提升人阅读效率。</text>

  <rect x="90" y="806" width="420" height="210" class="card"/>
  <text x="118" y="850" class="phase">从“聊天工具”升级什么</text>
  <text x="118" y="892" class="body">不是临时问答，而是项目长期运行。</text>
  <text x="118" y="924" class="body">不是靠聊天记忆，而是靠 repo truth + memory + governed outputs。</text>
  <text x="118" y="956" class="body">不是单次回答，而是 requirement / version / review / workflow 全链路。</text>

  <rect x="540" y="806" width="420" height="210" class="card"/>
  <text x="568" y="850" class="phase">从“文档仓库”升级什么</text>
  <text x="568" y="892" class="body">不是静态堆文档，而是 AI 默认生成、整理、更新和追溯。</text>
  <text x="568" y="924" class="body">不是人自己找材料，而是系统主动提问、补缺和归档。</text>
  <text x="568" y="956" class="body">不是只有机器能读，而是同时优化 AI 阅读层和人阅读层。</text>

  <rect x="990" y="806" width="420" height="210" class="card"/>
  <text x="1018" y="850" class="phase">对公司演示怎么收口</text>
  <text x="1018" y="892" class="body">一句话：PMAIOS 正在从本地 AI workflow runtime 收敛为企业内部的 AI Product Office。</text>
  <text x="1018" y="924" class="body">它的价值不只是“能做图、能写文档”，而是能持续接住项目真实运行中的背景、决策、产物和协作关系。</text>

  <a href="pmaios-demo-intro.svg"><text x="100" y="1064" class="linkText">返回：演示介绍图板 -&gt;</text></a>
  <a href="pmaios-v0.5.svg"><text x="420" y="1064" class="linkText">继续：v0.5 图板 -&gt;</text></a>
  <a href="../docs/operations/pmaios-version-plan.md"><text x="640" y="1064" class="linkText">查看：版本规划文档 -&gt;</text></a>
</svg>
