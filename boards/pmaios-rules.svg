  <a href="../docs/operations/startup-whoami.md"><text x="700" y="1092" class="linkText">startup-whoami.md</text></a>
  <a href="pmaios-pm-delivery.svg"><text x="950" y="1092" class="linkText">pmaios-pm-delivery.svg</text></a>
</svg>
